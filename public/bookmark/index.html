<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bokmärke — sp1e.se</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<script>(function(){var t=localStorage.getItem('sp1e-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0a0a0f;
    --surface:     #12121a;
    --surface2:    #181822;
    --border:      rgba(255,255,255,0.07);
    --border-hi:   rgba(255,255,255,0.14);
    --accent:      #4af2c8;
    --accent-dim:  rgba(74,242,200,0.10);
    --text:        rgba(255,255,255,0.85);
    --muted:       rgba(255,255,255,0.40);
    --dim:         rgba(255,255,255,0.20);
    --topbar-bg:   rgba(10,10,15,0.92);
    --modal-bg:    #14141e;
    --ctx-bg:      #1c1c28;
    --heading:     #ffffff;
    --logo-col:    rgba(255,255,255,0.75);
    --logo-hover:  #ffffff;
    --hover-bg:    rgba(255,255,255,0.04);
  }
  [data-theme="light"] {
    --bg:          #f7f7f3;
    --surface:     #eeeee8;
    --surface2:    #e5e5de;
    --border:      rgba(0,0,0,0.08);
    --border-hi:   rgba(0,0,0,0.18);
    --text:        rgba(0,0,0,0.82);
    --muted:       rgba(0,0,0,0.45);
    --dim:         rgba(0,0,0,0.28);
    --topbar-bg:   rgba(247,247,243,0.92);
    --modal-bg:    #f0f0ea;
    --ctx-bg:      #e8e8e2;
    --heading:     #0a0a0f;
    --logo-col:    rgba(0,0,0,0.60);
    --logo-hover:  #0a0a0f;
    --hover-bg:    rgba(0,0,0,0.04);
    --danger-dim:  rgba(255,85,85,0.12);
  }
  [data-theme="light"] pre[class*="language-"],
  [data-theme="light"] .code-preview { background: #181822 !important; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; min-height: 100%;
    display: flex; flex-direction: column;
    opacity: 0; animation: fade-in 0.4s ease 0.05s forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }

  /* ── Top bar ───────────────────────────────────────── */
  .topbar {
    height: 52px; display: flex; align-items: center;
    padding: 0 2rem; border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1.2rem; letter-spacing: 0.2em;
    color: var(--logo-col); text-decoration: none;
    transition: color 0.2s;
  }
  .logo:hover { color: var(--logo-hover); }

  /* ── Content ───────────────────────────────────────── */
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 3rem 2rem;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem 2rem;
    width: min(480px, 100%);
  }

  .favicon-wrap {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .favicon {
    width: 28px; height: 28px; border-radius: 4px;
    object-fit: contain; flex-shrink: 0;
  }
  .favicon-err { font-size: 1.2rem; flex-shrink: 0; }

  .bm-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 1.9rem; color: var(--heading);
    line-height: 1.2; word-break: break-word;
    margin-bottom: 0.6rem;
  }

  .bm-url {
    font-size: 0.68rem; color: var(--dim);
    word-break: break-all; margin-bottom: 1.25rem;
    line-height: 1.5;
  }

  .bm-desc {
    font-size: 0.8rem; color: var(--muted);
    line-height: 1.65; margin-bottom: 1.5rem;
  }

  .tags { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
  .tag {
    font-size: 0.58rem; padding: 0.12rem 0.38rem; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.14); color: var(--muted);
  }

  .visit-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(74,242,200,0.10); border: 1px solid rgba(74,242,200,0.25);
    border-radius: 8px; padding: 0.65rem 1.4rem;
    color: var(--accent); font-family: 'DM Mono', monospace; font-size: 0.78rem;
    text-decoration: none; letter-spacing: 0.04em;
    transition: background 0.2s, border-color 0.2s;
  }
  .visit-btn:hover { background: rgba(74,242,200,0.18); border-color: rgba(74,242,200,0.45); }

  .not-found {
    text-align: center; color: var(--muted); font-size: 0.8rem; padding: 3rem;
  }

  footer {
    text-align: center; padding: 1.5rem;
    font-size: 0.62rem; color: var(--dim);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--dim); text-decoration: none; transition: color 0.15s; }
  footer a:hover { color: var(--muted); }
  .topbar-right { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
  .theme-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; padding: 0.15rem 0.4rem;
    border-radius: 6px; line-height: 1; opacity: 0.6;
    transition: opacity 0.2s;
  }
  .theme-btn:hover { opacity: 1; }
</style>
</head>
<body>

<header class="topbar">
  <a class="logo" href="/">SP1E</a>
  <div class="topbar-right">
    <button class="theme-btn" id="theme-btn" title="Byt tema">☀</button>
  </div>
</header>

<main>
  <div id="content"></div>
</main>

<footer>
  <a href="/">sp1e.se</a>
</footer>

<script>
(function initTheme() {
  const btn = document.getElementById('theme-btn');
  function syncIcon() {
    const light = document.documentElement.getAttribute('data-theme') === 'light';
    if (btn) btn.textContent = light ? '🌙' : '☀';
    if (btn) btn.title = light ? 'Mörkt tema' : 'Ljust tema';
  }
  syncIcon();
  btn?.addEventListener('click', () => {
    const light = document.documentElement.getAttribute('data-theme') === 'light';
    document.documentElement.setAttribute('data-theme', light ? 'dark' : 'light');
    localStorage.setItem('sp1e-theme', light ? 'dark' : 'light');
    syncIcon();
  });
})();

(async () => {
  const parts = location.pathname.split('/').filter(Boolean);
  const bmId  = parts[parts.length - 1];
  const el    = document.getElementById('content');

  if (!bmId || bmId === 'bookmark') {
    el.innerHTML = '<p class="not-found">Ogiltigt bokmärke.</p>';
    return;
  }

  let bm;
  try {
    const res = await fetch(`/api/bookmarks/${bmId}`, { credentials: 'same-origin' });
    if (!res.ok) throw new Error();
    bm = await res.json();
  } catch {
    el.innerHTML = '<p class="not-found">Bokmärket hittades inte eller är inte publikt.</p>';
    return;
  }

  document.title = `${bm.title ?? 'Bokmärke'} — sp1e.se`;

  let host = bm.url ?? '';
  try { host = new URL(bm.url).hostname; } catch {}

  const tags = parseTags(bm.tags);

  const favicon = bm.favicon_url
    ? `<img class="favicon" src="${esc(bm.favicon_url)}" alt=""
            onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"
       ><span class="favicon-err" style="display:none">🔗</span>`
    : '<span class="favicon-err">🔗</span>';

  el.innerHTML = `
    <div class="card">
      <div class="favicon-wrap">
        ${favicon}
        <span style="font-size:0.62rem;color:var(--dim)">${esc(host)}</span>
      </div>
      <h1 class="bm-title">${esc(bm.title ?? '(namnlös)')}</h1>
      <p class="bm-url">${esc(bm.url ?? '')}</p>
      ${bm.description ? `<p class="bm-desc">${esc(bm.description)}</p>` : ''}
      ${tags.length ? `<div class="tags">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      <a class="visit-btn" href="${esc(bm.url ?? '#')}" target="_blank" rel="noopener noreferrer">
        Besök ↗
      </a>
    </div>`;
})();

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function parseTags(raw) {
  if (!raw) return [];
  try { const a = JSON.parse(raw); return Array.isArray(a) ? a : []; }
  catch { return raw.split(',').map(t => t.trim()).filter(Boolean); }
}
</script>
</body>
</html>
