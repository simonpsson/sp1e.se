<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sp1e.se</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    color: rgba(255,255,255,0.35);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-in 0.6s ease forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }
</style>
</head>
<body>
<span id="msg">Linking Spotify…</span>
<script>
  const p     = new URLSearchParams(location.search);
  const code  = p.get('code');
  const state = p.get('state');

  if (p.get('error') || !code || !state) {
    location.replace('/?spotify=denied');
  } else {
    fetch(
      '/api/spotify/exchange?code=' + encodeURIComponent(code) +
                              '&state=' + encodeURIComponent(state),
      { credentials: 'same-origin' }
    )
    .then(r => r.json())
    .then(d => { location.replace(d.success ? '/?spotify=linked' : '/?spotify=error'); })
    .catch(() => { location.replace('/?spotify=error'); });
  }
</script>
</body>
</html>
