<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publikt — sp1e.se</title>
<script>(function(){var t=localStorage.getItem('sp1e-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --border:    rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.14);
    --accent:    #4af2c8;
    --accent-dim:rgba(74,242,200,0.10);
    --text:      rgba(255,255,255,0.85);
    --muted:     rgba(255,255,255,0.40);
    --dim:       rgba(255,255,255,0.20);
    --topbar-bg:   rgba(10,10,15,0.92);
    --modal-bg:    #14141e;
    --ctx-bg:      #1c1c28;
    --heading:     #ffffff;
    --logo-col:    rgba(255,255,255,0.75);
    --logo-hover:  #ffffff;
    --hover-bg:    rgba(255,255,255,0.04);
  }
  [data-theme="light"] {
    --bg:          #f7f7f3;
    --surface:     #eeeee8;
    --surface2:    #e5e5de;
    --border:      rgba(0,0,0,0.08);
    --border-hi:   rgba(0,0,0,0.18);
    --text:        rgba(0,0,0,0.82);
    --muted:       rgba(0,0,0,0.45);
    --dim:         rgba(0,0,0,0.28);
    --topbar-bg:   rgba(247,247,243,0.92);
    --modal-bg:    #f0f0ea;
    --ctx-bg:      #e8e8e2;
    --heading:     #0a0a0f;
    --logo-col:    rgba(0,0,0,0.60);
    --logo-hover:  #0a0a0f;
    --hover-bg:    rgba(0,0,0,0.04);
    --danger-dim:  rgba(255,85,85,0.12);
  }
  [data-theme="light"] pre[class*="language-"],
  [data-theme="light"] .code-preview { background: #181822 !important; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    opacity: 0; animation: fade-in 0.4s ease 0.05s forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }

  /* ── Top bar ───────────────────────────────────────── */
  .topbar {
    height: 52px; display: flex; align-items: center;
    padding: 0 2rem; border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1.2rem; letter-spacing: 0.2em;
    color: var(--logo-col); text-decoration: none; transition: color 0.2s;
  }
  .logo:hover { color: var(--logo-hover); }
  .logo-one { font-size: 110%; display: inline-block; vertical-align: -0.04em; }

  /* ── Layout ────────────────────────────────────────── */
  main { max-width: 860px; margin: 0 auto; padding: 3.5rem 2rem 6rem; }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 3rem; color: var(--heading);
    margin-bottom: 0.4rem; letter-spacing: 0.02em;
  }
  .page-subtitle {
    font-size: 0.72rem; color: var(--dim); margin-bottom: 3rem;
  }

  /* ── Category section ──────────────────────────────── */
  .cat-section { margin-bottom: 3rem; }
  .cat-heading {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.9rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .cat-heading-icon { font-size: 1.1rem; }
  .cat-heading-name {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1.15rem; color: rgba(255,255,255,0.7); letter-spacing: 0.05em;
  }
  .cat-count { font-size: 0.6rem; color: var(--dim); margin-left: auto; }

  /* ── Item row ──────────────────────────────────────── */
  .item-row {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.7rem 0.75rem; border-radius: 7px;
    text-decoration: none; color: var(--text);
    transition: background 0.15s;
    margin-bottom: 0.25rem;
  }
  .item-row:hover { background: var(--surface); }
  .item-row-icon { font-size: 0.82rem; flex-shrink: 0; }
  .item-row-body { flex: 1; min-width: 0; }
  .item-row-title {
    font-size: 0.8rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-row-meta { font-size: 0.6rem; color: var(--dim); margin-top: 0.1rem; }
  .lang-badge {
    font-size: 0.55rem; padding: 0.1rem 0.32rem; border-radius: 3px;
    background: var(--accent-dim); border: 1px solid rgba(74,242,200,0.2);
    color: var(--accent); flex-shrink: 0;
  }
  .item-row-time { font-size: 0.6rem; color: var(--dim); flex-shrink: 0; }

  /* ── Empty state ───────────────────────────────────── */
  .empty {
    text-align: center; padding: 5rem 2rem;
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1.3rem; color: var(--muted);
  }

  footer {
    text-align: center; padding: 1.5rem;
    font-size: 0.62rem; color: var(--dim);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--dim); text-decoration: none; }
  footer a:hover { color: var(--muted); }

  @media (max-width: 640px) {
    main { padding: 2.5rem 1rem 4rem; }
    .topbar { padding: 0 1rem; }
    .page-title { font-size: 2.2rem; }
  }
  .topbar-right { display: flex; align-items: center; gap: 0.5rem; }
  .theme-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; padding: 0.15rem 0.4rem;
    border-radius: 6px; line-height: 1; opacity: 0.6;
    transition: opacity 0.2s;
  }
  .theme-btn:hover { opacity: 1; }
</style>
</head>
<body>

<header class="topbar">
  <a class="logo" href="/"><span>S</span><span>P</span><span class="logo-one">1</span><span>E</span></a>
  <div class="topbar-right">
    <button class="theme-btn" id="theme-btn" title="Byt tema">☀</button>
  </div>
</header>

<main id="main">
  <h1 class="page-title">Publikt</h1>
  <p class="page-subtitle">Delat av SP1E</p>
  <div id="content"></div>
</main>

<footer><a href="/">sp1e.se</a></footer>

<script>
const TYPE_ICONS = { note: '📝', snippet: '💻', file: '📁', bookmark: '🔗' };

(async () => {
  let data;
  try {
    const res = await fetch('/api/public/items');
    data = await res.json();
  } catch {
    document.getElementById('content').innerHTML = '<p class="empty">Kunde inte ladda.</p>';
    return;
  }

  const items = data.items ?? [];
  if (!items.length) {
    document.getElementById('content').innerHTML = '<p class="empty">Inget delat ännu.</p>';
    return;
  }

  // Group by category
  const cats   = new Map(); // category_id → { name, icon, items[] }
  const noCat  = [];

  for (const item of items) {
    if (item.category_id) {
      if (!cats.has(item.category_id)) {
        cats.set(item.category_id, {
          name: item.category_name ?? item.category_id,
          icon: item.category_icon ?? '',
          items: [],
        });
      }
      cats.get(item.category_id).items.push(item);
    } else {
      noCat.push(item);
    }
  }

  let html = '';

  for (const [, cat] of cats) {
    html += `
      <section class="cat-section">
        <div class="cat-heading">
          <span class="cat-heading-icon">${cat.icon}</span>
          <span class="cat-heading-name">${esc(cat.name)}</span>
          <span class="cat-count">${cat.items.length} objekt</span>
        </div>
        ${cat.items.map(item => itemRow(item)).join('')}
      </section>`;
  }

  if (noCat.length) {
    html += `
      <section class="cat-section">
        <div class="cat-heading">
          <span class="cat-heading-name" style="color:var(--dim)">Övrigt</span>
        </div>
        ${noCat.map(item => itemRow(item)).join('')}
      </section>`;
  }

  document.getElementById('content').innerHTML = html;
})();

function itemRow(item) {
  const icon  = TYPE_ICONS[item.type] ?? '📄';
  const href  = itemHref(item);
  const isExt = item.type === 'bookmark' || item.type === 'file';
  const target = isExt ? ' target="_blank" rel="noopener"' : '';
  const meta  = item.subcategory_name ? esc(item.subcategory_name) : '';
  const extra = item.type === 'snippet' && item.language
    ? `<span class="lang-badge">${esc(item.language)}</span>` : '';

  return `
    <a class="item-row" href="${esc(href)}"${target}>
      <span class="item-row-icon">${icon}</span>
      <div class="item-row-body">
        <div class="item-row-title">${esc(item.title ?? '(namnlös)')}</div>
        ${meta ? `<div class="item-row-meta">${meta}</div>` : ''}
      </div>
      ${extra}
      <span class="item-row-time">${relTime(item.created_at)}</span>
    </a>`;
}

function itemHref(item) {
  if (item.type === 'note')     return `/public/note/?id=${item.id}`;
  if (item.type === 'snippet')  return `/public/snippet/?id=${item.id}`;
  if (item.type === 'bookmark') return item.url ?? '#';
  if (item.type === 'file')     return `/api/files/${item.id}/download`;
  return '#';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d < 1) return 'idag';
  if (d < 7) return `${d}d`;
  return new Date(iso).toLocaleDateString('sv-SE', { day:'numeric', month:'short' });
}

  // Theme toggle
  (function initTheme() {
    const btn = document.getElementById('theme-btn');
    function syncIcon() {
      const light = document.documentElement.getAttribute('data-theme') === 'light';
      if (btn) btn.textContent = light ? '🌙' : '☀';
      if (btn) btn.title = light ? 'Mörkt tema' : 'Ljust tema';
    }
    syncIcon();
    btn?.addEventListener('click', () => {
      const light = document.documentElement.getAttribute('data-theme') === 'light';
      document.documentElement.setAttribute('data-theme', light ? 'dark' : 'light');
      localStorage.setItem('sp1e-theme', light ? 'dark' : 'light');
      syncIcon();
    });
  })();
</script>
</body>
</html>
