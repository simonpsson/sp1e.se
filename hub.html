<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub — sp1e.se</title>
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/brand.css">
<style>
  :root {
    --bg:           #0a0a0f;
    --surface:      #12121a;
    --surface2:     #181822;
    --border:       rgba(255,255,255,0.07);
    --border-hi:    rgba(255,255,255,0.14);
    --accent:       #4af2c8;
    --accent-dim:   rgba(74,242,200,0.10);
    --accent-glow:  rgba(74,242,200,0.07);
    --text:         rgba(255,255,255,0.85);
    --muted:        rgba(255,255,255,0.40);
    --dim:          rgba(255,255,255,0.20);
    --danger:       #ff5555;
    --danger-dim:   rgba(255,85,85,0.10);
    --topbar-bg:    rgba(10,10,15,0.92);
    --modal-bg:     #14141e;
    --ctx-bg:       #1c1c28;
    --heading:      #ffffff;
    --logo-col:     rgba(255,255,255,0.75);
    --logo-hover:   #ffffff;
    --hover-bg:     rgba(255,255,255,0.04);
  }
  [data-theme="light"] {
    --bg:           #f7f7f3;
    --surface:      #ffffff;
    --surface2:     #e8e8e2;
    --border:       rgba(0,0,0,0.07);
    --border-hi:    rgba(0,0,0,0.12);
    --accent-dim:   rgba(74,242,200,0.20);
    --accent-glow:  rgba(74,242,200,0.12);
    --text:         rgba(0,0,0,0.82);
    --muted:        rgba(0,0,0,0.45);
    --dim:          rgba(0,0,0,0.28);
    --danger:       #cc2424;
    --danger-dim:   rgba(204,36,36,0.10);
    --topbar-bg:    rgba(247,247,243,0.92);
    --modal-bg:     #ffffff;
    --ctx-bg:       #f0f0eb;
    --heading:      #0d0d12;
    --logo-col:     rgba(0,0,0,0.55);
    --logo-hover:   #000000;
    --hover-bg:     rgba(0,0,0,0.04);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100%;
    opacity: 0;
    animation: fade-in 0.4s ease 0.1s forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }

  /* ── Top bar ───────────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    height: 60px;
    display: grid;
    grid-template-columns: 1fr minmax(200px, 480px) 1fr;
    align-items: center;
    gap: 1rem;
    padding: 0 2rem;
    background: var(--topbar-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 1.25rem; letter-spacing: 0.2em;
    color: var(--logo-col); text-decoration: none;
    transition: color 0.2s ease;
    justify-self: start;
  }
  .logo:hover { color: var(--logo-hover); }
  .logo-one { font-size: 110%; display: inline-block; vertical-align: -0.04em; }
  .topbar-search { position: relative; }
  .logout-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    color: var(--muted); letter-spacing: 0.05em;
    transition: color 0.2s ease; white-space: nowrap;
  }
  .logout-btn:hover { color: var(--text); }
  .logout-icon { display: none; }

  /* ── Layout ────────────────────────────────────────── */
  main { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 6rem; }

  /* ── Category grid ─────────────────────────────────── */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.875rem;
    margin-bottom: 3rem;
  }
  .cat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem 1rem;
    text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: 0.45rem; height: 100%;
    transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
  }
  .cat-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 28px var(--accent-glow);
  }
  .cat-icon  { font-size: 1.5rem; }
  .cat-name  { font-size: 0.8rem; color: var(--text); }
  .cat-count { font-size: 0.65rem; color: var(--muted); margin-top: auto; }

  /* ── Skeleton loader ───────────────────────────────── */
  .skel {
    background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.03) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: skel 1.4s ease infinite;
    border-radius: 12px; height: 96px;
  }
  @keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ── Section heading ───────────────────────────────── */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 1.2rem; letter-spacing: 0.05em;
    color: var(--muted); margin-bottom: 0.75rem;
  }

  /* ── Recent list ───────────────────────────────────── */
  .recent-list { list-style: none; }
  .recent-item {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.55rem 0.4rem; border-radius: 6px;
    border-bottom: 1px solid var(--border);
    color: inherit; text-decoration: none;
    transition: background 0.12s ease;
  }
  .recent-item:last-child { border-bottom: none; }
  .recent-item:hover { background: var(--hover-bg); }
  .recent-icon { font-size: 0.88rem; flex-shrink: 0; line-height: 1; }
  .recent-title {
    flex: 1; font-size: 0.78rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .recent-item:hover .recent-title { color: var(--accent); }
  .recent-cat {
    font-size: 0.58rem; color: var(--muted); flex-shrink: 0;
    padding: 0.1rem 0.4rem; border-radius: 3px;
    border: 1px solid var(--border); letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .recent-time { font-size: 0.60rem; color: var(--dim); flex-shrink: 0; }

  .empty { font-size: 0.75rem; color: var(--muted); padding: 1rem 0; }

  /* ── Search ──────────────────────────────────────── */
  .search-wrap { position: relative; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.85rem 1.1rem 0.85rem 2.75rem;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem;
    outline: none; transition: border-color 0.2s; letter-spacing: 0.02em;
  }
  .search-input:focus { border-color: var(--border-hi); }
  .search-input::placeholder { color: var(--dim); }
  .search-icon {
    position: absolute; left: 0.95rem; top: 50%; transform: translateY(-50%);
    font-size: 1rem; color: var(--dim); pointer-events: none; line-height: 1;
  }
  .search-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 200;
    background: var(--modal-bg); border: 1px solid var(--border-hi);
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    display: none;
  }
  .search-dropdown.open { display: block; }
  .search-group-head {
    font-size: 0.58rem; letter-spacing: 0.12em; color: var(--dim);
    padding: 0.6rem 0.9rem 0.25rem; text-transform: uppercase;
    border-top: 1px solid var(--border);
  }
  .search-group-head:first-child { border-top: none; }
  .search-result {
    display: flex; align-items: flex-start; gap: 0.65rem;
    padding: 0.55rem 0.9rem; cursor: pointer;
    transition: background 0.1s;
  }
  .search-result:hover, .search-result.focused { background: var(--hover-bg); }
  .search-result-icon { font-size: 0.82rem; flex-shrink: 0; padding-top: 0.1rem; }
  .search-result-body { flex: 1; min-width: 0; }
  .search-result-title {
    font-size: 0.78rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .search-result-meta { font-size: 0.6rem; color: var(--dim); }
  .search-result-preview {
    font-size: 0.63rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 0.1rem;
  }
  .search-footer {
    padding: 0.5rem 0.9rem; border-top: 1px solid var(--border);
    font-size: 0.65rem; color: var(--dim); text-align: center;
    cursor: pointer; transition: color 0.15s;
  }
  .search-footer:hover { color: var(--accent); }
  .search-empty { padding: 1.25rem 0.9rem; font-size: 0.75rem; color: var(--muted); text-align: center; }

  /* ── Progress bar ──────────────────────────────────── */
  #progress {
    position: fixed; top: 0; left: 0; width: 100%; height: 2px;
    z-index: 200; pointer-events: none;
    background: linear-gradient(90deg, var(--accent) 40%, transparent 100%);
    background-size: 200% 100%; background-position: 100% 0;
    transition: opacity 0.3s;
  }
  #progress.running { animation: progress-slide 1.2s linear infinite; opacity: 1; }
  #progress.idle    { opacity: 0; }
  @keyframes progress-slide {
    from { background-position: 100% 0; }
    to   { background-position: -100% 0; }
  }

  /* ── Toast ─────────────────────────────────────────── */
  #toast-area {
    position: fixed; top: 1rem; right: 1rem; z-index: 300;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .toast {
    background: rgba(220,60,60,0.15); border: 1px solid rgba(220,60,60,0.35);
    color: rgba(255,180,180,0.95); border-radius: 6px;
    padding: 0.55rem 1rem; font-size: 0.72rem; letter-spacing: 0.04em;
    opacity: 0; transform: translateY(-6px);
    transition: opacity 0.2s, transform 0.2s;
    max-width: 320px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Theme toggle + export ─────────────────────────── */
  .topbar-right { display: flex; align-items: center; gap: 0.75rem; justify-self: end; }
  .theme-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; padding: 0.15rem 0.4rem;
    border-radius: 6px; line-height: 1; opacity: 0.6;
    transition: opacity 0.2s;
  }
  .theme-btn:hover { opacity: 1; }
  .export-btn {
    background: none; border: none;
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    color: var(--dim); cursor: pointer; letter-spacing: 0.03em;
    padding: 0; opacity: 0.7;
    transition: color 0.2s, opacity 0.2s;
  }
  .export-btn:hover { color: var(--muted); opacity: 1; }
  .export-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Recent section header ─────────────────────────── */
  .section-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .section-row .section-title { margin: 0; }

  @media (max-width: 640px) {
    main { padding: 1.5rem 1rem 4rem; }
    .topbar { padding: 0 1rem; grid-template-columns: auto 1fr auto; gap: 0.6rem; }
    .topbar-right { gap: 0.4rem; }
    .cat-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .logout-label { display: none; }
    .logout-icon  { display: inline; font-size: 1rem; opacity: 0.6; }
    .logout-btn:hover .logout-icon { opacity: 1; }
    .export-btn { display: none; }
  }

  /* ── Art gallery ───────────────────────────────────── */
  .gallery-section {
    margin-bottom: 3rem;
  }
  .gallery-frame {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #050508;
    border: 1px solid var(--border);
    cursor: pointer;
    /* aspect-ratio set by JS based on image */
    aspect-ratio: 16/9;
  }
  .gallery-frame img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 1.5s ease;
    opacity: 0;
  }

  /* overlay controls */
  .gallery-overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    opacity: 0; transition: opacity 0.25s ease;
    pointer-events: none;
  }
  .gallery-frame:hover .gallery-overlay { opacity: 1; pointer-events: all; }

  .g-arrow {
    width: 44px; height: 80px;
    background: rgba(0,0,0,0.45);
    border: none; cursor: pointer; color: rgba(255,255,255,0.75);
    font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .g-arrow:first-child { border-radius: 0 8px 8px 0; }
  .g-arrow:last-child  { border-radius: 8px 0 0 8px; }
  .g-arrow:hover { background: rgba(0,0,0,0.7); color: #fff; }

  .g-pause-icon {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.5rem; color: rgba(255,255,255,0.5);
    pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  .gallery-frame:hover.paused .g-pause-icon { opacity: 1; }

  /* progress bar */
  .gallery-progress {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px; z-index: 5;
    background: rgba(255,255,255,0.08);
  }
  .gallery-progress-bar {
    height: 100%; width: 0;
    background: rgba(255,255,255,0.35);
    transition: none;
  }
  .gallery-progress-bar.running {
    transition: width 20s linear;
    width: 100%;
  }

  /* caption */
  .gallery-caption {
    display: flex; align-items: baseline; gap: 0.75rem;
    padding: 0.65rem 0.25rem 0;
    flex-wrap: wrap;
  }
  .g-artist {
    font-size: 0.68rem; color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .g-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 300;
    font-size: 1rem; color: var(--text);
    letter-spacing: 0.01em;
  }
  .g-year {
    font-size: 0.65rem; color: var(--dim);
    letter-spacing: 0.04em; margin-left: auto;
  }

  @media (max-width: 768px) {
    .gallery-section {
      margin-left: -1rem;
      margin-right: -1rem;
    }
    .gallery-frame { border-radius: 0; border-left: none; border-right: none; }
    .gallery-caption { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>

  <div class="topbar-search search-wrap">

           placeholder="Sök anteckningar, snippets, filer, bokmärken…"

  <div class="cat-grid" id="cat-grid">
    <div class="skel"></div><div class="skel"></div>

<script>
// ── Progress + Toast ──────────────────────────────────
const progressEl = document.getElementById('progress');
function startProgress() { progressEl.className = 'running'; }
function stopProgress()  { progressEl.className = 'idle'; }

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-area').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 250); }, 3000);
}

async function fetchJsonOrThrow(url) {
  const res = await fetch(url, { credentials: 'same-origin' });
  let body = null;
  try { body = await res.json(); } catch {}
  if (!res.ok) {
    const message = body?.details || body?.error || `${res.status} ${res.statusText || 'Request failed'}`;
    throw new Error(message);
  }
  return body ?? {};
}

(async () => {
  // ── Auth check ──────────────────────────────────────
  try {
    const r = await fetch('/api/auth/check', { credentials: 'same-origin' });
    const d = await r.json();
    if (!d.authenticated) { location.href = '/'; return; }
  } catch { location.href = '/'; return; }

  // ── Search ──────────────────────────────────────────
  initSearch();

  // ── Keyboard shortcut: / focuses search ─────────────
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('search-input').focus();
    }
  });

  // ── Logout ──────────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
    location.href = '/';
  });

  // ── Fetch + render ──────────────────────────────────
  startProgress();
  const [catsResult, recentResult] = await Promise.allSettled([
    fetchJsonOrThrow('/api/categories'),
    fetchJsonOrThrow('/api/recent'),
  ]);
  stopProgress();

  const categoryError = catsResult.status === 'rejected'
    ? (catsResult.reason?.message || 'Kunde inte ladda kategorier.')
    : '';
  const recentError = recentResult.status === 'rejected'
    ? (recentResult.reason?.message || 'Kunde inte ladda senaste.')
    : '';

  if (categoryError) showToast(categoryError);
  if (recentError) showToast(recentError);

  renderGrid(catsResult.status === 'fulfilled' ? (catsResult.value.categories ?? []) : [], categoryError);
  renderRecent(recentResult.status === 'fulfilled' ? (recentResult.value.items ?? []) : [], recentError);
})();

// ─── Search ───────────────────────────────────────────

let searchTimer = null;

function initSearch() {
  const input    = document.getElementById('search-input');
  const dropdown = document.getElementById('search-dropdown');

  input.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = input.value.trim();
    if (!q) { closeDropdown(); return; }
    searchTimer = setTimeout(() => runSearch(q), 300);
  });

  input.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.search-result');
    const focused = dropdown.querySelector('.search-result.focused');
    const idx = focused ? [...items].indexOf(focused) : -1;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = items[idx + 1] ?? items[0];
      focused?.classList.remove('focused');
      next?.classList.add('focused');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = items[idx - 1] ?? items[items.length - 1];
      focused?.classList.remove('focused');
      prev?.classList.add('focused');
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (focused) { focused.click(); return; }
      const q = input.value.trim();
      if (q) location.href = `/hub/search?q=${encodeURIComponent(q)}`;
    } else if (e.key === 'Escape') {
      closeDropdown();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) closeDropdown();
  });
}

async function runSearch(q) {
  const dropdown = document.getElementById('search-dropdown');
  dropdown.innerHTML = '<div class="search-empty">Söker…</div>';
  dropdown.classList.add('open');

  try {
    const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}`, { credentials: 'same-origin' });
    const data = await res.json();
    renderDropdown(data.results ?? [], q);
  } catch {
    dropdown.innerHTML = '<div class="search-empty">Kunde inte söka.</div>';
  }
}

const TYPE_ICONS = { note: '📝', snippet: '💻', file: '📁', bookmark: '🔗' };
const TYPE_LABELS = { note: 'Anteckningar', snippet: 'Snippets', file: 'Filer', bookmark: 'Bokmärken' };

function renderDropdown(results, q) {
  const dropdown = document.getElementById('search-dropdown');
  if (!results.length) {
    dropdown.innerHTML = '<div class="search-empty">Inga träffar.</div>';
    return;
  }

  // Group by type, keep at most 3 per group in the dropdown
  const groups = {};
  for (const r of results) {
    if (!groups[r.type]) groups[r.type] = [];
    if (groups[r.type].length < 3) groups[r.type].push(r);
  }

  let html = '';
  for (const type of ['note', 'snippet', 'file', 'bookmark']) {
    const items = groups[type];
    if (!items?.length) continue;
    html += `<div class="search-group-head">${TYPE_LABELS[type]}</div>`;
    for (const item of items) {
      const breadcrumb = item.breadcrumb
        ? `${esc(item.breadcrumb.cat_name)} › ${esc(item.breadcrumb.name)}`
        : '';
      const preview = (item.preview ?? '').replace(/[#*`_~]/g,'').slice(0, 80);
      html += `
        <div class="search-result" data-type="${esc(item.type)}" data-id="${esc(item.id)}"
             data-url="${esc(item.url ?? '')}">
          <span class="search-result-icon">${TYPE_ICONS[item.type] ?? '📄'}</span>
          <div class="search-result-body">
            <div class="search-result-title">${esc(item.title ?? '(namnlös)')}</div>
            ${breadcrumb ? `<div class="search-result-meta">${breadcrumb}</div>` : ''}
            ${preview ? `<div class="search-result-preview">${esc(preview)}</div>` : ''}
          </div>
        </div>`;
    }
  }

  const total = results.length;
  html += `<div class="search-footer">Tryck Enter för att se alla ${total > 20 ? '20+' : total} träffar</div>`;

  dropdown.innerHTML = html;

  dropdown.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => navigateResult(el.dataset));
  });
  dropdown.querySelector('.search-footer')?.addEventListener('click', () => {
    const q2 = document.getElementById('search-input').value.trim();
    if (q2) location.href = `/hub/search?q=${encodeURIComponent(q2)}`;
  });
}

function navigateResult({ type, id, url }) {
  closeDropdown();
  if (type === 'note')     location.href = `/hub/note/?id=${id}`;
  else if (type === 'snippet')  location.href = `/hub/snippet/?id=${id}`;
  else if (type === 'bookmark') window.open(url, '_blank', 'noopener');
  else if (type === 'file')     window.open(`/api/files/${id}/download`, '_blank');
}

function closeDropdown() {
  const d = document.getElementById('search-dropdown');
  d.classList.remove('open');
  d.innerHTML = '';
}

function renderGrid(cats, error) {
  const el = document.getElementById('cat-grid');
  if (error) {
    el.innerHTML = `<p class="empty">${esc(error)}</p>`;
    return;
  }
  if (!cats.length) {
    el.innerHTML = '<p class="empty">Inga kategorier ännu.</p>';
    return;
  }
  el.innerHTML = cats.map(c => `
    <a class="cat-card" href="/hub/category/?id=${esc(c.id)}">
      <span class="cat-icon">${c.icon ?? ''}</span>
      <span class="cat-name">${esc(c.name)}</span>
      <span class="cat-count">${c.item_count ?? 0} objekt</span>
    </a>
  `).join('');
}

function recentHref(item) {
  if (item.type === 'note')     return `/hub/note/?id=${item.id}`;
  if (item.type === 'snippet')  return `/hub/snippet/?id=${item.id}`;
  if (item.type === 'bookmark') return item.extra ?? '#';
  if (item.type === 'file')     return `/api/files/${item.id}/download`;
  return '#';
}

const RECENT_ICONS = { note: '📝', snippet: '💻', file: '📎', bookmark: '🔗' };

function renderRecent(items, error) {
  const el = document.getElementById('recent-list');
  if (error) {
    el.innerHTML = `<li class="empty">${esc(error)}</li>`;
    return;
  }
  if (!items.length) {
    el.innerHTML = '<li class="empty">Inga objekt ännu.</li>';
    return;
  }
  el.innerHTML = items.map(item => {
    const href   = recentHref(item);
    const isExt  = item.type === 'bookmark' || item.type === 'file';
    const target = isExt ? ' target="_blank" rel="noopener"' : '';
    const icon   = RECENT_ICONS[item.type] ?? '📄';
    const cat    = item.category_name ? `<span class="recent-cat">${esc(item.category_name)}</span>` : '';
    return `<a class="recent-item" href="${esc(href)}"${target}>
        <span class="recent-icon">${icon}</span>
        <span class="recent-title">${esc(item.title ?? '(namnlös)')}</span>
        ${cat}
        <span class="recent-time">${relTime(item.created_at)}</span>
      </a>`;
  }).join('');
}

// ── Theme ─────────────────────────────────────────────
(function initTheme() {
  const btn = document.getElementById('theme-btn');
  function syncIcon() {
    const light = document.documentElement.getAttribute('data-theme') === 'light';
    if (btn) btn.textContent = light ? '🌙' : '☀';
    if (btn) btn.title = light ? 'Mörkt tema' : 'Ljust tema';
  }
  syncIcon();
  btn?.addEventListener('click', () => {
    const light = document.documentElement.getAttribute('data-theme') === 'light';
    document.documentElement.setAttribute('data-theme', light ? 'dark' : 'light');
    localStorage.setItem('sp1e-theme', light ? 'dark' : 'light');
    syncIcon();
  });
})();

// ── Export ────────────────────────────────────────────
document.getElementById('export-btn')?.addEventListener('click', doExport);

async function doExport() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true; btn.textContent = '↓ Hämtar…';
  startProgress();

  try {
    const res = await fetch('/api/export', { credentials: 'same-origin' });
    if (!res.ok) throw new Error();
    const data = await res.json();

    const zip      = new JSZip();
    const dateStr  = new Date().toISOString().slice(0, 10);
    const root     = zip.folder(`sp1e-export-${dateStr}`);

    // Notes → notes/{category}/{title}.md
    const notesDir = root.folder('notes');
    for (const n of data.notes ?? []) {
      const cat  = sanitizeName(n.category_name ?? 'okategoriserat');
      const name = sanitizeName(n.title ?? 'namnlos') + '.md';
      const fm   = `---\ntitle: ${n.title ?? ''}\ncreated: ${(n.created_at ?? '').slice(0,10)}\ntags: [${parseTags(n.tags).join(', ')}]\n---\n\n`;
      notesDir.folder(cat).file(name, fm + (n.content ?? ''));
    }

    // Snippets → snippets/{category}/{title}.ext
    const LANG_EXT = {
      sql:'sql', dax:'dax', python:'py', m:'m', pyspark:'py',
      javascript:'js', typescript:'ts', bash:'sh', json:'json', yaml:'yaml', other:'txt',
    };
    const snipsDir = root.folder('snippets');
    for (const s of data.snippets ?? []) {
      const cat  = sanitizeName(s.category_name ?? 'okategoriserat');
      const ext  = LANG_EXT[s.language] ?? 'txt';
      const name = sanitizeName(s.title ?? 'namnlos') + '.' + ext;
      snipsDir.folder(cat).file(name, s.code ?? '');
    }

    // Bookmarks
    root.file('bookmarks.json', JSON.stringify(
      (data.bookmarks ?? []).map(b => ({
        title: b.title, url: b.url, description: b.description || undefined,
        tags: parseTags(b.tags), created_at: b.created_at,
      })), null, 2
    ));

    // File metadata
    root.file('files.json', JSON.stringify(
      (data.files ?? []).map(f => ({
        filename: f.filename, mime_type: f.mime_type, size: f.size,
        category: f.category_name || null, is_public: !!f.is_public,
        created_at: f.created_at,
      })), null, 2
    ));

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: `sp1e-export-${dateStr}.zip` });
    document.body.appendChild(a);
    a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch {
    showToast('Export misslyckades.');
  } finally {
    btn.disabled = false; btn.textContent = '↓ Exportera allt';
    stopProgress();
  }
}

function sanitizeName(s) {
  return String(s ?? '').replace(/[/\\:*?"<>|]/g, '_').trim().slice(0, 80) || 'namnlos';
}

function parseTags(raw) {
  if (!raw) return [];
  try { const a = JSON.parse(raw); return Array.isArray(a) ? a : []; }
  catch { return String(raw).split(',').map(t => t.trim()).filter(Boolean); }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)   return 'just nu';
  if (m < 60)  return m + ' min sedan';
  const h = Math.floor(m / 60);
  if (h < 24)  return h + (h === 1 ? ' timme sedan' : ' timmar sedan');
  const d = Math.floor(h / 24);
  if (d < 7)   return d + (d === 1 ? ' dag sedan' : ' dagar sedan');
  return new Date(iso).toLocaleDateString('sv-SE', { day:'numeric', month:'short', year:'numeric' });
}

// ── Art Gallery ───────────────────────────────────────
(function initGallery() {
  const CACHE_KEY   = 'sp1e-gallery-v1';
  const INTERVAL_MS = 20_000;
  const FADE_MS     = 1500;
  const IMG_BASE    = 'https://www.artic.edu/iiif/2';
  const AIC_URL     = 'https://api.artic.edu/api/v1/artworks/search';

  let artworks = [];
  let current  = 0;
  let paused   = false;
  let timer    = null;
  // front = currently visible img element; back = staging slot
  let front, back;

  const section  = document.getElementById('gallery-section');
  const frame    = document.getElementById('gallery-frame');
  const imgA     = document.getElementById('g-img-a');
  const imgB     = document.getElementById('g-img-b');
  const bar      = document.getElementById('g-progress-bar');
  const artistEl = document.getElementById('g-artist');
  const titleEl  = document.getElementById('g-title');
  const yearEl   = document.getElementById('g-year');

  const imgUrl = id => `${IMG_BASE}/${id}/full/1200,/0/default.jpg`;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function resetBar() {
    bar.classList.remove('running');
    void bar.offsetWidth;
    bar.style.width = '0';
  }

  function startBar() {
    if (paused) return;
    void bar.offsetWidth;
    bar.classList.add('running');
  }

  function setCaption(art) {
    artistEl.textContent = art.artist_title || '';
    titleEl.textContent  = art.title        || '';
    yearEl.textContent   = art.date_display || '';
  }

  // Show the very first painting (no crossfade, just appear)
  function showFirst(art) {
    front = imgA; back = imgB;
    front.style.cssText = 'z-index:2;opacity:0;transition:opacity 1.5s ease';
    back.style.cssText  = 'z-index:1;opacity:0;transition:opacity 1.5s ease';
    front.src = imgUrl(art.image_id);
    front.alt = art.title || '';
    setCaption(art);
    front.onload = () => {
      front.onload = null;
      front.style.opacity = '1';
      startBar();
    };
    front.onerror = () => { front.onerror = null; };
  }

  // Crossfade to a new artwork
  function crossfade(art) {
    back.onload = back.onerror = null;
    back.src = imgUrl(art.image_id);
    back.alt = art.title || '';

    function doSwap() {
      // back is fully loaded; place it below front and make it visible
      back.style.opacity = '1';
      // fade out front — back shows through
      front.style.opacity = '0';
      setCaption(art);

      // after fade completes, swap roles
      setTimeout(() => {
        const oldFront = front;
        front = back;
        back  = oldFront;
        front.style.zIndex = '2';
        back.style.zIndex  = '1';
        back.style.opacity = '0'; // reset for next use
        resetBar();
        startBar();
      }, FADE_MS + 100);
    }

    if (back.complete && back.naturalWidth > 0) {
      doSwap();
    } else {
      back.onload  = () => { back.onload = back.onerror = null; doSwap(); };
      back.onerror = () => { back.onload = back.onerror = null; advance(1); };
    }

    // Preload next image
    const next = artworks[(current + 1) % artworks.length];
    if (next) new Image().src = imgUrl(next.image_id);
  }

  function advance(delta) {
    current = (current + (delta ?? 1) + artworks.length) % artworks.length;
    crossfade(artworks[current]);
    clearInterval(timer);
    if (!paused) timer = setInterval(() => advance(1), INTERVAL_MS);
  }

  async function fetchArtworks() {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) { try { return JSON.parse(cached); } catch {} }
    const res = await fetch(AIC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        q: 'impressionism',
        query: { bool: { must: [
          { term:   { is_public_domain: true } },
          { exists: { field: 'image_id' } },
          { term:   { classification_title: 'painting' } },
        ]}},
        fields: ['id', 'title', 'artist_title', 'date_display', 'image_id'],
        limit: 50,
      }),
    });
    if (!res.ok) throw new Error('gallery API error');
    const data = await res.json();
    const items = (data.data ?? []).filter(d => d.image_id);
    sessionStorage.setItem(CACHE_KEY, JSON.stringify(items));
    return items;
  }

  async function init() {
    try {
      const raw = await fetchArtworks();
      if (!raw.length) return;
      artworks = shuffle(raw);
      section.style.display = '';
      showFirst(artworks[0]);
      timer = setInterval(() => advance(1), INTERVAL_MS);
    } catch { /* silently hide gallery */ }
  }

  // Pause on hover
  frame.addEventListener('mouseenter', () => {
    paused = true;
    frame.classList.add('paused');
    clearInterval(timer);
    bar.classList.remove('running');
  });
  frame.addEventListener('mouseleave', () => {
    paused = false;
    frame.classList.remove('paused');
    resetBar();
    startBar();
    timer = setInterval(() => advance(1), INTERVAL_MS);
  });

  // Arrow buttons
  document.getElementById('g-prev').addEventListener('click', e => { e.stopPropagation(); advance(-1); });
  document.getElementById('g-next').addEventListener('click', e => { e.stopPropagation(); advance(1);  });

  // Click to open artwork page on AIC website
  frame.addEventListener('click', () => {
    const art = artworks[current];
    if (art?.id) window.open(`https://www.artic.edu/artworks/${art.id}`, '_blank', 'noopener');
  });

  init();
})();
</script>
