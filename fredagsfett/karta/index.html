<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>𓀂 · Karta</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Public+Sans:wght@300;400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/fredagsfett/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" crossorigin>
<style>
  .page-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.2rem 0.4rem 1.2rem;
    flex-wrap: wrap;
  }
  .page-head .kicker { color: var(--sage); }
  .page-head h1 {
    margin: 0;
    color: var(--ink);
    font: italic 500 clamp(2rem, 3.8vw, 2.8rem) var(--font-display);
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  .page-head .quote {
    color: var(--muted);
    font: italic 400 0.95rem var(--font-display);
    max-width: 36ch;
    text-align: right;
  }

  .map-card { padding: 0; overflow: hidden; }

  .map-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--line-soft);
    background: var(--paper);
  }
  .map-toolbar .save-status {
    margin-left: auto;
    color: var(--muted);
    font: italic 400 0.92rem var(--font-display);
  }

  #map {
    width: 100%;
    height: clamp(420px, 64vh, 720px);
    background: var(--paper-2);
  }

  /* Tame Leaflet's default light controls to match cream paper */
  .leaflet-control-attribution {
    background: rgba(243, 239, 231, 0.85) !important;
    color: var(--muted) !important;
    font-family: var(--font-mono);
    font-size: 0.62rem;
  }
  .leaflet-control-attribution a { color: var(--sage) !important; }
  .leaflet-bar a, .leaflet-draw-toolbar a {
    background-color: var(--paper) !important;
    color: var(--ink) !important;
    border-bottom-color: var(--line-soft) !important;
  }
  .leaflet-bar a:hover, .leaflet-draw-toolbar a:hover {
    background-color: var(--sage-tint) !important;
  }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--paper) !important;
    color: var(--ink-2) !important;
    border: 1px solid var(--line) !important;
    box-shadow: 0 18px 60px rgba(32, 30, 27, 0.18) !important;
  }
  .leaflet-popup-content {
    font: italic 400 0.95rem var(--font-display);
  }

  .saved-block {
    padding: 1rem 1.1rem 1.2rem;
    background: var(--paper);
    border-top: 1px solid var(--line-soft);
  }
  .saved-block h2 {
    margin: 0 0 0.7rem;
    color: var(--ink);
    font: italic 500 1.3rem var(--font-display);
    letter-spacing: -0.005em;
  }
  .saved-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.7rem;
  }
  .saved-card {
    display: grid;
    gap: 0.32rem;
    padding: 0.7rem 0.85rem;
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    background: var(--bg);
    transition: border-color 0.15s, background 0.15s;
  }
  .saved-card:hover { border-color: var(--sage); background: var(--sage-tint); }
  .saved-card strong {
    color: var(--ink);
    font: italic 500 1.05rem var(--font-display);
    letter-spacing: -0.005em;
    font-weight: 500;
  }
  .saved-card .tiny { color: var(--muted); }
  .saved-card .row { display: flex; gap: 0.32rem; flex-wrap: wrap; margin-top: 0.18rem; }
  .saved-card button {
    padding: 0.32rem 0.6rem;
    border: 1px solid var(--line);
    border-radius: 5px;
    background: transparent;
    color: var(--ink-2);
    font: 500 0.58rem var(--font-mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .saved-card button:hover { color: var(--ink); border-color: var(--sage); background: var(--sage-tint); }
  .saved-card button.danger { color: var(--rust); border-color: rgba(138,62,58,0.4); }
  .saved-card button.danger:hover { background: rgba(138,62,58,0.10); border-color: var(--rust); }
  .saved-empty {
    color: var(--muted);
    font: italic 400 0.92rem var(--font-display);
    grid-column: 1 / -1;
  }

  @media (max-width: 620px) {
    .page-head .quote { display: none; }
    #map { height: 56vh; }
  }
</style>
</head>
<body>
<main>
  <nav class="topbar" aria-label="𓀂 navigation">
    <div class="brand" aria-label="SP1E">
      <span class="sigil" aria-hidden="true">𓀂</span>
      <span class="wordmark">SP1E</span>
    </div>
    <div class="nav-row" role="tablist">
      <a href="/fredagsfett/hem" role="tab">Hem</a>
      <a href="/fredagsfett/kalender" role="tab">Kalender</a>
      <a href="/fredagsfett/sp1wise" role="tab">Sp1wise</a>
      <a href="/fredagsfett/karta" class="active" role="tab" aria-selected="true">Karta</a>
      <a href="/fredagsfett/hem#chat" role="tab">Chat</a>
    </div>
    <div class="top-tools">
      <div class="clock">
        <span id="clock-time">—:—</span>
        <span class="date" id="clock-date">—</span>
      </div>
      <span class="user-chip" id="user-chip">
        <span class="av lg" id="user-av" data-color="sage">·</span>
        <span class="av-name" id="user-name">—</span>
        <span class="badge-admin" id="user-admin" hidden>ADMIN</span>
      </span>
    </div>
  </nav>

  <div class="page-head">
    <div>
      <p class="kicker">Karta · ritbara rutter</p>
      <h1>Vart är vi på väg?</h1>
    </div>
    <p class="quote">Rita en linje, släpp en pin, döp den och dela med resten av gruppen. Allt sparas på servern.</p>
  </div>

  <article class="card map-card">
    <div class="map-toolbar" role="toolbar" aria-label="Karta">
      <button type="button" class="btn" id="locate-btn" title="Centrera kartan på din position">📍 Min position</button>
      <button type="button" class="btn" id="stockholm-btn" title="Centrera på Stockholm">Stockholm</button>
      <button type="button" class="btn sage" id="save-btn" title="Spara nuvarande ritning som en namngiven rutt">Spara rutt</button>
      <button type="button" class="btn danger" id="clear-btn" title="Rensa allt på kartan">Rensa</button>
      <span class="save-status" id="save-status">Rita med verktygen till vänster på kartan.</span>
    </div>
    <div id="map"></div>
    <div class="saved-block">
      <h2>Sparade rutter</h2>
      <div class="saved-list" id="saved-list"></div>
    </div>
  </article>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js" crossorigin></script>
<script>
/* ─ Shared header helpers (clock + user chip) ──────────────────────────── */

function initialsOf(name) {
  return (name || '·').trim().split(/\s+/).map(p => p[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
}
const AVATAR_COLORS = ['sage','sage','sage','terra','sand','heather','blue','rust'];
function avatarColorFor(name) {
  if (!name) return 'sage';
  let h = 0;
  for (const ch of name) h = ((h << 5) - h + ch.charCodeAt(0)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
const SVENSKA_WD = ['SÖN','MÅN','TIS','ONS','TOR','FRE','LÖR'];
const ROMAN_M = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
function romanYear(n) {
  const map = [['M',1000],['CM',900],['D',500],['CD',400],['C',100],['XC',90],['L',50],['XL',40],['X',10],['IX',9],['V',5],['IV',4],['I',1]];
  let s = '', y = n;
  for (const [r, v] of map) while (y >= v) { s += r; y -= v; }
  return s;
}
function tickClock() {
  const d = new Date();
  document.getElementById('clock-time').textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  document.getElementById('clock-date').textContent = `${SVENSKA_WD[d.getUTCDay()]} · ${d.getUTCDate()}.${ROMAN_M[d.getUTCMonth()]}.${romanYear(d.getUTCFullYear())}`;
}
tickClock();
setInterval(tickClock, 30_000);

function showToast(message) {
  const t = document.getElementById('toast');
  t.textContent = message;
  t.classList.add('show');
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ─ Auth gate (matches the other fredagsfett pages) ───────────────────── */
async function api(path, options = {}) {
  const res = await fetch(path, {
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
  });
  const text = await res.text();
  const data = text ? JSON.parse(text) : {};
  if (!res.ok) throw new Error(data.error || 'Något gick fel.');
  return data;
}

async function gateOrInit() {
  try {
    const session = await api('/api/fredagsfett/session');
    if (!session.authenticated || session.needs_registration) {
      location.href = `/fredagsfett?next=${encodeURIComponent('/fredagsfett/karta')}`;
      return;
    }
    currentSession = session;
    // Hydrate user chip
    document.getElementById('user-name').textContent = session.user?.name || '';
    const av = document.getElementById('user-av');
    av.textContent = initialsOf(session.user?.name);
    av.dataset.color = avatarColorFor(session.user?.name);
    if (session.user?.is_admin) document.getElementById('user-admin').hidden = false;
    initMap();
  } catch {
    location.href = `/fredagsfett?next=${encodeURIComponent('/fredagsfett/karta')}`;
  }
}

/* ─ Leaflet map + draw tools (Gotland sage stroke) ────────────────────── */
const STOCKHOLM = [59.3293, 18.0686];
const SAGE_STROKE = '#6c7450';
let map, drawn, drawControl, currentSession = null, cachedRoutes = [];

function initMap() {
  map = L.map('map', { center: STOCKHOLM, zoom: 13 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors',
  }).addTo(map);

  drawn = new L.FeatureGroup();
  map.addLayer(drawn);

  drawControl = new L.Control.Draw({
    edit: { featureGroup: drawn, remove: true },
    draw: {
      polyline: { shapeOptions: { color: SAGE_STROKE, weight: 4 } },
      polygon:  { allowIntersection: false, showArea: true, shapeOptions: { color: SAGE_STROKE } },
      rectangle:{ shapeOptions: { color: SAGE_STROKE } },
      circle:   { shapeOptions: { color: SAGE_STROKE } },
      marker: true,
      circlemarker: false,
    },
  });
  map.addControl(drawControl);

  map.on(L.Draw.Event.CREATED, e => drawn.addLayer(e.layer));

  document.getElementById('locate-btn').addEventListener('click', () => {
    if (!navigator.geolocation) {
      setStatus('Geolokalisering stöds inte i den här webbläsaren.');
      return;
    }
    setStatus('Hämtar din position...');
    navigator.geolocation.getCurrentPosition(
      pos => { map.setView([pos.coords.latitude, pos.coords.longitude], 15); setStatus('Centrerad på din position.'); },
      err => { setStatus('Kunde inte hämta position: ' + err.message); },
      { enableHighAccuracy: true, timeout: 8000 },
    );
  });
  document.getElementById('stockholm-btn').addEventListener('click', () => {
    map.setView(STOCKHOLM, 13);
    setStatus('Centrerad på Stockholm.');
  });
  document.getElementById('save-btn').addEventListener('click', saveCurrentRoute);
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (!drawn.getLayers().length) return;
    if (!window.confirm('Rensa alla ritningar på kartan?')) return;
    drawn.clearLayers();
    setStatus('Kartan rensad.');
  });

  void loadRoutes();
}

function setStatus(text) {
  document.getElementById('save-status').textContent = text;
}

async function loadRoutes() {
  try {
    const data = await api('/api/fredagsfett/routes');
    cachedRoutes = data.routes || [];
    renderSavedList();
  } catch (err) {
    setStatus('Kunde inte hämta sparade rutter: ' + (err.message || 'okänt fel'));
  }
}

async function saveCurrentRoute() {
  if (!drawn.getLayers().length) { setStatus('Inget att spara — rita något först.'); return; }
  const name = window.prompt('Namn på rutten?', `Rutt ${new Date().toLocaleDateString('sv-SE')}`);
  if (!name) return;
  const geojson = drawn.toGeoJSON();
  setStatus('Sparar...');
  try {
    await api('/api/fredagsfett/routes', { method: 'POST', body: JSON.stringify({ name, geojson }) });
    await loadRoutes();
    setStatus(`Sparade "${name}".`);
    showToast(`Sparade "${name}".`);
  } catch (err) {
    setStatus('Kunde inte spara: ' + (err.message || 'okänt fel'));
  }
}

function renderSavedList() {
  const wrap = document.getElementById('saved-list');
  if (!cachedRoutes.length) {
    wrap.innerHTML = '<div class="saved-empty">Inga sparade rutter än. Rita något och tryck <em>Spara rutt</em>.</div>';
    return;
  }
  const selfId = currentSession?.user?.id;
  const isAdmin = !!currentSession?.user?.is_admin;
  wrap.innerHTML = cachedRoutes.map(r => {
    const canModify = (r.user_id && r.user_id === selfId) || isAdmin;
    const author = r.user_name ? ` · ${escapeHtml(r.user_name)}` : '';
    return `
    <div class="saved-card" data-route-id="${escapeAttr(r.id)}">
      <strong>${escapeHtml(r.name)}</strong>
      <span class="tiny">${escapeHtml((r.created_at || '').slice(0, 10))}${author}</span>
      <div class="row">
        <button type="button" data-action="load">Ladda</button>
        <button type="button" data-action="export">.geojson</button>
        ${canModify ? '<button type="button" class="danger" data-action="delete">Ta bort</button>' : ''}
      </div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.saved-card').forEach(card => {
    const id = card.dataset.routeId;
    card.addEventListener('click', e => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (!action) return;
      const route = cachedRoutes.find(r => r.id === id);
      if (!route) return;
      if (action === 'load') loadRouteOnto(route);
      if (action === 'export') downloadGeojson(route);
      if (action === 'delete') void deleteRoute(id);
    });
  });
}

function loadRouteOnto(route) {
  drawn.clearLayers();
  const layer = L.geoJSON(route.geojson, { style: { color: SAGE_STROKE, weight: 4 } });
  layer.eachLayer(l => drawn.addLayer(l));
  try { map.fitBounds(layer.getBounds(), { padding: [40, 40] }); } catch {}
  setStatus(`Laddade "${route.name}".`);
}

function downloadGeojson(route) {
  const blob = new Blob([JSON.stringify(route.geojson, null, 2)], { type: 'application/geo+json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${route.name.replace(/[^\w-]+/g, '_')}.geojson`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
}

async function deleteRoute(id) {
  if (!window.confirm('Ta bort rutten? Detta påverkar alla i gruppen.')) return;
  try {
    await api(`/api/fredagsfett/routes/${encodeURIComponent(id)}`, { method: 'DELETE' });
    await loadRoutes();
    setStatus('Rutten borttagen.');
  } catch (err) {
    setStatus('Kunde inte ta bort: ' + (err.message || 'okänt fel'));
  }
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[ch]));
}
function escapeAttr(value) { return escapeHtml(value); }

void gateOrInit();
</script>
</body>
</html>
