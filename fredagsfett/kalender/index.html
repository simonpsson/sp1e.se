<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𓀂 · Kalender</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --panel: rgba(10, 10, 10, 0.74);
    --card: rgba(255,255,255,0.04);
    --line: rgba(255,255,255,0.12);
    --line-hot: rgba(205,176,110,0.45);
    --text: rgba(255,255,255,0.88);
    --muted: rgba(255,255,255,0.50);
    --faint: rgba(255,255,255,0.30);
    --accent: rgba(205,176,110,0.92);
    --danger: rgba(255,104,84,0.94);
    --available: #8fcf9a;
    --maybe: #d9bd67;
    --unavailable: #d66f64;
  }
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    margin: 0;
    padding: clamp(1rem, 4vw, 2.5rem);
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.22), rgba(0,0,0,0.74)),
      url('/assets/landing/gallery-wall-wide.png') center / cover fixed,
      var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 52% 24%, rgba(255,255,255,0.08), transparent 24rem),
      linear-gradient(90deg, rgba(0,0,0,0.70), transparent 34%, transparent 66%, rgba(0,0,0,0.70));
  }
  main {
    position: relative;
    z-index: 1;
    width: min(1180px, 100%);
    margin: 0 auto;
  }
  .sp1e-wordmark {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    width: 156px;
    margin: 0 auto 1.35rem;
    color: rgba(255,255,255,0.9);
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.85rem;
    font-weight: 300;
    line-height: 1;
    text-align: center;
    text-shadow: 0 2px 24px rgba(0,0,0,0.70);
    font-variant-numeric: lining-nums;
    font-feature-settings: 'lnum' 1;
    user-select: none;
  }
  .sp1e-wordmark span {
    display: block;
    text-align: center;
  }
  .room {
    border: 1px solid var(--line);
    border-radius: 20px;
    overflow: hidden;
    background: var(--panel);
    box-shadow: 0 30px 110px rgba(0,0,0,0.52);
    backdrop-filter: blur(18px);
  }
  header {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: clamp(1.2rem, 3vw, 1.8rem);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  h1, h2, h3, p { margin-top: 0; }
  h1 {
    margin-bottom: 0.55rem;
    color: rgba(255,255,255,0.94);
    font-size: clamp(2.7rem, 8vw, 5rem);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: 0.08em;
  }
  h2 {
    margin-bottom: 0.35rem;
    color: rgba(255,255,255,0.9);
    font-size: 2rem;
    font-weight: 400;
  }
  h3 {
    margin-bottom: 0.75rem;
    color: rgba(255,255,255,0.84);
    font-size: 1.3rem;
    font-weight: 500;
  }
  .mono, .kicker, button, .button, label, .weekday, .tiny, .status-pill {
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .kicker {
    margin-bottom: 0.55rem;
    color: var(--accent);
    font-size: 0.72rem;
  }
  .nav {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .admin-nav {
    flex-direction: column;
    align-items: flex-end;
  }
  .button, button {
    min-height: 42px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    background: rgba(255,255,255,0.045);
    color: rgba(255,255,255,0.76);
    padding: 0.72rem 0.95rem;
    font-size: 0.68rem;
    cursor: pointer;
    text-decoration: none;
  }
  .icon-button {
    width: 44px;
    min-width: 44px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    line-height: 1;
  }
  .button:hover, button:hover, .button:focus-visible, button:focus-visible {
    color: rgba(255,255,255,0.94);
    border-color: var(--line-hot);
    outline: none;
  }
  button.active { border-color: var(--accent); color: rgba(255,255,255,0.94); }
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 1rem;
    padding: clamp(1rem, 3vw, 1.6rem);
  }
  .calendar-card, aside {
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    background: rgba(255,255,255,0.035);
  }
  .calendar-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .month-tools {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .summer {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0 1rem 1rem;
  }
  .view-mode { display: inline-flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .view-mode button { border: 0; padding: 0.4rem 0.75rem; background: transparent; color: var(--muted); }
  .view-mode button[aria-pressed="true"] { background: rgba(205,176,110,0.12); color: var(--text); }
  .day.heatmap-mode .answers { display: none; }
  .day.heatmap-mode .count { display: inline-block; font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text); margin-top: 0.6rem; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 1px;
    padding: 1px;
    background: rgba(255,255,255,0.08);
  }
  .weekday, .day {
    background: rgba(5,5,5,0.84);
  }
  .weekday {
    padding: 0.65rem 0.55rem;
    color: var(--faint);
    font-size: 0.62rem;
  }
  .day {
    min-height: 112px;
    padding: 0.65rem;
    text-align: left;
    color: var(--text);
  }
  .day.blank { opacity: 0.35; }
  .day.selected {
    outline: 1px solid var(--accent);
    outline-offset: -2px;
    background: rgba(205,176,110,0.07);
  }
  .day-number {
    display: flex;
    justify-content: space-between;
    color: rgba(255,255,255,0.84);
    font-size: 1.05rem;
  }
  .answers {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.8rem;
  }
  .avatar {
    display: inline-flex;
    width: 26px;
    height: 26px;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    color: #050505;
    font: 0.68rem 'DM Mono', monospace;
  }
  .avatar[data-status="AVAILABLE"] { background: var(--available); }
  .avatar[data-status="MAYBE"] { background: var(--maybe); }
  .avatar[data-status="UNAVAILABLE"] { background: var(--unavailable); }
  aside {
    align-self: start;
    padding: 1rem;
  }
  .panel-block + .panel-block {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  label {
    display: block;
    margin-bottom: 0.45rem;
    color: var(--muted);
    font-size: 0.68rem;
  }
  textarea {
    width: 100%;
    min-height: 94px;
    resize: vertical;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: rgba(0,0,0,0.35);
    color: var(--text);
    padding: 0.85rem;
    font: 1rem 'Cormorant Garamond', serif;
    outline: none;
  }
  textarea:focus { border-color: var(--line-hot); }
  input[type="time"], input[type="text"] {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: rgba(0,0,0,0.35);
    color: var(--text);
    padding: 0.72rem 0.78rem;
    font: 0.86rem 'DM Mono', monospace;
    outline: none;
  }
  input[type="time"]:focus, input[type="text"]:focus { border-color: var(--line-hot); }
  .time-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.85rem;
  }
  .time-comment {
    margin-bottom: 0.85rem;
  }
  .status-row {
    display: grid;
    gap: 0.5rem;
    margin-bottom: 0.85rem;
  }
  .day-times {
    display: grid;
    gap: 0.28rem;
    margin-top: 0.55rem;
  }
  .time-chip {
    display: inline-flex;
    max-width: 100%;
    width: fit-content;
    border: 1px solid rgba(205,176,110,0.32);
    border-radius: 999px;
    background: rgba(205,176,110,0.08);
    color: rgba(255,255,255,0.78);
    padding: 0.2rem 0.42rem;
    font: 0.58rem 'DM Mono', monospace;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .status-pill[data-status="AVAILABLE"].active { border-color: var(--available); }
  .status-pill[data-status="MAYBE"].active { border-color: var(--maybe); }
  .status-pill[data-status="UNAVAILABLE"].active { border-color: var(--unavailable); }
  .error {
    min-height: 1.2rem;
    color: var(--danger);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
  }
  .best-list, .detail-list, .locked-events-list {
    display: grid;
    gap: 0.55rem;
  }
  .best-item, .detail-item {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.75rem;
    background: rgba(0,0,0,0.22);
    color: var(--muted);
  }
  .best-item strong, .detail-item strong {
    display: block;
    color: var(--text);
    font-size: 1.05rem;
  }
  .locked-row {
    display: grid;
    gap: 0.18rem;
    text-align: left;
    border: 1px solid var(--line-hot);
    border-radius: 12px;
    padding: 0.75rem;
    background: rgba(205,176,110,0.06);
    color: var(--text);
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    text-transform: none;
    letter-spacing: 0;
    min-height: 0;
  }
  .locked-row:hover, .locked-row:focus-visible { border-color: var(--accent); }
  .locked-row .locked-date { color: var(--accent); font: 0.68rem 'DM Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; }
  .locked-row .locked-title { color: var(--text); font-size: 1.05rem; }
  .locked-row .locked-host, .locked-row .locked-count { color: var(--muted); font: 0.66rem 'DM Mono', monospace; letter-spacing: 0.06em; }
  .tiny { color: var(--muted); font-size: 0.66rem; }
  .event-card { border: 1px solid var(--line-hot); border-radius: 12px; padding: 0.85rem; background: rgba(205,176,110,0.08); margin-bottom: 0.8rem; }
  .event-card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.35rem; }
  .event-card-head strong { color: var(--accent); font-size: 1.1rem; }
  .event-card .tiny { display: block; margin-bottom: 0.18rem; }
  .lock-event-btn { margin-top: 0.6rem; }
  .lock-event-form { display: grid; gap: 0.55rem; margin-top: 0.6rem; padding: 0.75rem; border: 1px solid var(--line-hot); border-radius: 12px; background: rgba(205,176,110,0.05); }
  .lock-event-form select { width: 100%; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; background: rgba(0,0,0,0.35); color: var(--text); padding: 0.72rem 0.78rem; font: 0.86rem 'DM Mono', monospace; outline: none; }
  .lock-event-form select:focus { border-color: var(--line-hot); }
  .day.locked-event { border-color: var(--line-hot); box-shadow: inset 0 0 0 1px var(--line-hot); }
  .day.locked-event::before { content: '𓀂'; display: block; color: var(--accent); }
  body:not(.is-admin) [data-admin-only] { display: none !important; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 1.4rem;
    z-index: 50;
    transform: translateX(-50%);
    max-width: min(92vw, 28rem);
    padding: 0.7rem 1rem;
    border: 1px solid var(--line-hot);
    border-radius: 12px;
    background: rgba(10,10,10,0.92);
    color: var(--text);
    font: 0.78rem 'DM Mono', monospace;
    letter-spacing: 0.06em;
    box-shadow: 0 18px 60px rgba(0,0,0,0.55);
    animation: ff-toast-in 0.22s ease-out;
  }
  @keyframes ff-toast-in {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @media (max-width: 860px) {
    header, .layout { grid-template-columns: 1fr; }
    header { display: block; }
    .nav { margin-top: 1rem; }
    .day { min-height: 94px; }
  }
  @media (max-width: 620px) {
    body { padding: 0.75rem; }
    .calendar-grid { font-size: 0.9rem; }
    .day { min-height: 78px; padding: 0.5rem; }
    .weekday { padding: 0.45rem 0.3rem; letter-spacing: 0.04em; }
  }
</style>
</head>
<body>
<main>
  <div class="sp1e-wordmark" aria-label="SP1E" role="img">
    <span>S</span><span>P</span><span>1</span><span>E</span>
  </div>
  <section class="room">
    <header>
      <div>
        <p class="kicker">𓀂</p>
        <h1>Kalender</h1>
      </div>
      <nav class="nav admin-nav" aria-label="𓀂 navigation">
        <a class="button" href="/fredagsfett/sp1wise">SP1Wise</a>
        <a class="button icon-button" href="/fredagsfett/admin" aria-label="Dev console" title="Dev console">⚙</a>
      </nav>
    </header>
    <div class="layout">
      <section class="calendar-card">
        <div class="calendar-head">
          <button id="prev-month" type="button">Föregående</button>
          <h2 id="month-title">Laddar...</h2>
          <button id="next-month" type="button">Nästa</button>
        </div>
        <div class="summer" aria-label="Sommarvy">
          <button type="button" data-summer="06">Juni</button>
          <button type="button" data-summer="07">Juli</button>
          <button type="button" data-summer="08">Augusti</button>
          <div class="view-mode" role="tablist" aria-label="Vy">
            <button type="button" data-view-mode="initials" aria-pressed="true">Initialer</button>
            <button type="button" data-view-mode="heatmap"  aria-pressed="false">Värmekarta</button>
          </div>
        </div>
        <div class="calendar-grid" id="calendar-grid" aria-live="polite"></div>
      </section>
      <aside>
        <section class="panel-block">
          <div id="event-card" class="event-card" hidden>
            <div class="event-card-head">
              <strong id="event-card-title">Inlåst</strong>
              <span id="event-card-time" class="tiny"></span>
            </div>
            <div id="event-card-host" class="tiny"></div>
            <div id="event-card-location" class="tiny"></div>
            <div id="event-card-notes"></div>
            <div class="nav admin-only" data-admin-only style="margin-top:0.6rem">
              <button type="button" data-action="edit-event">Redigera</button>
              <button type="button" data-action="cancel-event">Avbryt inlåsning</button>
            </div>
          </div>
          <p class="kicker">Vald dag</p>
          <h3 id="selected-date-title">Välj ett datum</h3>
          <button id="lock-event-btn" type="button" class="lock-event-btn admin-only" data-admin-only hidden>Lås in dagen</button>
          <form id="lock-event-form" class="lock-event-form admin-only" data-admin-only hidden>
            <div>
              <label for="lock-title-input">Titel</label>
              <input id="lock-title-input" type="text" maxlength="80">
            </div>
            <div>
              <label for="lock-host-select">Värd</label>
              <select id="lock-host-select">
                <option value="">— Ingen vald —</option>
              </select>
            </div>
            <div>
              <label for="lock-location-input">Plats</label>
              <input id="lock-location-input" type="text" maxlength="200">
            </div>
            <div class="time-fields">
              <div>
                <label for="lock-start-input">Från</label>
                <input id="lock-start-input" type="time">
              </div>
              <div>
                <label for="lock-end-input">Till</label>
                <input id="lock-end-input" type="time">
              </div>
            </div>
            <div>
              <label for="lock-notes-input">Anteckningar</label>
              <textarea id="lock-notes-input" maxlength="500"></textarea>
            </div>
            <div class="nav" style="margin-top:0.2rem">
              <button type="submit">Bekräfta inlåsning</button>
              <button type="button" data-action="cancel-lock-form">Avbryt</button>
            </div>
            <div class="error" id="lock-event-error"></div>
          </form>
          <div class="status-row">
            <button class="status-pill" type="button" data-status="AVAILABLE">Tillgänglig</button>
            <button class="status-pill" type="button" data-status="MAYBE">Kanske</button>
            <button class="status-pill" type="button" data-status="UNAVAILABLE">Inte tillgänglig</button>
          </div>
          <label>Tidsintervall</label>
          <div class="time-fields">
            <div>
              <label for="time-start-input">Från</label>
              <input id="time-start-input" type="time">
            </div>
            <div>
              <label for="time-end-input">Till</label>
              <input id="time-end-input" type="time">
            </div>
          </div>
          <div class="time-comment">
            <label for="time-note-input">Kommentar på tiden</label>
            <input id="time-note-input" type="text" maxlength="160">
          </div>
          <label for="note-input">Notering</label>
          <textarea id="note-input" maxlength="240"></textarea>
          <div class="nav" style="margin-top:0.8rem">
            <button id="save-availability" type="button">Spara</button>
            <button id="delete-availability" type="button">Rensa</button>
          </div>
          <div class="error" id="calendar-error"></div>
        </section>
        <section class="panel-block">
          <h3>Inlåsta fredagar</h3>
          <div class="locked-events-list" id="locked-events-list"></div>
          <div class="tiny" id="locked-events-empty" hidden>Inga inlåsta datum framåt. <span id="best-dates-hint"></span></div>
        </section>
        <section class="panel-block">
          <p class="kicker">Svar på vald dag</p>
          <div class="detail-list" id="day-details"></div>
        </section>
      </aside>
    </div>
  </section>
</main>
<script>
// Group size fallback for heatmap tint. The /api/fredagsfett/admin/users endpoint
// is admin-only, so non-admins can't fetch it; we use a constant for this tiny
// private group. renderCalendar refines this from observed availability entries.
const GROUP_SIZE_FALLBACK = 4;

const state = {
  user: null,
  month: new Date().toISOString().slice(0, 7),
  entries: [],
  bestDates: [],
  selectedDate: new Date().toISOString().slice(0, 10),
  selectedStatus: 'AVAILABLE',
  selectedStartTime: '',
  selectedEndTime: '',
  selectedTimeNote: '',
  tapBusy: false,
  viewMode: sessionStorage.getItem('ff-calendar-view-mode') === 'heatmap' ? 'heatmap' : 'initials',
};
let currentSession = null;
const eventsByDate = new Map();
const monthTitle = document.getElementById('month-title');
const grid = document.getElementById('calendar-grid');
const errorBox = document.getElementById('calendar-error');
const noteInput = document.getElementById('note-input');
const timeStartInput = document.getElementById('time-start-input');
const timeEndInput = document.getElementById('time-end-input');
const timeNoteInput = document.getElementById('time-note-input');
const eventCard = document.getElementById('event-card');
const eventCardTitle = document.getElementById('event-card-title');
const eventCardTime = document.getElementById('event-card-time');
const eventCardHost = document.getElementById('event-card-host');
const eventCardLocation = document.getElementById('event-card-location');
const eventCardNotes = document.getElementById('event-card-notes');
const lockEventBtn = document.getElementById('lock-event-btn');
const lockEventForm = document.getElementById('lock-event-form');
const lockTitleInput = document.getElementById('lock-title-input');
const lockHostSelect = document.getElementById('lock-host-select');
const lockLocationInput = document.getElementById('lock-location-input');
const lockStartInput = document.getElementById('lock-start-input');
const lockEndInput = document.getElementById('lock-end-input');
const lockNotesInput = document.getElementById('lock-notes-input');
const lockEventError = document.getElementById('lock-event-error');

async function api(path, options = {}) {
  const res = await fetch(path, {
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
  });
  const text = await res.text();
  const data = text ? JSON.parse(text) : {};
  if (!res.ok) throw new Error(data.error || 'Något gick fel.');
  return data;
}

function monthName(month) {
  const [year, m] = month.split('-').map(Number);
  return new Date(year, m - 1, 1).toLocaleDateString('sv-SE', { month: 'long', year: 'numeric' });
}

function formatSwedishDate(date) {
  const [y, m, d] = date.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('sv-SE', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  });
}

function observedGroupSize() {
  // Derive group size from the union of users seen in the current availability
  // payload — the admin /users endpoint is gated. Falls back to constant.
  const ids = new Set();
  for (const entry of state.entries) {
    if (entry.user_id) ids.add(entry.user_id);
  }
  return Math.max(GROUP_SIZE_FALLBACK, ids.size);
}

function addMonths(month, delta) {
  const [year, m] = month.split('-').map(Number);
  return new Date(Date.UTC(year, m - 1 + delta, 1)).toISOString().slice(0, 7);
}

function initials(name) {
  return (name || '?').split(/\s+/).map(part => part[0]).join('').slice(0, 2).toUpperCase();
}

function entriesForDate(date) {
  return state.entries.filter(entry => entry.date === date);
}

function selfEntry(date) {
  return entriesForDate(date).find(entry => entry.is_self);
}

// Optimistically patch state.entries with the user's new status for `date`,
// then re-render the calendar. No refetch — caller revalidates via loadAvailability().
function applyOptimisticStatus(date, nextStatus) {
  const idx = state.entries.findIndex(entry => entry.date === date && entry.is_self);
  if (nextStatus === null) {
    if (idx !== -1) state.entries.splice(idx, 1);
  } else if (idx !== -1) {
    state.entries[idx] = { ...state.entries[idx], status: nextStatus };
  } else {
    state.entries.push({
      date,
      status: nextStatus,
      is_self: true,
      user_id: state.user?.id || currentSession?.user?.id || null,
      user_name: state.user?.name || currentSession?.user?.name || '',
      note: null,
      start_time: null,
      end_time: null,
      time_note: null,
    });
  }
  renderCalendar();
}

let toastTimer = null;
function showToast(message) {
  let toast = document.getElementById('ff-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'ff-toast';
    toast.className = 'toast';
    toast.setAttribute('role', 'status');
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.remove();
    toastTimer = null;
  }, 4000);
}

function showTapCycleHintOnce() {
  if (sessionStorage.getItem('ff-tap-cycle-hint-seen')) return;
  sessionStorage.setItem('ff-tap-cycle-hint-seen', '1');
  showToast('Tryck igen för att växla mellan tillgänglig / kanske / inte tillgänglig.');
}

const TAP_CYCLE = ['AVAILABLE', 'MAYBE', 'UNAVAILABLE', null];
async function tapCycleStatus(date) {
  // Snapshot the full entry, not just status, so revert restores notes/times intact.
  const prevEntry = state.entries.find(e => e.date === date && e.is_self) || null;
  const current = prevEntry?.status ?? null;
  const idx = TAP_CYCLE.indexOf(current);
  const next = TAP_CYCLE[(idx + 1) % TAP_CYCLE.length];

  errorBox.textContent = ''; // clear any stale error from a previous tap or save
  // Optimistic UI
  applyOptimisticStatus(date, next);

  try {
    if (next === null) {
      await api(`/api/fredagsfett/availability?date=${encodeURIComponent(date)}`, { method: 'DELETE' });
    } else {
      // Tap-cycle never sends time fields — server applies weekday default.
      await api('/api/fredagsfett/availability', {
        method: 'POST',
        body: JSON.stringify({ date, status: next }),
      });
    }
    await loadAvailability();
    showTapCycleHintOnce();
  } catch (err) {
    // Restore the full prior entry (or absence), not just status.
    const i = state.entries.findIndex(e => e.date === date && e.is_self);
    if (i !== -1) state.entries.splice(i, 1);
    if (prevEntry) state.entries.push(prevEntry);
    renderCalendar();
    errorBox.textContent = err.message;
  }
}

function formatTimeWindow(entry) {
  if (!entry?.start_time || !entry?.end_time) return '';
  return `${entry.start_time}-${entry.end_time}`;
}

function applyOwnEntryToForm(entry, resetIfMissing = false) {
  if (!entry && !resetIfMissing) return;
  state.selectedStatus = entry?.status || 'AVAILABLE';
  state.selectedStartTime = entry?.start_time || '';
  state.selectedEndTime = entry?.end_time || '';
  state.selectedTimeNote = entry?.time_note || '';
  if (document.activeElement !== noteInput) noteInput.value = entry?.note || '';
  if (document.activeElement !== timeStartInput) timeStartInput.value = state.selectedStartTime;
  if (document.activeElement !== timeEndInput) timeEndInput.value = state.selectedEndTime;
  if (document.activeElement !== timeNoteInput) timeNoteInput.value = state.selectedTimeNote;
}

function renderCalendar() {
  monthTitle.textContent = monthName(state.month);
  const [year, m] = state.month.split('-').map(Number);
  const first = new Date(year, m - 1, 1);
  const days = new Date(year, m, 0).getDate();
  const startOffset = (first.getDay() + 6) % 7;
  const weekdays = ['Mån', 'Tis', 'Ons', 'Tor', 'Fre', 'Lör', 'Sön'];
  grid.innerHTML = weekdays.map(day => `<div class="weekday">${day}</div>`).join('');
  for (let i = 0; i < startOffset; i++) {
    grid.insertAdjacentHTML('beforeend', '<div class="day blank" aria-hidden="true"></div>');
  }
  const isHeatmap = state.viewMode === 'heatmap';
  const groupSize = observedGroupSize();
  for (let day = 1; day <= days; day++) {
    const date = `${state.month}-${String(day).padStart(2, '0')}`;
    const entries = entriesForDate(date);
    const selected = date === state.selectedDate ? ' selected' : '';
    const event = eventsByDate.get(date);
    const chips = entries.map(entry => `<span class="avatar" data-status="${entry.status}" title="${entry.user_name}: ${entry.status}">${initials(entry.user_name)}</span>`).join('');
    const timeChips = entries
      .filter(entry => entry.start_time && entry.end_time)
      .map(entry => `<span class="time-chip" title="${escapeHtml(entry.user_name)} ${escapeHtml(entry.time_note || '')}">${escapeHtml(formatTimeWindow(entry))}</span>`)
      .join('');
    const yesCount = entries.filter(e => e.status === 'AVAILABLE').length;
    const maybeCount = entries.filter(e => e.status === 'MAYBE').length;
    const score = yesCount + maybeCount * 0.5;
    const intensity = Math.min(1, score / Math.max(1, groupSize));
    const heatStyle = isHeatmap && intensity > 0
      ? ` style="background: rgba(143,207,154,${(0.08 + intensity * 0.42).toFixed(3)});"`
      : '';
    const heatmapCls = isHeatmap ? ' heatmap-mode' : '';
    const isLocked = event && event.status === 'LOCKED';
    const dayMarkup = isLocked
      ? `<button class="day locked-event${heatmapCls}${selected}" type="button" data-date="${date}"${heatStyle}>`
      : `<button class="day${heatmapCls}${selected}" type="button" data-date="${date}"${heatStyle}>`;
    const countMarkup = isHeatmap
      ? `<span class="count">${yesCount}${maybeCount ? `+${maybeCount}` : ''}</span>`
      : '';
    grid.insertAdjacentHTML('beforeend', `
      ${dayMarkup}
        <span class="day-number"><span>${day}</span><span class="tiny">${entries.length || ''}</span></span>
        <span class="answers">${chips}</span>
        ${countMarkup}
        <span class="day-times">${timeChips}</span>
      </button>
    `);
  }
  renderSelectedDay();
}

function renderSelectedDay() {
  document.getElementById('selected-date-title').textContent = state.selectedDate || 'Välj ett datum';
  document.querySelectorAll('[data-status]').forEach(button => {
    if (button.classList.contains('status-pill')) button.classList.toggle('active', button.dataset.status === state.selectedStatus);
  });
  const own = selfEntry(state.selectedDate);
  applyOwnEntryToForm(own);
  document.querySelectorAll('.status-pill').forEach(button => button.classList.toggle('active', button.dataset.status === state.selectedStatus));
  renderEventForSelectedDay();
  const details = entriesForDate(state.selectedDate);
  document.getElementById('day-details').innerHTML = details.length
    ? details.map(entry => `<div class="detail-item"><strong>${escapeHtml(entry.user_name)}</strong><span>${statusLabel(entry.status)}</span>${formatTimeWindow(entry) ? `<span class="time-chip">${escapeHtml(formatTimeWindow(entry))}</span>` : ''}${entry.time_note ? `<p>${escapeHtml(entry.time_note)}</p>` : ''}${entry.note ? `<p>${escapeHtml(entry.note)}</p>` : ''}</div>`).join('')
    : '<p class="tiny">Inga svar ännu.</p>';
}

function renderEventForSelectedDay() {
  const event = eventsByDate.get(state.selectedDate);
  const isAdmin = !!(currentSession && currentSession.user && currentSession.user.is_admin);
  const hasActiveEvent = event && event.status === 'LOCKED';
  if (hasActiveEvent) {
    eventCard.hidden = false;
    eventCardTitle.textContent = event.title || 'Inlåst';
    eventCardTime.textContent = formatTimeWindow(event) || '';
    eventCardHost.textContent = event.host_name ? `Värd: ${event.host_name}` : '';
    eventCardHost.hidden = !event.host_name;
    eventCardLocation.textContent = event.location ? `Plats: ${event.location}` : '';
    eventCardLocation.hidden = !event.location;
    eventCardNotes.textContent = event.notes || '';
    eventCardNotes.hidden = !event.notes;
  } else {
    eventCard.hidden = true;
  }
  // Lock button: visible to admins when there is no active LOCKED event for this date.
  const canLock = isAdmin && !hasActiveEvent;
  lockEventBtn.hidden = !canLock || !lockEventForm.hidden;
  if (lockEventForm.hidden) {
    // ensure form stays hidden until user opens it
  }
}

function buildHostOptions(prefill) {
  if (!lockHostSelect) return;
  const seen = new Map();
  if (prefill?.host_user_id && prefill?.host_name) {
    seen.set(prefill.host_user_id, prefill.host_name);
  }
  for (const entry of state.entries) {
    if (entry.user_id && entry.user_name && !seen.has(entry.user_id)) {
      seen.set(entry.user_id, entry.user_name);
    }
  }
  for (const event of eventsByDate.values()) {
    if (event.host_user_id && event.host_name && !seen.has(event.host_user_id)) {
      seen.set(event.host_user_id, event.host_name);
    }
    for (const att of event.attendees || []) {
      if (att.user_id && att.name && !seen.has(att.user_id)) {
        seen.set(att.user_id, att.name);
      }
    }
  }
  if (currentSession?.user?.id && currentSession?.user?.name && !seen.has(currentSession.user.id)) {
    seen.set(currentSession.user.id, currentSession.user.name);
  }
  const previous = lockHostSelect.value;
  const options = ['<option value="">— Ingen vald —</option>'];
  for (const [id, name] of seen) {
    options.push(`<option value="${escapeHtml(id)}">${escapeHtml(name)}</option>`);
  }
  lockHostSelect.innerHTML = options.join('');
  if (previous && seen.has(previous)) lockHostSelect.value = previous;
}

// Client-side UI prefill only; intentionally includes end times. Server-side
// fredagsfettWeekdayDefaultTimes uses only start times for tap-cycle defaults.
function weekdayDefaultTimes(date) {
  const [y, m, d] = date.split('-').map(Number);
  const dow = new Date(y, m - 1, d).getDay(); // 0=Sun, 5=Fri, 6=Sat
  if (dow === 5) return { start: '18:00', end: '23:00' };
  if (dow === 6) return { start: '17:00', end: '23:00' };
  if (dow === 0) return { start: '12:00', end: '17:00' };
  return { start: '', end: '' };
}

function majorityTimePair(date) {
  const entries = entriesForDate(date).filter(e => e.status === 'AVAILABLE' && e.start_time && e.end_time);
  if (entries.length) {
    const counts = new Map();
    for (const e of entries) {
      const key = `${e.start_time}|${e.end_time}`;
      counts.set(key, (counts.get(key) || 0) + 1);
    }
    const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    const [start, end] = sorted[0][0].split('|');
    return { start, end };
  }
  return weekdayDefaultTimes(date);
}

function openLockForm(prefill = {}) {
  buildHostOptions(prefill);
  const heuristic = majorityTimePair(state.selectedDate);
  lockTitleInput.value = prefill.title || '';
  lockHostSelect.value = prefill.host_user_id || '';
  lockLocationInput.value = prefill.location || '';
  lockStartInput.value = prefill.start_time || heuristic.start;
  lockEndInput.value = prefill.end_time || heuristic.end;
  lockNotesInput.value = prefill.notes || '';
  lockEventError.textContent = '';
  lockEventForm.hidden = false;
  lockEventBtn.hidden = true;
}

function closeLockForm() {
  lockEventForm.hidden = true;
  lockEventError.textContent = '';
  renderEventForSelectedDay();
}

function renderLockedEvents() {
  const list = document.getElementById('locked-events-list');
  const empty = document.getElementById('locked-events-empty');
  const hint = document.getElementById('best-dates-hint');
  const today = new Date().toISOString().slice(0, 10);
  const upcoming = [...eventsByDate.values()]
    .filter(event => event.status === 'LOCKED' && event.date >= today)
    .sort((a, b) => a.date.localeCompare(b.date));
  if (upcoming.length) {
    list.innerHTML = upcoming.map(event => `<button type="button" class="locked-row" data-date="${event.date}">
   <span class="locked-date">${formatSwedishDate(event.date)}</span>
   ${event.title ? `<span class="locked-title">${escapeHtml(event.title)}</span>` : ''}
   ${event.host_name ? `<span class="locked-host">hos ${escapeHtml(event.host_name)}</span>` : ''}
   <span class="locked-count">${(event.attendees || []).length} ja</span>
 </button>`).join('');
    empty.hidden = true;
  } else {
    list.innerHTML = '';
    // Fallback: surface the best-dates ranking as a hint when nothing is locked.
    hint.innerHTML = state.bestDates.length
      ? `Tipsade datum: ${state.bestDates.slice(0, 3).map(row => `${row.date} (${row.available_count} ja)`).join(' · ')}.`
      : '';
    empty.hidden = false;
  }
}

function statusLabel(status) {
  if (status === 'AVAILABLE') return 'Tillgänglig';
  if (status === 'MAYBE') return 'Kanske';
  return 'Inte tillgänglig';
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char]));
}

async function loadAvailability() {
  errorBox.textContent = '';
  const data = await api(`/api/fredagsfett/availability?month=${encodeURIComponent(state.month)}`);
  state.user = data.user;
  state.entries = data.entries || [];
  state.bestDates = data.best_dates || [];
  const own = selfEntry(state.selectedDate);
  applyOwnEntryToForm(own);
  renderCalendar();
  renderLockedEvents();
}

async function loadEvents() {
  eventsByDate.clear();
  const [year, m] = state.month.split('-').map(Number);
  const from = `${state.month}-01`;
  const lastDay = new Date(year, m, 0).getDate();
  const to = `${state.month}-${String(lastDay).padStart(2, '0')}`;
  try {
    const data = await api(`/api/fredagsfett/events?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
    for (const event of data.events || []) {
      eventsByDate.set(event.date, event);
    }
  } catch (err) {
    // Non-fatal: events overlay is optional; surface in console only.
    console.warn('loadEvents failed', err);
  }
}

async function reloadCalendarData() {
  await Promise.all([loadAvailability(), loadEvents()]);
  renderCalendar();
  renderLockedEvents();
}

async function saveAvailability() {
  errorBox.textContent = '';
  try {
    await api('/api/fredagsfett/availability', {
      method: 'POST',
      body: JSON.stringify({
        date: state.selectedDate,
        status: state.selectedStatus,
        note: noteInput.value || null,
        // '' signals "intentionally cleared", not "missing" — server must not
        // re-apply the weekday default over an explicit user choice.
        start_time: timeStartInput.value || '',
        end_time: timeEndInput.value || '',
        time_note: timeNoteInput.value || null,
      }),
    });
    await loadAvailability();
  } catch (err) {
    errorBox.textContent = err.message;
  }
}

async function deleteAvailability() {
  errorBox.textContent = '';
  try {
    await api(`/api/fredagsfett/availability?date=${encodeURIComponent(state.selectedDate)}`, { method: 'DELETE' });
    noteInput.value = '';
    timeStartInput.value = '';
    timeEndInput.value = '';
    timeNoteInput.value = '';
    state.selectedStartTime = '';
    state.selectedEndTime = '';
    state.selectedTimeNote = '';
    await loadAvailability();
  } catch (err) {
    errorBox.textContent = err.message;
  }
}

grid.addEventListener('click', event => {
  const button = event.target.closest('[data-date]');
  if (!button) return;
  const date = button.dataset.date;
  state.selectedDate = date;
  const own = selfEntry(date);
  applyOwnEntryToForm(own, true);
  lockEventForm.hidden = true;
  // Cycle the user's own availability on the same tap. The side panel still
  // opens (via renderCalendar -> renderSelectedDay) so time/notes can be edited.
  // Busy-gate prevents two rapid taps from interleaving POSTs and flickering.
  if (!state.tapBusy) {
    state.tapBusy = true;
    tapCycleStatus(date).finally(() => { state.tapBusy = false; });
  }
  renderCalendar();
});

lockEventBtn.addEventListener('click', () => {
  openLockForm();
});

lockEventForm.addEventListener('submit', async event => {
  event.preventDefault();
  lockEventError.textContent = '';
  const payload = {
    date: state.selectedDate,
    title: lockTitleInput.value.trim() || null,
    host_user_id: lockHostSelect.value || null,
    location: lockLocationInput.value.trim() || null,
    start_time: lockStartInput.value || null,
    end_time: lockEndInput.value || null,
    notes: lockNotesInput.value.trim() || null,
  };
  const submitBtn = lockEventForm.querySelector('button[type="submit"]');
  if (submitBtn) submitBtn.disabled = true;
  try {
    await api('/api/fredagsfett/events', { method: 'POST', body: JSON.stringify(payload) });
    lockEventForm.hidden = true;
    await loadEvents();
    renderCalendar();
    renderLockedEvents();
  } catch (err) {
    lockEventError.textContent = err.message;
  } finally {
    if (submitBtn) submitBtn.disabled = false;
  }
});

lockEventForm.addEventListener('click', event => {
  const cancelBtn = event.target.closest('[data-action="cancel-lock-form"]');
  if (cancelBtn) {
    event.preventDefault();
    closeLockForm();
  }
});

eventCard.addEventListener('click', async event => {
  const editBtn = event.target.closest('[data-action="edit-event"]');
  const cancelBtn = event.target.closest('[data-action="cancel-event"]');
  if (editBtn) {
    const ev = eventsByDate.get(state.selectedDate);
    if (!ev) return;
    openLockForm({
      title: ev.title || '',
      host_user_id: ev.host_user_id || '',
      host_name: ev.host_name || '',
      location: ev.location || '',
      start_time: ev.start_time || '',
      end_time: ev.end_time || '',
      notes: ev.notes || '',
    });
    return;
  }
  if (cancelBtn) {
    const ev = eventsByDate.get(state.selectedDate);
    if (!ev) return;
    if (!window.confirm(`Avbryt eventet för ${state.selectedDate}?`)) return;
    try {
      await api(`/api/fredagsfett/events/${encodeURIComponent(ev.id)}`, { method: 'DELETE' });
      await loadEvents();
      renderCalendar();
      renderLockedEvents();
    } catch (err) {
      errorBox.textContent = err.message;
    }
  }
});

document.querySelectorAll('.status-pill').forEach(button => {
  button.addEventListener('click', () => {
    state.selectedStatus = button.dataset.status;
    renderSelectedDay();
  });
});
document.getElementById('save-availability').addEventListener('click', saveAvailability);
document.getElementById('delete-availability').addEventListener('click', deleteAvailability);
document.getElementById('prev-month').addEventListener('click', () => { state.month = addMonths(state.month, -1); lockEventForm.hidden = true; void reloadCalendarData(); });
document.getElementById('next-month').addEventListener('click', () => { state.month = addMonths(state.month, 1); lockEventForm.hidden = true; void reloadCalendarData(); });
document.querySelectorAll('[data-summer]').forEach(button => {
  button.addEventListener('click', () => {
    state.month = `${new Date().getFullYear()}-${button.dataset.summer}`;
    state.selectedDate = `${state.month}-01`;
    noteInput.value = '';
    timeStartInput.value = '';
    timeEndInput.value = '';
    timeNoteInput.value = '';
    lockEventForm.hidden = true;
    void reloadCalendarData();
  });
});

document.querySelectorAll('[data-view-mode]').forEach(button => {
  // Reflect the persisted mode on initial paint so the buttons match state.viewMode.
  button.setAttribute('aria-pressed', button.dataset.viewMode === state.viewMode ? 'true' : 'false');
  button.addEventListener('click', () => {
    state.viewMode = button.dataset.viewMode === 'heatmap' ? 'heatmap' : 'initials';
    sessionStorage.setItem('ff-calendar-view-mode', state.viewMode);
    document.querySelectorAll('[data-view-mode]').forEach(b => {
      b.setAttribute('aria-pressed', b.dataset.viewMode === state.viewMode ? 'true' : 'false');
    });
    renderCalendar();
  });
});

document.getElementById('locked-events-list').addEventListener('click', event => {
  const row = event.target.closest('.locked-row');
  if (!row) return;
  const date = row.dataset.date;
  if (!date) return;
  state.selectedDate = date;
  // Jump the grid to the event's month if we aren't already there.
  const targetMonth = date.slice(0, 7);
  if (targetMonth !== state.month) {
    state.month = targetMonth;
    void reloadCalendarData();
  } else {
    renderCalendar();
  }
});

async function boot() {
  try {
    const session = await api('/api/fredagsfett/session');
    if (!session.authenticated || session.needs_registration) {
      location.href = `/fredagsfett?next=${encodeURIComponent('/fredagsfett/kalender')}`;
      return;
    }
    currentSession = session;
    document.body.classList.toggle('is-admin', !!(session.user && session.user.is_admin));
    await Promise.all([loadAvailability(), loadEvents()]);
    renderCalendar();
    // Note: a tap mid-poll may briefly flicker if loadAvailability returns before
    // the tap's POST resolves. Last-write-wins on the server, self-corrects on next poll.
    setInterval(reloadCalendarData, 15000);
  } catch {
    location.href = `/fredagsfett?next=${encodeURIComponent('/fredagsfett/kalender')}`;
  }
}

void boot();
</script>
