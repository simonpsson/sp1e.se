<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𓀂 · Kalender</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --panel: rgba(10, 10, 10, 0.74);
    --card: rgba(255,255,255,0.04);
    --line: rgba(255,255,255,0.12);
    --line-hot: rgba(205,176,110,0.45);
    --text: rgba(255,255,255,0.88);
    --muted: rgba(255,255,255,0.50);
    --faint: rgba(255,255,255,0.30);
    --accent: rgba(205,176,110,0.92);
    --danger: rgba(255,104,84,0.94);
    --available: #a3cdb0;
    --maybe: #d4c285;
    --unavailable: #d09a90;
  }
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    margin: 0;
    padding: clamp(1rem, 4vw, 2.5rem);
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.22), rgba(0,0,0,0.74)),
      url('/assets/landing/gallery-wall-wide.png') center / cover fixed,
      var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 52% 24%, rgba(255,255,255,0.08), transparent 24rem),
      linear-gradient(90deg, rgba(0,0,0,0.70), transparent 34%, transparent 66%, rgba(0,0,0,0.70));
  }
  main {
    position: relative;
    z-index: 1;
    width: min(1180px, 100%);
    margin: 0 auto;
  }
  .sp1e-wordmark {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    width: 156px;
    margin: 0 auto 1.35rem;
    color: rgba(255,255,255,0.9);
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.85rem;
    font-weight: 300;
    line-height: 1;
    text-align: center;
    text-shadow: 0 2px 24px rgba(0,0,0,0.70);
    font-variant-numeric: lining-nums;
    font-feature-settings: 'lnum' 1;
    user-select: none;
  }
  .sp1e-wordmark span {
    display: block;
    text-align: center;
  }
  .room {
    border: 1px solid var(--line);
    border-radius: 20px;
    overflow: hidden;
    background: var(--panel);
    box-shadow: 0 30px 110px rgba(0,0,0,0.52);
    backdrop-filter: blur(18px);
  }
  header {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: clamp(1.2rem, 3vw, 1.8rem);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  h1, h2, h3, p { margin-top: 0; }
  h1 {
    margin-bottom: 0.55rem;
    color: rgba(255,255,255,0.94);
    font-size: clamp(2.7rem, 8vw, 5rem);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: 0.08em;
  }
  h2 {
    margin-bottom: 0.35rem;
    color: rgba(255,255,255,0.9);
    font-size: 2rem;
    font-weight: 400;
  }
  h3 {
    margin-bottom: 0.75rem;
    color: rgba(255,255,255,0.84);
    font-size: 1.3rem;
    font-weight: 500;
  }
  .mono, .kicker, button, .button, label, .weekday, .tiny, .status-pill {
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .kicker {
    margin-bottom: 0.55rem;
    color: var(--accent);
    font-size: 0.72rem;
  }
  .nav {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .admin-nav {
    flex-direction: column;
    align-items: flex-end;
  }
  .button, button {
    min-height: 42px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    background: rgba(255,255,255,0.045);
    color: rgba(255,255,255,0.76);
    padding: 0.72rem 0.95rem;
    font-size: 0.68rem;
    cursor: pointer;
    text-decoration: none;
  }
  .icon-button {
    width: 44px;
    min-width: 44px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    line-height: 1;
  }
  .button:hover, button:hover, .button:focus-visible, button:focus-visible {
    color: rgba(255,255,255,0.94);
    border-color: var(--line-hot);
    outline: none;
  }
  button.active { border-color: var(--accent); color: rgba(255,255,255,0.94); }
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 1rem;
    padding: clamp(1rem, 3vw, 1.6rem);
  }
  .calendar-card, aside {
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    background: rgba(255,255,255,0.035);
  }
  .calendar-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .month-tools {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .summer {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0 1rem 1rem;
  }
  .view-mode { display: inline-flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .view-mode button { border: 0; padding: 0.4rem 0.75rem; background: transparent; color: var(--muted); }
  .view-mode button[aria-pressed="true"] { background: rgba(205,176,110,0.12); color: var(--text); }
  .day.heatmap-mode .answers { display: none; }
  .day.heatmap-mode .count { display: inline-block; font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text); margin-top: 0.6rem; }
  /* A5 — tap-ripple feedback when a day cell is tapped */
  .day { transition: transform 0.12s ease, background-color 0.18s ease; }
  .day.tap-ripple { transform: scale(0.97); background-color: rgba(205,176,110,0.18); }
  /* A6 — compact week view: a stacked list instead of a 7-column grid */
  .calendar-grid.week-mode { display: grid; grid-template-columns: 1fr; gap: 0; padding: 0; background: transparent; }
  .calendar-grid.week-mode .weekday { display: none; }
  .calendar-grid.week-mode .day.blank { display: none; }
  .calendar-grid.week-mode .day {
    min-height: 0;
    padding: 0.7rem 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .calendar-grid.week-mode .day-number { font-size: 0.95rem; }
  .calendar-grid.week-mode .week-label {
    display: inline-block;
    margin-right: 0.55rem;
    color: var(--accent);
    font: 0.66rem 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .calendar-grid.week-mode .day:not(.in-week) { display: none; }
  /* C2 — soft fade while the grid is being rebuilt on month change */
  .calendar-grid { transition: opacity 0.15s ease; }
  .calendar-grid.transitioning { opacity: 0.35; }
  /* C3 — hover preview popover on locked-row in side panel */
  .locked-row { position: relative; }
  .locked-row .ll-preview {
    position: absolute;
    left: 0; right: 0; top: calc(100% + 4px);
    z-index: 12;
    display: none;
    padding: 0.7rem 0.85rem;
    border: 1px solid var(--line-hot);
    border-radius: 12px;
    background: rgba(8,8,8,0.96);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.92rem;
    line-height: 1.35;
    box-shadow: 0 18px 60px rgba(0,0,0,0.55);
  }
  .locked-row:hover .ll-preview, .locked-row:focus-visible .ll-preview { display: block; }
  .ll-preview .ll-line { display: block; color: var(--muted); font: 0.68rem 'DM Mono', monospace; letter-spacing: 0.08em; }
  @media (hover: none) { .locked-row .ll-preview { display: none !important; } }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 1px;
    padding: 1px;
    background: rgba(255,255,255,0.08);
  }
  .weekday, .day {
    background: rgba(5,5,5,0.84);
  }
  .weekday {
    padding: 0.65rem 0.55rem;
    color: var(--faint);
    font-size: 0.62rem;
  }
  .day {
    position: relative;
    min-height: 112px;
    padding: 0.65rem;
    text-align: left;
    color: var(--text);
  }
  /* A1 — small dot in the corner showing the current user's own status on this day */
  .day::after {
    content: '';
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 999px;
    opacity: 0;
    transition: opacity .15s ease;
  }
  .day[data-self-status="AVAILABLE"]::after   { background: var(--available); opacity: 1; }
  .day[data-self-status="MAYBE"]::after       { background: var(--maybe); opacity: 1; }
  .day[data-self-status="UNAVAILABLE"]::after { background: var(--unavailable); opacity: 1; }
  /* A2 — today marker: small accent dot next to the day number */
  .day.today .day-number > span:first-child::after {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    margin-left: 6px;
    border-radius: 999px;
    background: var(--accent);
    transform: translateY(-2px);
  }
  .day.blank { opacity: 0.35; }
  .day.selected {
    outline: 1px solid var(--accent);
    outline-offset: -2px;
    background: rgba(205,176,110,0.07);
  }
  .day-number {
    display: flex;
    justify-content: space-between;
    color: rgba(255,255,255,0.84);
    font-size: 1.05rem;
  }
  .answers {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.8rem;
  }
  .avatar {
    display: inline-flex;
    width: 26px;
    height: 26px;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    color: #050505;
    font: 0.68rem 'DM Mono', monospace;
  }
  .avatar[data-status="AVAILABLE"] { background: var(--available); }
  .avatar[data-status="MAYBE"] { background: var(--maybe); }
  .avatar[data-status="UNAVAILABLE"] { background: var(--unavailable); }
  /* C4 — admin badge: thin gold ring on attendee chips, accent star in detail list */
  .avatar[data-admin="1"] { box-shadow: 0 0 0 1.5px var(--accent); }
  .admin-mark { color: var(--accent); margin-left: 0.3rem; font-size: 0.75em; }
  /* A4 — next-event banner */
  .next-event-banner {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.7rem 1.1rem;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    background: rgba(205,176,110,0.04);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .next-event-banner strong { color: var(--accent); font-weight: 400; }
  .next-event-banner .ne-when { color: var(--text); }
  /* D1 — persistent tap-cycle hint above the status pills */
  .tap-hint {
    margin: 0.15rem 0 0.55rem;
    color: var(--faint);
    font-style: italic;
    font-size: 0.7rem;
    line-height: 1.4;
  }
  aside {
    align-self: start;
    padding: 1rem;
  }
  .panel-block + .panel-block {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  label {
    display: block;
    margin-bottom: 0.45rem;
    color: var(--muted);
    font-size: 0.68rem;
  }
  textarea {
    width: 100%;
    min-height: 94px;
    resize: vertical;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: rgba(0,0,0,0.35);
    color: var(--text);
    padding: 0.85rem;
    font: 1rem 'Cormorant Garamond', serif;
    outline: none;
  }
  textarea:focus { border-color: var(--line-hot); }
  input[type="time"], input[type="text"] {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: rgba(0,0,0,0.35);
    color: var(--text);
    padding: 0.72rem 0.78rem;
    font: 0.86rem 'DM Mono', monospace;
    outline: none;
  }
  input[type="time"]:focus, input[type="text"]:focus { border-color: var(--line-hot); }
  .time-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.85rem;
  }
  .time-comment {
    margin-bottom: 0.85rem;
  }
  .status-row {
    display: grid;
    gap: 0.5rem;
    margin-bottom: 0.85rem;
  }
  .day-times {
    display: grid;
    gap: 0.28rem;
    margin-top: 0.55rem;
  }
  .time-chip {
    display: inline-flex;
    max-width: 100%;
    width: fit-content;
    border: 1px solid rgba(205,176,110,0.32);
    border-radius: 999px;
    background: rgba(205,176,110,0.08);
    color: rgba(255,255,255,0.78);
    padding: 0.2rem 0.42rem;
    font: 0.58rem 'DM Mono', monospace;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .status-pill[data-status="AVAILABLE"].active { border-color: var(--available); }
  .status-pill[data-status="MAYBE"].active { border-color: var(--maybe); }
  .status-pill[data-status="UNAVAILABLE"].active { border-color: var(--unavailable); }
  .error {
    min-height: 1.2rem;
    color: var(--danger);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
  }
  .best-list, .detail-list, .locked-events-list {
    display: grid;
    gap: 0.55rem;
  }
  .best-item, .detail-item {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.75rem;
    background: rgba(0,0,0,0.22);
    color: var(--muted);
  }
  .best-item strong, .detail-item strong {
    display: block;
    color: var(--text);
    font-size: 1.05rem;
  }
  .locked-row {
    display: grid;
    gap: 0.18rem;
    text-align: left;
    border: 1px solid var(--line-hot);
    border-radius: 12px;
    padding: 0.75rem;
    background: rgba(205,176,110,0.06);
    color: var(--text);
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    text-transform: none;
    letter-spacing: 0;
    min-height: 0;
  }
  .locked-row:hover, .locked-row:focus-visible { border-color: var(--accent); }
  .locked-row .locked-date { color: var(--accent); font: 0.68rem 'DM Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; }
  .locked-row .locked-title { color: var(--text); font-size: 1.05rem; }
  .locked-row .locked-host, .locked-row .locked-count { color: var(--muted); font: 0.66rem 'DM Mono', monospace; letter-spacing: 0.06em; }
  .tiny { color: var(--muted); font-size: 0.66rem; }
  .event-card { border: 1px solid var(--line-hot); border-radius: 12px; padding: 0.85rem; background: rgba(205,176,110,0.08); margin-bottom: 0.8rem; }
  .event-card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.35rem; }
  .event-card-head strong { color: var(--accent); font-size: 1.1rem; }
  .event-card .tiny { display: block; margin-bottom: 0.18rem; }
  /* B1 — event comments */
  .event-comments { margin-top: 0.85rem; padding-top: 0.7rem; border-top: 1px dashed rgba(205,176,110,0.25); }
  .event-comments h4 { margin: 0 0 0.4rem; font: 0.66rem 'DM Mono', monospace; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
  .event-comment { margin: 0 0 0.45rem; font-size: 0.92rem; line-height: 1.35; color: var(--text); }
  .event-comment strong { color: var(--accent); font-weight: 500; margin-right: 0.35rem; }
  .event-comment .ec-when { display: block; color: var(--faint); font: 0.6rem 'DM Mono', monospace; letter-spacing: 0.08em; }
  .event-comment-form { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
  .event-comment-form input { flex: 1; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; background: rgba(0,0,0,0.35); color: var(--text); padding: 0.55rem 0.7rem; font: 0.86rem 'Cormorant Garamond', serif; outline: none; }
  .event-comment-form input:focus { border-color: var(--line-hot); }
  .event-comment-form button { white-space: nowrap; }
  /* B3 — past events archive */
  .past-row { border-color: rgba(255,255,255,0.10); background: rgba(255,255,255,0.02); }
  .past-row:hover, .past-row:focus-visible { border-color: var(--line-hot); }
  .past-row .locked-date { color: var(--muted); }
  .lock-event-btn { margin-top: 0.6rem; }
  .lock-event-form { display: grid; gap: 0.55rem; margin-top: 0.6rem; padding: 0.75rem; border: 1px solid var(--line-hot); border-radius: 12px; background: rgba(205,176,110,0.05); }
  .lock-event-form select { width: 100%; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; background: rgba(0,0,0,0.35); color: var(--text); padding: 0.72rem 0.78rem; font: 0.86rem 'DM Mono', monospace; outline: none; }
  .lock-event-form select:focus { border-color: var(--line-hot); }
  .day.locked-event { border-color: var(--line-hot); box-shadow: inset 0 0 0 1px var(--line-hot); }
  .day.locked-event::before { content: '𓀂'; display: block; color: var(--accent); }
  body:not(.is-admin) [data-admin-only] { display: none !important; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 1.4rem;
    z-index: 50;
    transform: translateX(-50%);
    max-width: min(92vw, 28rem);
    padding: 0.7rem 1rem;
    border: 1px solid var(--line-hot);
    border-radius: 12px;
    background: rgba(10,10,10,0.92);
    color: var(--text);
    font: 0.78rem 'DM Mono', monospace;
    letter-spacing: 0.06em;
    box-shadow: 0 18px 60px rgba(0,0,0,0.55);
    animation: ff-toast-in 0.22s ease-out;
  }
  @keyframes ff-toast-in {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @media (max-width: 860px) {
    header, .layout { grid-template-columns: 1fr; }
    header { display: block; }
    .nav { margin-top: 1rem; }
    .day { min-height: 94px; }
  }
  @media (max-width: 620px) {
    body { padding: 0.75rem; }
    .calendar-grid { font-size: 0.9rem; }
    .day { min-height: 78px; padding: 0.5rem; }
    .weekday { padding: 0.45rem 0.3rem; letter-spacing: 0.04em; }
  }
</style>
</head>
<body>
<main>
  <div class="sp1e-wordmark" aria-label="SP1E" role="img">
    <span>S</span><span>P</span><span>1</span><span>E</span>
  </div>
  <section class="room">
    <header>
      <div>
        <p class="kicker">𓀂</p>
        <h1>Kalender</h1>
      </div>
      <nav class="nav admin-nav" aria-label="𓀂 navigation">
        <a class="button" href="/fredagsfett/sp1wise">SP1Wise</a>
        <button class="button" type="button" id="ical-copy-btn" title="Kopiera iCal-länk till urklipp">iCal</button>
        <a class="button icon-button" href="/fredagsfett/admin" aria-label="Dev console" title="Dev console">⚙</a>
      </nav>
    </header>
    <div id="next-event-banner" class="next-event-banner" hidden></div>
    <div class="layout">
      <section class="calendar-card">
        <div class="calendar-head">
          <button id="prev-month" type="button">Föregående</button>
          <h2 id="month-title">Laddar...</h2>
          <button id="next-month" type="button">Nästa</button>
        </div>
        <div class="summer" aria-label="Sommarvy">
          <button type="button" data-summer="06">Juni</button>
          <button type="button" data-summer="07">Juli</button>
          <button type="button" data-summer="08">Augusti</button>
          <button type="button" id="mark-fridays-btn" title="Markera dig själv som tillgänglig på de kommande 4 fredagarna">Markera 4 fredagar</button>
          <div class="view-mode" role="tablist" aria-label="Vy">
            <button type="button" data-view-mode="initials" aria-pressed="true">Initialer</button>
            <button type="button" data-view-mode="heatmap"  aria-pressed="false">Värmekarta</button>
            <button type="button" data-view-mode="week"     aria-pressed="false">Vecka</button>
          </div>
        </div>
        <div class="calendar-grid" id="calendar-grid" aria-live="polite"></div>
      </section>
      <aside>
        <section class="panel-block">
          <div id="event-card" class="event-card" hidden>
            <div class="event-card-head">
              <strong id="event-card-title">Inlåst</strong>
              <span id="event-card-time" class="tiny"></span>
            </div>
            <div id="event-card-host" class="tiny"></div>
            <div id="event-card-location" class="tiny"></div>
            <div id="event-card-notes"></div>
            <div class="nav admin-only" data-admin-only style="margin-top:0.6rem">
              <button type="button" data-action="edit-event">Redigera</button>
              <button type="button" data-action="cancel-event">Avbryt inlåsning</button>
            </div>
            <div class="event-comments">

      </aside>

  </section>
</main>
<script>
// Group size fallback for heatmap tint. The /api/fredagsfett/admin/users endpoint
// is admin-only, so non-admins can't fetch it; we use a constant for this tiny
// private group. renderCalendar refines this from observed availability entries.
const GROUP_SIZE_FALLBACK = 4;

const state = {
  user: null,
  month: new Date().toISOString().slice(0, 7),
  entries: [],
  bestDates: [],
  upcomingEvents: [],
  pastEvents: [],
  currentEventId: null,
  selectedDate: new Date().toISOString().slice(0, 10),
  selectedStatus: 'AVAILABLE',
  selectedStartTime: '',
  selectedEndTime: '',
  selectedTimeNote: '',
  tapBusy: false,
  viewMode: (m => (m === 'heatmap' || m === 'week') ? m : 'initials')(sessionStorage.getItem('ff-calendar-view-mode')),
};
let currentSession = null;
const eventsByDate = new Map();
const monthTitle = document.getElementById('month-title');
const grid = document.getElementById('calendar-grid');
const errorBox = document.getElementById('calendar-error');
const noteInput = document.getElementById('note-input');
const timeStartInput = document.getElementById('time-start-input');
const timeEndInput = document.getElementById('time-end-input');
const timeNoteInput = document.getElementById('time-note-input');
const eventCard = document.getElementById('event-card');
const eventCardTitle = document.getElementById('event-card-title');
const eventCardTime = document.getElementById('event-card-time');
const eventCardHost = document.getElementById('event-card-host');
const eventCardLocation = document.getElementById('event-card-location');
const eventCardNotes = document.getElementById('event-card-notes');
const lockEventBtn = document.getElementById('lock-event-btn');
const lockEventForm = document.getElementById('lock-event-form');
const lockTitleInput = document.getElementById('lock-title-input');
const lockHostSelect = document.getElementById('lock-host-select');
const lockLocationInput = document.getElementById('lock-location-input');
const lockStartInput = document.getElementById('lock-start-input');
const lockEndInput = document.getElementById('lock-end-input');
const lockNotesInput = document.getElementById('lock-notes-input');
const lockEventError = document.getElementById('lock-event-error');

async function api(path, options = {}) {
  const res = await fetch(path, {
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
  });
  const text = await res.text();
  const data = text ? JSON.parse(text) : {};
  if (!res.ok) throw new Error(data.error || 'Något gick fel.');
  return data;
}

function monthName(month) {
  const [year, m] = month.split('-').map(Number);
  return new Date(year, m - 1, 1).toLocaleDateString('sv-SE', { month: 'long', year: 'numeric' });
}

function formatSwedishDate(date) {
  const [y, m, d] = date.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('sv-SE', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  });
}

function observedGroupSize() {
  // Derive group size from the union of users seen in the current availability
  // payload — the admin /users endpoint is gated. Falls back to constant.
  const ids = new Set();
  for (const entry of state.entries) {
    if (entry.user_id) ids.add(entry.user_id);
  }
  return Math.max(GROUP_SIZE_FALLBACK, ids.size);
}

function addMonths(month, delta) {
  const [year, m] = month.split('-').map(Number);
  return new Date(Date.UTC(year, m - 1 + delta, 1)).toISOString().slice(0, 7);
}

function initials(name) {
  return (name || '?').split(/\s+/).map(part => part[0]).join('').slice(0, 2).toUpperCase();
}

function entriesForDate(date) {
  return state.entries.filter(entry => entry.date === date);
}

function selfEntry(date) {
  return entriesForDate(date).find(entry => entry.is_self);
}

// Optimistically patch state.entries with the user's new status for `date`,
// then re-render the calendar. No refetch — caller revalidates via loadAvailability().
function applyOptimisticStatus(date, nextStatus) {
  const idx = state.entries.findIndex(entry => entry.date === date && entry.is_self);
  if (nextStatus === null) {
    if (idx !== -1) state.entries.splice(idx, 1);
  } else if (idx !== -1) {
    state.entries[idx] = { ...state.entries[idx], status: nextStatus };
  } else {
    state.entries.push({
      date,
      status: nextStatus,
      is_self: true,
      user_id: state.user?.id || currentSession?.user?.id || null,
      user_name: state.user?.name || currentSession?.user?.name || '',
      note: null,
      start_time: null,
      end_time: null,
      time_note: null,
    });
  }
  renderCalendar();
}

let toastTimer = null;
function showToast(message) {
  let toast = document.getElementById('ff-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'ff-toast';
    toast.className = 'toast';
    toast.setAttribute('role', 'status');
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.remove();
    toastTimer = null;
  }, 4000);
}

function showTapCycleHintOnce() {
  if (sessionStorage.getItem('ff-tap-cycle-hint-seen')) return;
  sessionStorage.setItem('ff-tap-cycle-hint-seen', '1');
  showToast('Tryck igen för att växla mellan tillgänglig / kanske / inte tillgänglig.');
}

const TAP_CYCLE = ['AVAILABLE', 'MAYBE', 'UNAVAILABLE', null];
async function tapCycleStatus(date) {
  // Snapshot the full entry, not just status, so revert restores notes/times intact.
  const prevEntry = state.entries.find(e => e.date === date && e.is_self) || null;
  const current = prevEntry?.status ?? null;
  const idx = TAP_CYCLE.indexOf(current);
  const next = TAP_CYCLE[(idx + 1) % TAP_CYCLE.length];

  errorBox.textContent = ''; // clear any stale error from a previous tap or save
  // Optimistic UI
  applyOptimisticStatus(date, next);

  try {
    if (next === null) {
      await api(`/api/fredagsfett/availability?date=${encodeURIComponent(date)}`, { method: 'DELETE' });
    } else {
      // Tap-cycle never sends time fields — server applies weekday default.
      await api('/api/fredagsfett/availability', {
        method: 'POST',
        body: JSON.stringify({ date, status: next }),
      });
    }
    await loadAvailability();
    showTapCycleHintOnce();
  } catch (err) {
    // Restore the full prior entry (or absence), not just status.
    const i = state.entries.findIndex(e => e.date === date && e.is_self);
    if (i !== -1) state.entries.splice(i, 1);
    if (prevEntry) state.entries.push(prevEntry);
    renderCalendar();
    errorBox.textContent = err.message;
  }
}

function formatTimeWindow(entry) {
  if (!entry?.start_time || !entry?.end_time) return '';
  return `${entry.start_time}-${entry.end_time}`;
}

function applyOwnEntryToForm(entry, resetIfMissing = false) {
  if (!entry && !resetIfMissing) return;
  state.selectedStatus = entry?.status || 'AVAILABLE';
  state.selectedStartTime = entry?.start_time || '';
  state.selectedEndTime = entry?.end_time || '';
  state.selectedTimeNote = entry?.time_note || '';
  if (document.activeElement !== noteInput) noteInput.value = entry?.note || '';
  if (document.activeElement !== timeStartInput) timeStartInput.value = state.selectedStartTime;
  if (document.activeElement !== timeEndInput) timeEndInput.value = state.selectedEndTime;
  if (document.activeElement !== timeNoteInput) timeNoteInput.value = state.selectedTimeNote;
}

function renderCalendar() {
  monthTitle.textContent = monthName(state.month);
  // A6 — week-mode toggles a single class on the grid; cells outside the
  // current ISO week are hidden via .day:not(.in-week) display:none.
  grid.classList.toggle('week-mode', state.viewMode === 'week');
  const [year, m] = state.month.split('-').map(Number);
  const first = new Date(year, m - 1, 1);
  const days = new Date(year, m, 0).getDate();
  const startOffset = (first.getDay() + 6) % 7;
  const weekdays = ['Mån', 'Tis', 'Ons', 'Tor', 'Fre', 'Lör', 'Sön'];
  const isWeekMode = state.viewMode === 'week';
  // Compute the ISO week range (Mon-Sun) anchored on today, used to filter
  // visible cells when state.viewMode === 'week'. We keep .in-week as a class
  // rather than skipping cells entirely so navigation/keyboard logic still works.
  const todayDate = new Date();
  todayDate.setUTCHours(0, 0, 0, 0);
  const todayDow = todayDate.getUTCDay() || 7; // Mon=1..Sun=7
  const weekStartDate = new Date(todayDate);
  weekStartDate.setUTCDate(todayDate.getUTCDate() - (todayDow - 1));
  const weekEndDate = new Date(weekStartDate);
  weekEndDate.setUTCDate(weekStartDate.getUTCDate() + 6);
  const weekStart = weekStartDate.toISOString().slice(0, 10);
  const weekEnd = weekEndDate.toISOString().slice(0, 10);
  grid.innerHTML = weekdays.map(day => `<div class="weekday">${day}</div>`).join('');
  for (let i = 0; i < startOffset; i++) {
    grid.insertAdjacentHTML('beforeend', '<div class="day blank" aria-hidden="true"></div>');
  }
  const isHeatmap = state.viewMode === 'heatmap';
  const groupSize = observedGroupSize();
  const todayStr = new Date().toISOString().slice(0, 10);
  for (let day = 1; day <= days; day++) {
    const date = `${state.month}-${String(day).padStart(2, '0')}`;
    const entries = entriesForDate(date);
    const selected = date === state.selectedDate ? ' selected' : '';
    const todayCls = date === todayStr ? ' today' : '';
    const event = eventsByDate.get(date);
    const ownEntry = entries.find(e => e.is_self);
    const selfAttr = ownEntry ? ` data-self-status="${ownEntry.status}"` : '';
    const chips = entries.map(entry => {
      const adminAttr = entry.user_is_admin ? ' data-admin="1"' : '';
      return `<span class="avatar" data-status="${entry.status}"${adminAttr} title="${entry.user_name}: ${entry.status}">${initials(entry.user_name)}</span>`;
    }).join('');
    const timeChips = entries
      .filter(entry => entry.start_time && entry.end_time)
      .map(entry => `<span class="time-chip" title="${escapeHtml(entry.user_name)} ${escapeHtml(entry.time_note || '')}">${escapeHtml(formatTimeWindow(entry))}</span>`)
      .join('');
    const yesCount = entries.filter(e => e.status === 'AVAILABLE').length;
    const maybeCount = entries.filter(e => e.status === 'MAYBE').length;
    const score = yesCount + maybeCount * 0.5;
    const intensity = Math.min(1, score / Math.max(1, groupSize));
    const heatStyle = isHeatmap && intensity > 0
      ? ` style="background: rgba(143,207,154,${(0.08 + intensity * 0.42).toFixed(3)});"`
      : '';
    const heatmapCls = isHeatmap ? ' heatmap-mode' : '';
    const isLocked = event && event.status === 'LOCKED';
    const inWeek = date >= weekStart && date <= weekEnd;
    const inWeekCls = inWeek ? ' in-week' : '';
    const dayMarkup = isLocked
      ? `<button class="day locked-event${heatmapCls}${selected}${todayCls}${inWeekCls}" type="button" data-date="${date}"${heatStyle}${selfAttr}>`
      : `<button class="day${heatmapCls}${selected}${todayCls}${inWeekCls}" type="button" data-date="${date}"${heatStyle}${selfAttr}>`;
    const countMarkup = isHeatmap
      ? `<span class="count">${yesCount}${maybeCount ? `+${maybeCount}` : ''}</span>`
      : '';
    // Week mode prefixes the cell with the weekday label so the stacked list reads naturally.
    const weekday = new Date(date + 'T00:00:00Z').getUTCDay();
    const weekdayName = weekdays[(weekday + 6) % 7];
    const weekLabel = isWeekMode ? `<span class="week-label">${weekdayName}</span>` : '';
    grid.insertAdjacentHTML('beforeend', `
      ${dayMarkup}
        <span class="day-number">${weekLabel}<span>${day}</span><span class="tiny">${entries.length || ''}</span></span>
        <span class="answers">${chips}</span>
        ${countMarkup}
        <span class="day-times">${timeChips}</span>
      </button>
    `);
  }
  renderSelectedDay();
}

function renderSelectedDay() {
  document.getElementById('selected-date-title').textContent = state.selectedDate || 'Välj ett datum';
  document.querySelectorAll('[data-status]').forEach(button => {
    if (button.classList.contains('status-pill')) button.classList.toggle('active', button.dataset.status === state.selectedStatus);
  });
  const own = selfEntry(state.selectedDate);
  applyOwnEntryToForm(own);
  document.querySelectorAll('.status-pill').forEach(button => button.classList.toggle('active', button.dataset.status === state.selectedStatus));
  renderEventForSelectedDay();
  const details = entriesForDate(state.selectedDate);
  document.getElementById('day-details').innerHTML = details.length
    ? details.map(entry => {
        const adminMark = entry.user_is_admin ? '<span class="admin-mark" aria-label="Admin" title="Admin">✦</span>' : '';
        return `<div class="detail-item"><strong>${escapeHtml(entry.user_name)}${adminMark}</strong><span>${statusLabel(entry.status)}</span>${formatTimeWindow(entry) ? `<span class="time-chip">${escapeHtml(formatTimeWindow(entry))}</span>` : ''}${entry.time_note ? `<p>${escapeHtml(entry.time_note)}</p>` : ''}${entry.note ? `<p>${escapeHtml(entry.note)}</p>` : ''}</div>`;
      }).join('')
    : '<p class="tiny">Inga svar ännu.</p>';
}

function renderEventForSelectedDay() {
  const event = eventsByDate.get(state.selectedDate);
  const isAdmin = !!(currentSession && currentSession.user && currentSession.user.is_admin);
  const hasActiveEvent = event && event.status === 'LOCKED';
  if (hasActiveEvent) {
    eventCard.hidden = false;
    eventCardTitle.textContent = event.title || 'Inlåst';
    eventCardTime.textContent = formatTimeWindow(event) || '';
    eventCardHost.textContent = event.host_name ? `Värd: ${event.host_name}` : '';
    eventCardHost.hidden = !event.host_name;
    eventCardLocation.textContent = event.location ? `Plats: ${event.location}` : '';
    eventCardLocation.hidden = !event.location;
    eventCardNotes.textContent = event.notes || '';
    eventCardNotes.hidden = !event.notes;
    state.currentEventId = event.id;
    void loadEventComments(event.id);
  } else {
    eventCard.hidden = true;
    state.currentEventId = null;
    const list = document.getElementById('event-comments-list');
    if (list) list.innerHTML = '';
  }
  // Lock button: visible to admins when there is no active LOCKED event for this date.
  const canLock = isAdmin && !hasActiveEvent;
  lockEventBtn.hidden = !canLock || !lockEventForm.hidden;
  if (lockEventForm.hidden) {
    // ensure form stays hidden until user opens it
  }
}

function buildHostOptions(prefill) {
  if (!lockHostSelect) return;
  const seen = new Map();
  if (prefill?.host_user_id && prefill?.host_name) {
    seen.set(prefill.host_user_id, prefill.host_name);
  }
  for (const entry of state.entries) {
    if (entry.user_id && entry.user_name && !seen.has(entry.user_id)) {
      seen.set(entry.user_id, entry.user_name);
    }
  }
  for (const event of eventsByDate.values()) {
    if (event.host_user_id && event.host_name && !seen.has(event.host_user_id)) {
      seen.set(event.host_user_id, event.host_name);
    }
    for (const att of event.attendees || []) {
      if (att.user_id && att.name && !seen.has(att.user_id)) {
        seen.set(att.user_id, att.name);
      }
    }
  }
  if (currentSession?.user?.id && currentSession?.user?.name && !seen.has(currentSession.user.id)) {
    seen.set(currentSession.user.id, currentSession.user.name);
  }
  const previous = lockHostSelect.value;
  const options = ['<option value="">— Ingen vald —</option>'];
  for (const [id, name] of seen) {
    options.push(`<option value="${escapeHtml(id)}">${escapeHtml(name)}</option>`);
  }
  lockHostSelect.innerHTML = options.join('');
  if (previous && seen.has(previous)) lockHostSelect.value = previous;
}

// Client-side UI prefill only; intentionally includes end times. Server-side
// fredagsfettWeekdayDefaultTimes uses only start times for tap-cycle defaults.
function weekdayDefaultTimes(date) {
  const [y, m, d] = date.split('-').map(Number);
  const dow = new Date(y, m - 1, d).getDay(); // 0=Sun, 5=Fri, 6=Sat
  if (dow === 5) return { start: '18:00', end: '23:00' };
  if (dow === 6) return { start: '17:00', end: '23:00' };
  if (dow === 0) return { start: '12:00', end: '17:00' };
  return { start: '', end: '' };
}

function majorityTimePair(date) {
  const entries = entriesForDate(date).filter(e => e.status === 'AVAILABLE' && e.start_time && e.end_time);
  if (entries.length) {
    const counts = new Map();
    for (const e of entries) {
      const key = `${e.start_time}|${e.end_time}`;
      counts.set(key, (counts.get(key) || 0) + 1);
    }
    const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    const [start, end] = sorted[0][0].split('|');
    return { start, end };
  }
  return weekdayDefaultTimes(date);
}

function openLockForm(prefill = {}) {
  buildHostOptions(prefill);
  const heuristic = majorityTimePair(state.selectedDate);
  lockTitleInput.value = prefill.title || '';
  lockHostSelect.value = prefill.host_user_id || '';
  lockLocationInput.value = prefill.location || '';
  lockStartInput.value = prefill.start_time || heuristic.start;
  lockEndInput.value = prefill.end_time || heuristic.end;
  lockNotesInput.value = prefill.notes || '';
  lockEventError.textContent = '';
  lockEventForm.hidden = false;
  lockEventBtn.hidden = true;
}

function closeLockForm() {
  lockEventForm.hidden = true;
  lockEventError.textContent = '';
  renderEventForSelectedDay();
}

function renderLockedEvents() {
  const list = document.getElementById('locked-events-list');
  const empty = document.getElementById('locked-events-empty');
  const hint = document.getElementById('best-dates-hint');
  const heading = document.getElementById('locked-events-heading');
  const today = new Date().toISOString().slice(0, 10);
  const upcoming = (state.upcomingEvents || [])
    .filter(event => event.status === 'LOCKED' && event.date >= today)
    .sort((a, b) => a.date.localeCompare(b.date));
  // C5 — show count in header when non-zero
  if (heading) heading.textContent = upcoming.length ? `Inlåsta fredagar (${upcoming.length})` : 'Inlåsta fredagar';
  if (upcoming.length) {
    list.innerHTML = upcoming.map(event => {
      const attendees = event.attendees || [];
      const ja = attendees.filter(a => a.status === 'AVAILABLE').length;
      const kanske = attendees.filter(a => a.status === 'MAYBE').length;
      const timeRange = formatTimeWindow(event);
      const yesNames = attendees.filter(a => a.status === 'AVAILABLE').map(a => a.name).join(', ');
      // C3 — hover preview popover with full event details
      const previewLines = [
        event.location ? `<span class="ll-line">${escapeHtml(event.location)}</span>` : '',
        timeRange ? `<span class="ll-line">Tid: ${escapeHtml(timeRange)}</span>` : '',
        event.notes ? `<span class="ll-line">${escapeHtml(event.notes)}</span>` : '',
        yesNames ? `<span class="ll-line">Ja: ${escapeHtml(yesNames)}</span>` : '',
      ].filter(Boolean).join('');
      const preview = previewLines ? `<div class="ll-preview" role="tooltip">${previewLines}</div>` : '';
      return `<button type="button" class="locked-row" data-date="${event.date}">
   <span class="locked-date">${formatSwedishDate(event.date)}</span>
   ${event.title ? `<span class="locked-title">${escapeHtml(event.title)}</span>` : ''}
   ${event.host_name ? `<span class="locked-host">hos ${escapeHtml(event.host_name)}</span>` : ''}
   <span class="locked-count">${ja} ja${kanske ? ` · ${kanske} kanske` : ''}</span>
   ${preview}
 </button>`;
    }).join('');
    empty.hidden = true;
  } else {
    list.innerHTML = '';
    // Fallback: surface the best-dates ranking as a hint when nothing is locked.
    hint.innerHTML = state.bestDates.length
      ? `Tipsade datum: ${state.bestDates.slice(0, 3).map(row => `${row.date} (${row.available_count} ja)`).join(' · ')}.`
      : '';
    empty.hidden = false;
  }
  renderNextEventBanner(upcoming);
  renderPastEvents();
}

// A4 — countdown banner at the top of the kalender room
function renderNextEventBanner(upcoming) {
  const banner = document.getElementById('next-event-banner');
  if (!banner) return;
  const next = upcoming && upcoming.length ? upcoming[0] : null;
  if (!next) {
    banner.hidden = true;
    banner.innerHTML = '';
    return;
  }
  const todayStr = new Date().toISOString().slice(0, 10);
  const todayMs = Date.UTC(...todayStr.split('-').map((v, i) => i === 1 ? Number(v) - 1 : Number(v)));
  const nextMs  = Date.UTC(...next.date.split('-').map((v, i) => i === 1 ? Number(v) - 1 : Number(v)));
  const days = Math.round((nextMs - todayMs) / 86400000);
  const when = days <= 0 ? 'idag' : days === 1 ? 'imorgon' : `om ${days} dagar`;
  const titleSuffix = next.title ? ` · ${escapeHtml(next.title)}` : '';
  banner.innerHTML = `<span>Nästa fredagsfett: <strong>${escapeHtml(formatSwedishDate(next.date))}</strong>${titleSuffix}</span><span class="ne-when">${escapeHtml(when)}</span>`;
  banner.hidden = false;
}

function statusLabel(status) {
  if (status === 'AVAILABLE') return 'Tillgänglig';
  if (status === 'MAYBE') return 'Kanske';
  return 'Inte tillgänglig';
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char]));
}

async function loadAvailability() {
  errorBox.textContent = '';
  const data = await api(`/api/fredagsfett/availability?month=${encodeURIComponent(state.month)}`);
  state.user = data.user;
  state.entries = data.entries || [];
  state.bestDates = data.best_dates || [];
  const own = selfEntry(state.selectedDate);
  applyOwnEntryToForm(own);
  renderCalendar();
  renderLockedEvents();
}

async function loadEvents() {
  eventsByDate.clear();
  const [year, m] = state.month.split('-').map(Number);
  const from = `${state.month}-01`;
  const lastDay = new Date(year, m, 0).getDate();
  const to = `${state.month}-${String(lastDay).padStart(2, '0')}`;
  try {
    const data = await api(`/api/fredagsfett/events?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
    for (const event of data.events || []) {
      eventsByDate.set(event.date, event);
    }
  } catch (err) {
    // Non-fatal: events overlay is optional; surface in console only.
    console.warn('loadEvents failed', err);
  }
}

// B1 — comments per locked event
async function loadEventComments(eventId) {
  const list = document.getElementById('event-comments-list');
  if (!list) return;
  try {
    const data = await api(`/api/fredagsfett/events/${encodeURIComponent(eventId)}/comments`);
    const items = data.comments || [];
    if (!items.length) {
      list.innerHTML = '<p class="tiny">Inga kommentarer ännu — säg något!</p>';
    } else {
      list.innerHTML = items.map(c =>
        `<p class="event-comment"><strong>${escapeHtml(c.user_name)}</strong>${escapeHtml(c.body)}<span class="ec-when">${escapeHtml((c.created_at || '').replace('T', ' ').slice(0, 16))}</span></p>`
      ).join('');
    }
  } catch (err) {
    list.innerHTML = `<p class="error">${escapeHtml(err.message || 'Kunde inte ladda kommentarer.')}</p>`;
  }
}

async function loadUpcomingEvents() {
  // Widened window: 6 months back to 6 months ahead. Past LOCKED events are
  // surfaced in the "Tidigare fredagsfett" panel; future ones in "Inlåsta fredagar".
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const from = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth() - 6, 1)).toISOString().slice(0, 10);
  const to = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth() + 6, 0)).toISOString().slice(0, 10);
  try {
    const data = await api(`/api/fredagsfett/events?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
    const allLocked = (data.events || []).filter(e => e.status === 'LOCKED');
    state.upcomingEvents = allLocked.filter(e => e.date >= todayStr);
    state.pastEvents = allLocked.filter(e => e.date < todayStr).sort((a, b) => b.date.localeCompare(a.date));
  } catch (err) {
    console.error('loadUpcomingEvents failed', err);
    state.upcomingEvents = [];
    state.pastEvents = [];
  }
}

// B3 — Tidigare fredagsfett panel
function renderPastEvents() {
  const block = document.getElementById('past-events-block');
  const list = document.getElementById('past-events-list');
  const heading = document.getElementById('past-events-heading');
  if (!block || !list) return;
  const past = (state.pastEvents || []).slice(0, 20);
  if (!past.length) {
    block.hidden = true;
    return;
  }
  if (heading) heading.textContent = `Tidigare fredagsfett (${past.length})`;
  list.innerHTML = past.map(event => {
    const attendees = event.attendees || [];
    const ja = attendees.filter(a => a.status === 'AVAILABLE').length;
    return `<button type="button" class="locked-row past-row" data-date="${event.date}">
      <span class="locked-date">${formatSwedishDate(event.date)}</span>
      ${event.title ? `<span class="locked-title">${escapeHtml(event.title)}</span>` : ''}
      ${event.host_name ? `<span class="locked-host">hos ${escapeHtml(event.host_name)}</span>` : ''}
      <span class="locked-count">${ja} var med</span>
    </button>`;
  }).join('');
  block.hidden = false;
}

async function reloadCalendarData() {
  // C2 — soft fade while the grid is being rebuilt
  grid.classList.add('transitioning');
  try {
    await Promise.all([loadAvailability(), loadEvents(), loadUpcomingEvents()]);
    renderCalendar();
    renderLockedEvents();
  } finally {
    // Give the browser one paint to apply the fade, then clear it
    requestAnimationFrame(() => requestAnimationFrame(() => grid.classList.remove('transitioning')));
  }
}

async function saveAvailability() {
  errorBox.textContent = '';
  try {
    await api('/api/fredagsfett/availability', {
      method: 'POST',
      body: JSON.stringify({
        date: state.selectedDate,
        status: state.selectedStatus,
        note: noteInput.value || null,
        // '' signals "intentionally cleared", not "missing" — server must not
        // re-apply the weekday default over an explicit user choice.
        start_time: timeStartInput.value || '',
        end_time: timeEndInput.value || '',
        time_note: timeNoteInput.value || null,
      }),
    });
    await loadAvailability();
  } catch (err) {
    errorBox.textContent = err.message;
  }
}

async function deleteAvailability() {
  errorBox.textContent = '';
  try {
    await api(`/api/fredagsfett/availability?date=${encodeURIComponent(state.selectedDate)}`, { method: 'DELETE' });
    noteInput.value = '';
    timeStartInput.value = '';
    timeEndInput.value = '';
    timeNoteInput.value = '';
    state.selectedStartTime = '';
    state.selectedEndTime = '';
    state.selectedTimeNote = '';
    await loadAvailability();
  } catch (err) {
    errorBox.textContent = err.message;
  }
}

grid.addEventListener('click', event => {
  const button = event.target.closest('[data-date]');
  if (!button) return;
  const date = button.dataset.date;
  // A5 — tap-ripple feedback. Brief scale-down + tint, removed after the
  // CSS transition completes (~250ms). The class is per-cell so multiple
  // simultaneous ripples don't fight.
  button.classList.add('tap-ripple');
  setTimeout(() => button.classList.remove('tap-ripple'), 250);
  state.selectedDate = date;
  const own = selfEntry(date);
  applyOwnEntryToForm(own, true);
  lockEventForm.hidden = true;
  // Cycle the user's own availability on the same tap. The side panel still
  // opens (via renderCalendar -> renderSelectedDay) so time/notes can be edited.
  // Busy-gate prevents two rapid taps from interleaving POSTs and flickering.
  if (!state.tapBusy) {
    state.tapBusy = true;
    tapCycleStatus(date).finally(() => { state.tapBusy = false; });
  }
  renderCalendar();
});

// D3 — keyboard navigation on the grid: arrows move focus; Space/Enter cycles.
// Cells are <button> elements so they're naturally Tab-focusable; this adds
// arrow-key movement and cross-month navigation.
grid.addEventListener('keydown', event => {
  const cell = event.target.closest('.day[data-date]');
  if (!cell) return;
  const dx = event.key === 'ArrowRight' ? 1 : event.key === 'ArrowLeft' ? -1
    : event.key === 'ArrowDown' ? 7 : event.key === 'ArrowUp' ? -7 : 0;
  if (!dx) return;
  event.preventDefault();
  const [y, m, d] = cell.dataset.date.split('-').map(Number);
  const target = new Date(Date.UTC(y, m - 1, d));
  target.setUTCDate(target.getUTCDate() + dx);
  const targetDate = target.toISOString().slice(0, 10);
  const targetMonth = targetDate.slice(0, 7);
  state.selectedDate = targetDate;
  if (targetMonth !== state.month) {
    state.month = targetMonth;
    void reloadCalendarData().then(() => {
      // After rerender, focus the matching cell if visible.
      requestAnimationFrame(() => grid.querySelector(`.day[data-date="${targetDate}"]`)?.focus());
    });
  } else {
    renderCalendar();
    requestAnimationFrame(() => grid.querySelector(`.day[data-date="${targetDate}"]`)?.focus());
  }
});

lockEventBtn.addEventListener('click', () => {
  openLockForm();
});

lockEventForm.addEventListener('submit', async event => {
  event.preventDefault();
  lockEventError.textContent = '';
  const payload = {
    date: state.selectedDate,
    title: lockTitleInput.value.trim() || null,
    host_user_id: lockHostSelect.value || null,
    location: lockLocationInput.value.trim() || null,
    start_time: lockStartInput.value || null,
    end_time: lockEndInput.value || null,
    notes: lockNotesInput.value.trim() || null,
  };
  const submitBtn = lockEventForm.querySelector('button[type="submit"]');
  if (submitBtn) submitBtn.disabled = true;
  try {
    await api('/api/fredagsfett/events', { method: 'POST', body: JSON.stringify(payload) });
    lockEventForm.hidden = true;
    await Promise.all([loadEvents(), loadUpcomingEvents()]);
    renderCalendar();
    renderLockedEvents();
  } catch (err) {
    lockEventError.textContent = err.message;
  } finally {
    if (submitBtn) submitBtn.disabled = false;
  }
});

lockEventForm.addEventListener('click', event => {
  const cancelBtn = event.target.closest('[data-action="cancel-lock-form"]');
  if (cancelBtn) {
    event.preventDefault();
    closeLockForm();
  }
});

eventCard.addEventListener('click', async event => {
  const editBtn = event.target.closest('[data-action="edit-event"]');
  const cancelBtn = event.target.closest('[data-action="cancel-event"]');
  if (editBtn) {
    const ev = eventsByDate.get(state.selectedDate);
    if (!ev) return;
    openLockForm({
      title: ev.title || '',
      host_user_id: ev.host_user_id || '',
      host_name: ev.host_name || '',
      location: ev.location || '',
      start_time: ev.start_time || '',
      end_time: ev.end_time || '',
      notes: ev.notes || '',
    });
    return;
  }
  if (cancelBtn) {
    const ev = eventsByDate.get(state.selectedDate);
    if (!ev) return;
    if (!window.confirm(`Avbryt eventet för ${state.selectedDate}?`)) return;
    try {
      await api(`/api/fredagsfett/events/${encodeURIComponent(ev.id)}`, { method: 'DELETE' });
      await Promise.all([loadEvents(), loadUpcomingEvents()]);
      renderCalendar();
      renderLockedEvents();
    } catch (err) {
      errorBox.textContent = err.message;
    }
  }
});

document.querySelectorAll('.status-pill').forEach(button => {
  button.addEventListener('click', () => {
    state.selectedStatus = button.dataset.status;
    renderSelectedDay();
  });
});
document.getElementById('save-availability').addEventListener('click', saveAvailability);
document.getElementById('delete-availability').addEventListener('click', deleteAvailability);
document.getElementById('prev-month').addEventListener('click', () => { state.month = addMonths(state.month, -1); lockEventForm.hidden = true; void reloadCalendarData(); });
document.getElementById('next-month').addEventListener('click', () => { state.month = addMonths(state.month, 1); lockEventForm.hidden = true; void reloadCalendarData(); });
document.querySelectorAll('[data-summer]').forEach(button => {
  button.addEventListener('click', () => {
    state.month = `${new Date().getFullYear()}-${button.dataset.summer}`;
    state.selectedDate = `${state.month}-01`;
    noteInput.value = '';
    timeStartInput.value = '';
    timeEndInput.value = '';
    timeNoteInput.value = '';
    lockEventForm.hidden = true;
    void reloadCalendarData();
  });
});

// A3 — bulk mark next 4 Fridays as AVAILABLE (server applies Friday default time)
document.getElementById('mark-fridays-btn').addEventListener('click', async () => {
  const btn = document.getElementById('mark-fridays-btn');
  btn.disabled = true;
  errorBox.textContent = '';
  try {
    const today = new Date();
    today.setUTCHours(0, 0, 0, 0);
    const dow = today.getUTCDay();
    const daysToFirstFriday = dow === 5 ? 0 : (5 - dow + 7) % 7;
    const dates = [];
    for (let i = 0; i < 4; i++) {
      const d = new Date(today);
      d.setUTCDate(today.getUTCDate() + daysToFirstFriday + i * 7);
      dates.push(d.toISOString().slice(0, 10));
    }
    for (const date of dates) {
      await api('/api/fredagsfett/availability', {
        method: 'POST',
        body: JSON.stringify({ date, status: 'AVAILABLE' }),
      });
    }
    await reloadCalendarData();
    showToast(`${dates.length} fredagar markerade som tillgänglig.`);
  } catch (err) {
    errorBox.textContent = err.message;
  } finally {
    btn.disabled = false;
  }
});

document.querySelectorAll('[data-view-mode]').forEach(button => {
  // Reflect the persisted mode on initial paint so the buttons match state.viewMode.
  button.setAttribute('aria-pressed', button.dataset.viewMode === state.viewMode ? 'true' : 'false');
  button.addEventListener('click', () => {
    const requested = button.dataset.viewMode;
    state.viewMode = (requested === 'heatmap' || requested === 'week') ? requested : 'initials';
    sessionStorage.setItem('ff-calendar-view-mode', state.viewMode);
    document.querySelectorAll('[data-view-mode]').forEach(b => {
      b.setAttribute('aria-pressed', b.dataset.viewMode === state.viewMode ? 'true' : 'false');
    });
    renderCalendar();
  });
});

document.getElementById('locked-events-list').addEventListener('click', event => {
  const row = event.target.closest('.locked-row');
  if (!row) return;
  const date = row.dataset.date;
  if (!date) return;
  state.selectedDate = date;
  // Jump the grid to the event's month if we aren't already there.
  const targetMonth = date.slice(0, 7);
  if (targetMonth !== state.month) {
    state.month = targetMonth;
    void reloadCalendarData();
  } else {
    renderCalendar();
  }
});

// B3 — clicking a past-event row navigates the calendar to that date (same as upcoming rows)
document.getElementById('past-events-list')?.addEventListener('click', event => {
  const row = event.target.closest('.locked-row');
  if (!row) return;
  const date = row.dataset.date;
  if (!date) return;
  state.selectedDate = date;
  const targetMonth = date.slice(0, 7);
  if (targetMonth !== state.month) {
    state.month = targetMonth;
    void reloadCalendarData();
  } else {
    renderCalendar();
  }
});

// B4 — copy personal iCal feed URL to clipboard
document.getElementById('ical-copy-btn')?.addEventListener('click', async () => {
  const btn = document.getElementById('ical-copy-btn');
  btn.disabled = true;
  try {
    const data = await api('/api/fredagsfett/ical-url');
    const url = data?.url || '';
    if (!url) throw new Error('Kunde inte hämta länken.');
    try {
      await navigator.clipboard.writeText(url);
      showToast('iCal-länken kopierad. Prenumerera i din kalenderapp.');
    } catch {
      // Fallback when clipboard isn't available (e.g. insecure context) — show a prompt
      window.prompt('Kopiera den här länken till din kalenderapp:', url);
    }
  } catch (err) {
    errorBox.textContent = err.message || 'Kunde inte hämta iCal-länken.';
  } finally {
    btn.disabled = false;
  }
});

// B1 — submit a new event comment
document.getElementById('event-comment-form')?.addEventListener('submit', async event => {
  event.preventDefault();
  const input = document.getElementById('event-comment-input');
  const errEl = document.getElementById('event-comment-error');
  const eventId = state.currentEventId;
  if (!input || !eventId) return;
  const text = input.value.trim();
  if (!text) return;
  errEl.textContent = '';
  const submitBtn = event.currentTarget.querySelector('button[type="submit"]');
  if (submitBtn) submitBtn.disabled = true;
  try {
    await api(`/api/fredagsfett/events/${encodeURIComponent(eventId)}/comments`, {
      method: 'POST',
      body: JSON.stringify({ body: text }),
    });
    input.value = '';
    await loadEventComments(eventId);
  } catch (err) {
    errEl.textContent = err.message || 'Kunde inte skicka kommentaren.';
  } finally {
    if (submitBtn) submitBtn.disabled = false;
  }
});

async function boot() {
  try {
    const session = await api('/api/fredagsfett/session');
    if (!session.authenticated || session.needs_registration) {
      location.href = `/fredagsfett?next=${encodeURIComponent('/fredagsfett/kalender')}`;
      return;
    }
    currentSession = session;
    document.body.classList.toggle('is-admin', !!(session.user && session.user.is_admin));
    await Promise.all([loadAvailability(), loadEvents(), loadUpcomingEvents()]);
    renderCalendar();
    // Note: a tap mid-poll may briefly flicker if loadAvailability returns before
    // the tap's POST resolves. Last-write-wins on the server, self-corrects on next poll.
    setInterval(reloadCalendarData, 15000);
  } catch {
    location.href = `/fredagsfett?next=${encodeURIComponent('/fredagsfett/kalender')}`;
  }
}

void boot();
</script>
