<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sp1e.se</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/brand.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-in 1.5s ease forwards;
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  /* ── Centre stack ─────────────────────────────────── */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 3rem;
    letter-spacing: 0.3em;
    color: #fff;
    text-indent: 0.3em; /* compensate letter-spacing on last char */
    user-select: none;
  }
  .logo-one { font-size: 1.05em; display: inline-block; vertical-align: baseline; }

  .rule {
    width: 100px;
    height: 1px;
    background: rgba(255,255,255,0.10);
    margin-top: -1rem; /* tighten the gap after wordmark */
  }

  /* ── Cards ────────────────────────────────────────── */
  .cards {
    display: flex;
    gap: 1rem;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 60px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .card:hover, .card:focus-visible {
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.95);
    box-shadow: 0 0 20px rgba(255,255,255,0.04);
    outline: none;
  }

  /* ── Modal overlay ────────────────────────────────── */
  #modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.80);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  #modal.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    width: min(300px, 90vw);
  }

  .modal-input {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.18);
    border-radius: 0;
    padding: 0.5rem 0.25rem;
    width: 220px;
    color: rgba(255,255,255,0.85);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-align: center;
    outline: none;
    box-shadow: none;
    transition: border-color 0.2s ease;
    caret-color: #4af2c8;
  }

  .modal-input:focus {
    outline: none;
    box-shadow: none;
    border-bottom-color: #4af2c8;
  }

  .modal-error {
    font-size: 0.72rem;
    color: rgba(220,80,80,0.9);
    letter-spacing: 0.05em;
    height: 1em;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .modal-error.show { opacity: 1; }

  .pw-wrap { position: relative; width: 100%; }
  .pw-wrap .modal-input { padding-right: 2.5rem; }
  .pw-toggle {
    position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 1rem; opacity: 0.4; transition: opacity 0.15s;
  }
  .pw-toggle:hover { opacity: 0.8; }

  /* Kill Chromium/WebKit autofill overlay (injects inset box-shadow + blue bg) */
  .modal-input:-webkit-autofill,
  .modal-input:-webkit-autofill:hover,
  .modal-input:-webkit-autofill:focus,
  .modal-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 9999px #000 inset !important;
    box-shadow:         0 0 0 9999px #000 inset !important;
    -webkit-text-fill-color: rgba(255,255,255,0.85) !important;
    border-bottom-color: rgba(255,255,255,0.18) !important;
    caret-color: #4af2c8;
  }

  /* ── Responsive ───────────────────────────────────── */
  @media (max-width: 400px) {
    .cards { flex-direction: column; }
    .card  { width: 160px; }
  }
</style>
</head>
<body>

<main class="stage">
  <h1 class="wordmark brand-mark">SP<span class="brand-one">1</span>E</h1>
  <div class="rule"></div>
  <nav class="cards">
    <a class="card" href="/visitor">Visitor</a>
    <button class="card" id="hub-btn">Σ.Π.</button>
  </nav>
</main>

<!-- Password modal -->
<div id="modal" role="dialog" aria-modal="true" aria-label="Ange lösenord">
  <div class="modal-box">
    <div class="pw-wrap">
      <input
        class="modal-input"
        id="pw-input"
        type="password"
        placeholder="••••••••"
        autocomplete="current-password"
      >
      <button class="pw-toggle" id="pw-toggle" type="button" tabindex="-1">👁</button>
    </div>
    <p class="modal-error" id="pw-error" aria-live="polite">Fel lösenord.</p>
  </div>
</div>

<script>
  const modal  = document.getElementById('modal');
  const input  = document.getElementById('pw-input');
  const error  = document.getElementById('pw-error');
  const toggle = document.getElementById('pw-toggle');
  const hubBtn = document.getElementById('hub-btn');

  let submitting = false;
  let errorTimer = null;
  let isSubmitting = false;

  function openModal() {
    modal.classList.add('open');
    input.value = '';
    input.classList.remove('error');
    requestAnimationFrame(() => setTimeout(() => input.focus(), 40));
  }

  function closeModal() {
    modal.classList.remove('open');
  }

  function flashError() {
    input.value = '';
    input.classList.remove('error');
    void input.offsetWidth; // reflow to restart transition
    input.classList.add('error');
    clearTimeout(errorTimer);
    errorTimer = setTimeout(() => {
      input.classList.remove('error');
      input.style.transition = 'border-color 0.2s ease';
    }, 500);
    input.focus();
  }

  async function attemptLogin() {
    if (isSubmitting) return;
    const password = input.value;
    if (!password) return;

    isSubmitting = true;
    input.disabled = true;
    toggle.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ password }),
      });

      if (res.ok) {
        window.location.href = '/hub';
      } else {
        flashError();
      }
    } catch {
      flashError();
    } finally {
      isSubmitting = false;
      input.disabled = false;
      toggle.disabled = false;
    }
  }

  toggle.addEventListener('click', () => {
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    toggle.textContent = show ? '🙈' : '👁';
  });

  hubBtn.addEventListener('click', openModal);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  attemptLogin();
    if (e.key === 'Escape') closeModal();
  });

  modal.addEventListener('click', e => {
    if (e.target === modal) closeModal();
  });
</script>
</body>
</html>
