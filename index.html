<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sp1e.se</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/brand.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-in 1.5s ease forwards;
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  /* ── Centre stack ─────────────────────────────────── */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 3rem;
    letter-spacing: 0.3em;
    color: #fff;
    text-indent: 0.3em; /* compensate letter-spacing on last char */
    user-select: none;
  }
  .logo-one { font-size: 1.05em; display: inline-block; vertical-align: baseline; }

  .rule {
    width: 100px;
    height: 1px;
    background: rgba(255,255,255,0.10);
    margin-top: -1rem; /* tighten the gap after wordmark */
  }

  /* ── Cards ────────────────────────────────────────── */
  .cards {
    display: flex;
    gap: 1rem;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 60px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .card:hover, .card:focus-visible {
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.95);
    box-shadow: 0 0 20px rgba(255,255,255,0.04);
    outline: none;
  }

  /* ── Modal overlay ────────────────────────────────── */
  #modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.80);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  #modal.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    width: min(300px, 90vw);
  }

  .modal-input {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.18);
    border-radius: 0;
    padding: 0.5rem 0.25rem;
    width: 220px;
    color: rgba(255,255,255,0.85);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-align: center;
    outline: none;
    box-shadow: none;
    transition: border-color 0.2s ease;
    caret-color: #4af2c8;
  }

  .modal-input:focus {
    outline: none;
    box-shadow: none;
    border-bottom-color: #4af2c8;
  }

  .modal-input.error {
    border-bottom-color: rgba(220,80,80,0.85);
    transition: border-color 0s;
  }

  /* Kill Chromium/WebKit autofill overlay (injects inset box-shadow + blue bg) */
  .modal-input:-webkit-autofill,
  .modal-input:-webkit-autofill:hover,
  .modal-input:-webkit-autofill:focus,
  .modal-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 9999px #000 inset !important;
    box-shadow:         0 0 0 9999px #000 inset !important;
    -webkit-text-fill-color: rgba(255,255,255,0.85) !important;
    border-bottom-color: rgba(255,255,255,0.18) !important;
    caret-color: #4af2c8;
  }

  /* ── Responsive ───────────────────────────────────── */
  @media (max-width: 400px) {
    .cards { flex-direction: column; }
    .card  { width: 160px; }
  }

  /* ── Background gallery ───────────────────────────── */
  #bg-gallery {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0;
    transition: opacity 3s ease;
  }
  #bg-img-a { z-index: 1; }
  #bg-img-b { z-index: 0; }
  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0,0,0,0.62);
    pointer-events: none;
  }
  .stage { position: relative; z-index: 2; }
</style>
</head>
<body>

<!-- Background painting gallery -->
<div id="bg-gallery" aria-hidden="true">
  <img class="bg-img" id="bg-img-a" src="" alt="">
  <img class="bg-img" id="bg-img-b" src="" alt="">
</div>
<div id="bg-overlay" aria-hidden="true"></div>

<main class="stage">
  <h1 class="wordmark brand-mark">SP<span class="brand-one">1</span>E</h1>
  <div class="rule"></div>
  <nav class="cards">
    <a class="card" href="/visitor">Visitor</a>
    <button class="card" id="hub-btn">Σ.Π.</button>
  </nav>
</main>

<!-- Password modal — bare input only -->
<div id="modal" role="dialog" aria-modal="true" aria-label="Ange lösenord">
  <input
    class="modal-input"
    id="pw-input"
    type="password"
    autocomplete="current-password"
    spellcheck="false"
  >
</div>

<script>
  const modal  = document.getElementById('modal');
  const input  = document.getElementById('pw-input');
  const hubBtn = document.getElementById('hub-btn');

  let submitting = false;
  let errorTimer = null;

  function openModal() {
    modal.classList.add('open');
    input.value = '';
    input.classList.remove('error');
    requestAnimationFrame(() => setTimeout(() => input.focus(), 40));
  }

  function closeModal() {
    modal.classList.remove('open');
  }

  function flashError() {
    input.value = '';
    input.classList.remove('error');
    void input.offsetWidth; // reflow — restarts the transition
    input.classList.add('error');
    clearTimeout(errorTimer);
    errorTimer = setTimeout(() => {
      input.classList.remove('error');
    }, 500);
    input.focus();
  }

  async function attemptLogin() {
    if (submitting) return;
    const password = input.value;
    if (!password) return;

    submitting = true;
    input.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = '/hub';
      } else {
        flashError();
      }
    } catch {
      flashError();
    } finally {
      submitting = false;
      input.disabled = false;
    }
  }

  hubBtn.addEventListener('click', openModal);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  attemptLogin();
    if (e.key === 'Escape') closeModal();
  });

  modal.addEventListener('click', e => {
    if (e.target === modal) closeModal();
  });

  // ── Background painting gallery ─────────────────────
  (function bgGallery() {
    const CACHE_KEY   = 'sp1e-gallery-v3'; // shared with hub
    const INTERVAL_MS = 28_000;
    const FADE_MS     = 3000;
    const IMG_BASE    = 'https://www.artic.edu/iiif/2';

    let artworks = [], current = 0;
    let front, back;
    const imgA = document.getElementById('bg-img-a');
    const imgB = document.getElementById('bg-img-b');

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function imgUrl(id) {
      return `${IMG_BASE}/${id}/full/1600,/0/default.jpg`;
    }

    function showFirst(art) {
      front = imgA; back = imgB;
      front.style.zIndex = '1'; back.style.zIndex = '0';
      front.src = imgUrl(art.image_id);
      front.onload = () => { front.onload = null; front.style.opacity = '1'; };
    }

    function crossfade(art) {
      back.src = imgUrl(art.image_id);
      back.onload = () => {
        back.onload = null;
        back.style.zIndex = '2';
        back.style.opacity = '1';
        setTimeout(() => {
          front.style.opacity = '0';
          setTimeout(() => {
            front.style.zIndex = '0';
            const tmp = front; front = back; back = tmp;
            front.style.zIndex = '1';
          }, FADE_MS + 100);
        }, 50);
      };
    }

    async function fetchArtworks() {
      const cached = sessionStorage.getItem(CACHE_KEY);
      if (cached) { try { return JSON.parse(cached); } catch {} }
      const res = await fetch('/api/art');
      if (!res.ok) return [];
      const data = await res.json();
      const items = (data.data ?? []).filter(d => d.image_id);
      if (items.length) sessionStorage.setItem(CACHE_KEY, JSON.stringify(items));
      return items;
    }

    async function init() {
      try {
        const raw = await fetchArtworks();
        if (!raw.length) return;
        artworks = shuffle(raw);
        showFirst(artworks[0]);
        setInterval(() => {
          current = (current + 1) % artworks.length;
          crossfade(artworks[current]);
        }, INTERVAL_MS);
      } catch {}
    }

    init();
  })();
</script>
</body>
</html>
