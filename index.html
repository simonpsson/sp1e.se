<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sp1e.se</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Mono&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-in 1.5s ease forwards;
  }

  @keyframes fade-in { to { opacity: 1; } }

  /* ── Background gallery ───────────────────────────── */
  #bg-gallery {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
    pointer-events: none;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;       /* ambient: cropped to fill */
    object-position: center;
    opacity: 0;
    transition: opacity 3s ease;
  }
  /* Immersion: show the complete painting, letterbox with black */
  body.immersive .bg-img { object-fit: contain; }

  #bg-img-a { z-index: 1; }
  #bg-img-b { z-index: 0; }

  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0,0,0,0.62);
    pointer-events: none;
    transition: background 1.5s ease;
  }
  body.immersive #bg-overlay {
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.10) 0%,
      rgba(0,0,0,0.04) 45%,
      rgba(0,0,0,0.22) 78%,
      rgba(0,0,0,0.65) 100%
    );
  }

  /* ── Centre stack ─────────────────────────────────── */
  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    transition: opacity 0.7s ease;
  }
  body.immersive .stage { opacity: 0; pointer-events: none; }

  /* ── SP1E logo ────────────────────────────────────── */
  .sp1e-logo {
    display: block;
    height: 3rem;
    width: auto;
    overflow: visible;
    user-select: none;
  }

  .rule {
    width: 100px;
    height: 1px;
    background: rgba(255,255,255,0.10);
    margin-top: -1rem;
  }

  /* ── Cards ────────────────────────────────────────── */
  .cards { display: flex; gap: 1rem; }

  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 60px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card:hover, .card:focus-visible {
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.95);
    box-shadow: 0 0 20px rgba(255,255,255,0.04);
    outline: none;
  }

  /* ── Modal ────────────────────────────────────────── */
  #modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  #modal.open { opacity: 1; pointer-events: all; }

  .modal-input {
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.03);
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    border-radius: 0;
    padding: 0.5rem 0.25rem;
    width: 220px;
    color: rgba(255,255,255,0.85);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-align: center;
    outline: none;
    box-shadow: none;
    transition: border-color 0.2s ease;
    caret-color: #fff;
  }
  .modal-input:focus { outline: none; box-shadow: none; border-bottom-color: rgba(255,255,255,0.4); }
  .modal-input.error { border-bottom-color: #f24a4a; transition: border-color 0s; }
  .modal-input::-ms-reveal, .modal-input::-ms-clear { display: none; }
  .modal-input::-webkit-credentials-auto-fill-button,
  .modal-input::-webkit-strong-password-auto-fill-button,
  .modal-input::-webkit-contacts-auto-fill-button { display: none !important; }
  .modal-input:-webkit-autofill,
  .modal-input:-webkit-autofill:hover,
  .modal-input:-webkit-autofill:focus,
  .modal-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 9999px #000 inset !important;
    box-shadow:         0 0 0 9999px #000 inset !important;
    -webkit-text-fill-color: rgba(255,255,255,0.85) !important;
    border-bottom-color: rgba(255,255,255,0.15) !important;
    caret-color: #fff;
  }

  /* ── Bottom bar — stacks spotify player above immersion btn ── */
  #bottom-bar {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    max-width: calc(100vw - 2rem);
  }

  /* ── Spotify player ───────────────────────────────── */
  #spotify-player {
    position: relative;
    max-width: 420px;
    width: 100%;
    background: rgba(0,0,0,0.60);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.5s ease, max-width 0.3s ease, padding 0.3s ease, border-radius 0.3s ease;
  }
  #spotify-player.sp-shown { opacity: 1; }
  #spotify-player.hidden    { display: none; opacity: 0; }
  body.immersive #spotify-player.sp-shown { opacity: 0.45; }

  #sp-art {
    width: 48px;
    height: 48px;
    min-width: 48px;
    border-radius: 4px;
    object-fit: cover;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    background: rgba(255,255,255,0.06);
    transition: opacity 0.3s ease, width 0.3s ease, height 0.3s ease, min-width 0.3s ease;
  }

  #sp-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
    overflow: hidden;
    transition: opacity 0.25s ease;
  }
  #sp-track-line {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    color: rgba(255,255,255,0.90);
  }
  #sp-artist { color: rgba(255,255,255,0.50); font-size: 0.70rem; }
  .sp-sep { color: rgba(255,255,255,0.25); }
  #sp-progress-wrap {
    height: 2px;
    background: rgba(255,255,255,0.10);
    border-radius: 1px;
    overflow: hidden;
  }
  #sp-progress-fill {
    height: 100%;
    background: rgba(255,255,255,0.55);
    width: 0%;
    transition: width 1s linear;
  }
  #sp-visitor-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.28);
    display: none;
  }
  #spotify-player.visitor-mode #sp-visitor-label { display: block; }
  #spotify-player.visitor-mode #sp-controls { display: none; }

  #sp-controls {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
    transition: opacity 0.25s ease;
  }
  .sp-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.40);
    font-size: 0.85rem;
    padding: 5px 6px;
    line-height: 1;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .sp-btn:hover { color: rgba(255,255,255,0.90); }
  #sp-play { font-size: 1rem; }
  #sp-link {
    display: flex;
    align-items: center;
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    padding: 5px;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  #sp-link:hover { color: rgba(255,255,255,0.65); }

  /* ── Disconnect × (top-right of player, show on hover) */
  #sp-disconnect {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 18px;
    height: 18px;
    background: rgba(14,14,20,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
    color: rgba(255,255,255,0.25);
    font-size: 0.6rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #spotify-player:hover #sp-disconnect { opacity: 1; }
  #sp-disconnect:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.25); }

  /* ── Mini state (collapses after 5 min idle) ──────── */
  #bottom-bar.sp-mini {
    left: auto;
    right: 2rem;
    transform: none;
  }
  #bottom-bar.sp-mini #immersion-btn  { display: none; }
  #bottom-bar.sp-mini #sp-disconnect  { display: none; }
  #bottom-bar.sp-mini #spotify-player { max-width: 44px; padding: 5px; border-radius: 8px; gap: 0; cursor: pointer; }
  #bottom-bar.sp-mini #sp-art         { width: 32px; height: 32px; min-width: 32px; }
  #bottom-bar.sp-mini #sp-info        { display: none; }
  #bottom-bar.sp-mini #sp-controls    { display: none; }
  #bottom-bar.sp-mini #sp-link        { display: none; }

  /* ── ♫ hint (unlinked, bottom-right) ─────────────── */
  #sp-hint {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 10;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.18);
    text-decoration: none;
    transition: color 0.2s;
    line-height: 1;
  }
  #sp-hint:hover { color: rgba(255,255,255,0.42); }
  #sp-hint.hidden { display: none; }
  body.immersive #sp-hint { opacity: 0; pointer-events: none; }

  /* ── Immersion button ─────────────────────────────── */
  #immersion-btn {
    padding: 0.5rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.50);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease, border-color 0.25s, color 0.25s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #immersion-btn.ready { opacity: 1; pointer-events: all; }
  #immersion-btn:hover { border-color: rgba(255,255,255,0.30); color: rgba(255,255,255,0.80); }
  body.immersive #immersion-btn { opacity: 0; pointer-events: none; }

  /* ── Immersion controls (close, arrows, caption) ─── */
  /* Base: hidden. Shown in immersive mode. Hidden again when idle. */
  #immersion-close,
  .imm-arrow {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, color 0.2s;
  }
  body.immersive #immersion-close,
  body.immersive .imm-arrow {
    opacity: 1;
    pointer-events: all;
  }
  /* Idle: fade out all controls (JS adds .imm-idle to body) */
  body.imm-idle #immersion-close,
  body.imm-idle .imm-arrow { opacity: 0 !important; pointer-events: none !important; }

  #immersion-close {
    position: fixed;
    top: 1.5rem;
    right: 1.75rem;
    z-index: 10;
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    font-size: 1.5rem;
    line-height: 1;
    padding: 0.3rem 0.4rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #immersion-close:hover { color: rgba(255,255,255,0.90); }

  /* Navigation arrows */
  .imm-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.30);
    border: none;
    border-radius: 50%;
    color: rgba(255,255,255,0.40);
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .imm-arrow:hover { color: rgba(255,255,255,0.80); }
  #imm-prev { left: 2rem; }
  #imm-next { right: 2rem; }

  /* ── Immersion caption ────────────────────────────── */
  #immersion-caption {
    position: fixed;
    bottom: 2rem;
    left: 2rem;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  /* Caption also hides when idle */
  body.imm-idle #immersion-caption { opacity: 0 !important; }

  .ic-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.70);
    text-shadow: 0 1px 10px rgba(0,0,0,1), 0 0 24px rgba(0,0,0,0.9);
    margin-bottom: 0.3rem;
  }
  .ic-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.15rem;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 10px rgba(0,0,0,1), 0 0 24px rgba(0,0,0,0.9);
    margin-bottom: 0.2rem;
  }
  .ic-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.40);
    text-shadow: 0 1px 10px rgba(0,0,0,1);
  }

  /* ── Responsive ───────────────────────────────────── */
  @media (max-width: 768px) {
    #bottom-bar {
      bottom: 0;
      left: 0;
      right: 0;
      transform: none;
      max-width: 100%;
      flex-direction: column-reverse;
      gap: 0;
    }
    #bottom-bar.sp-mini { left: 0; right: 0; transform: none; }
    #spotify-player {
      max-width: 100%;
      border-radius: 0;
      border-left: none;
      border-right: none;
      border-bottom: none;
      padding: 8px 14px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    }
    #sp-art     { width: 36px !important; height: 36px !important; min-width: 36px !important; }
    #sp-track-line { font-size: 0.72rem; }
    #sp-artist  { font-size: 0.64rem; }
    #sp-link    { display: none !important; }
    #sp-disconnect { display: none !important; }
    #immersion-btn { margin: 0.4rem 0; }
  }
  @media (max-width: 400px) {
    .cards { flex-direction: column; }
    .card  { width: 160px; }
    #imm-prev { left: 0.75rem; }
    #imm-next { right: 0.75rem; }
  }
</style>
</head>
<body>

<!-- Background painting gallery -->
<div id="bg-gallery" aria-hidden="true">
  <img class="bg-img" id="bg-img-a" src="" alt="">
  <img class="bg-img" id="bg-img-b" src="" alt="">
</div>
<div id="bg-overlay" aria-hidden="true"></div>

<main class="stage">
  <svg class="sp1e-logo" viewBox="0 0 150 52" aria-label="SP1E" role="img" xmlns="http://www.w3.org/2000/svg">
    <text x="2" y="40" font-family="'Cormorant Garamond', serif" font-weight="300" font-size="42" fill="white" letter-spacing="10"
          style="font-variant-numeric:lining-nums;font-feature-settings:'lnum' 1">SP1E</text>
  </svg>
  <div class="rule"></div>
  <nav class="cards">
    <a class="card" href="/mosquito">Mosquito</a>
    <button class="card" id="hub-btn">Σ.Π.</button>
  </nav>
</main>

<!-- Password modal -->
<div id="modal" role="dialog" aria-modal="true" aria-label="Ange lösenord">
  <input class="modal-input" id="pw-input" type="password" autocomplete="current-password" spellcheck="false">
</div>

<!-- Spotify player + immersion button (stacked, centered) -->
<div id="bottom-bar">
  <div id="spotify-player" class="hidden" aria-live="polite">
    <img id="sp-art" src="" alt="Album art">
    <div id="sp-info">
      <div id="sp-track-line">
        <span id="sp-title"></span><span class="sp-sep"> · </span><span id="sp-artist"></span>
      </div>
      <div id="sp-progress-wrap"><div id="sp-progress-fill"></div></div>
      <div id="sp-visitor-label">Playing on Spotify</div>
    </div>
    <div id="sp-controls">
      <button class="sp-btn" id="sp-prev" aria-label="Previous">⏮</button>
      <button class="sp-btn" id="sp-play" aria-label="Play / Pause">▶</button>
      <button class="sp-btn" id="sp-next" aria-label="Next">⏭</button>
    </div>
    <a id="sp-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Open in Spotify">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </a>
    <button id="sp-disconnect" aria-label="Disconnect Spotify">×</button>
  </div>
  <button id="immersion-btn" aria-label="Immersion mode">Immersion</button>
</div>

<!-- ♫ hint — visible when Spotify not linked -->
<a id="sp-hint" href="/api/spotify/login" aria-label="Link Spotify">♫</a>

<!-- Immersion controls -->
<button id="immersion-close" aria-label="Exit immersion">×</button>
<button class="imm-arrow" id="imm-prev" aria-label="Previous painting">‹</button>
<button class="imm-arrow" id="imm-next" aria-label="Next painting">›</button>
<div id="immersion-caption" aria-live="polite">
  <div class="ic-artist" id="ic-artist"></div>
  <div class="ic-title"  id="ic-title"></div>
  <div class="ic-year"   id="ic-year"></div>
</div>

<script>
// ── Modal ─────────────────────────────────────────────────────────────────────
const modal  = document.getElementById('modal');
const input  = document.getElementById('pw-input');
const hubBtn = document.getElementById('hub-btn');
const stage  = document.querySelector('.stage');

let submitting = false;
let errorTimer = null;

function openModal() {
  modal.classList.add('open');
  input.value = '';
  input.classList.remove('error');
  requestAnimationFrame(() => setTimeout(() => input.focus(), 40));
}
function closeModal() { modal.classList.remove('open'); }

function flashError() {
  input.value = '';
  input.classList.remove('error');
  void input.offsetWidth;
  input.classList.add('error');
  clearTimeout(errorTimer);
  errorTimer = setTimeout(() => input.classList.remove('error'), 500);
  input.focus();
}

async function attemptLogin() {
  if (submitting) return;
  const password = input.value;
  if (!password) return;
  submitting = true;
  input.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ password }),
    });
    if (res.ok) window.location.href = '/hub';
    else flashError();
  } catch { flashError(); }
  finally { submitting = false; input.disabled = false; }
}

hubBtn.addEventListener('click', openModal);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter')  attemptLogin();
  if (e.key === 'Escape') closeModal();
});
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

// ── Immersion ─────────────────────────────────────────────────────────────────
const immBtn     = document.getElementById('immersion-btn');
const immClose   = document.getElementById('immersion-close');
const immCaption = document.getElementById('immersion-caption');
const immPrev    = document.getElementById('imm-prev');
const immNext    = document.getElementById('imm-next');
const icArtist   = document.getElementById('ic-artist');
const icTitle    = document.getElementById('ic-title');
const icYear     = document.getElementById('ic-year');

let immersive      = false;
let captionVisible = false;   // true once caption has been shown after entering
let stageHideTimer = null;
let idleTimer      = null;

function setCaption(art) {
  icArtist.textContent = (art.artist_title || '').toUpperCase();
  icTitle.textContent  =  art.title        || '';
  icYear.textContent   =  art.date_display || '';
}

function swapCaption(art) {
  // 0.3s fade out, update, fade back in
  immCaption.style.opacity = '0';
  setTimeout(() => {
    setCaption(art);
    if (captionVisible && !document.body.classList.contains('imm-idle')) {
      immCaption.style.opacity = '1';
    }
  }, 300);
}

function showControls() {
  if (!immersive) return;
  document.body.classList.remove('imm-idle');
  if (captionVisible) immCaption.style.opacity = '1';
  resetIdleTimer();
}

function hideControls() {
  document.body.classList.add('imm-idle');
  immCaption.style.opacity = '0';
}

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(hideControls, 3000);
}

function enterImmersion() {
  if (immersive) return;
  immersive = true;
  captionVisible = false;
  document.body.classList.add('immersive');
  document.body.classList.remove('imm-idle');

  clearTimeout(stageHideTimer);
  stageHideTimer = setTimeout(() => { stage.style.display = 'none'; }, 750);

  // Caption appears after overlay has settled
  setTimeout(() => {
    if (!immersive) return;
    const art = bgArtworks[bgCurrent];
    if (art) {
      setCaption(art);
      immCaption.style.opacity = '1';
      captionVisible = true;
      resetIdleTimer();
    }
  }, 1100);

  bgIntervalMs = 20_000;
}

function exitImmersion() {
  if (!immersive) return;
  immersive = false;
  captionVisible = false;
  clearTimeout(stageHideTimer);
  clearTimeout(idleTimer);
  immCaption.style.opacity = '0';
  document.body.classList.remove('imm-idle');
  stage.style.display = '';
  requestAnimationFrame(() => {
    document.body.classList.remove('immersive');
    bgIntervalMs = 28_000;
  });
}

immBtn.addEventListener('click', enterImmersion);
immClose.addEventListener('click', exitImmersion);
immPrev.addEventListener('click', () => { gAdvance(-1); showControls(); });
immNext.addEventListener('click', () => { gAdvance(+1); showControls(); });

document.addEventListener('mousemove', () => { if (immersive) showControls(); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (modal.classList.contains('open')) closeModal();
  else if (immersive) exitImmersion();
});

// ── Background gallery ────────────────────────────────────────────────────────
const GCACHE = 'sp1e-gallery-v3';
const GFADE  = 3000;
const GBASE  = 'https://www.artic.edu/iiif/2';

let bgArtworks   = [];
let bgCurrent    = 0;
let bgFront, bgBack, bgTimer;
let bgIntervalMs = 28_000;

const bgImgA = document.getElementById('bg-img-a');
const bgImgB = document.getElementById('bg-img-b');

function gUrl(id) { return `${GBASE}/${id}/full/1600,/0/default.jpg`; }

function gShuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function gOnChange(art) {
  if (immersive && captionVisible) swapCaption(art);
}

function gShowFirst(art) {
  bgFront = bgImgA; bgBack = bgImgB;
  bgFront.style.zIndex = '1'; bgBack.style.zIndex = '0';
  bgFront.src = gUrl(art.image_id);
  bgFront.onload = () => {
    bgFront.onload = null;
    bgFront.style.opacity = '1';
    immBtn.classList.add('ready');
  };
}

function gCrossfade(art) {
  gOnChange(art);
  bgBack.src = gUrl(art.image_id);
  bgBack.onload = () => {
    bgBack.onload = null;
    bgBack.style.zIndex = '2';
    bgBack.style.opacity = '1';
    setTimeout(() => {
      bgFront.style.opacity = '0';
      setTimeout(() => {
        bgFront.style.zIndex = '0';
        const tmp = bgFront; bgFront = bgBack; bgBack = tmp;
        bgFront.style.zIndex = '1';
      }, GFADE + 100);
    }, 50);
  };
}

function gAdvance(delta) {
  if (!bgArtworks.length) return;
  bgCurrent = (bgCurrent + delta + bgArtworks.length) % bgArtworks.length;
  gCrossfade(bgArtworks[bgCurrent]);
  // Reset auto-advance timer so it doesn't fire immediately after manual navigation
  gSchedule();
}

function gSchedule() {
  clearTimeout(bgTimer);
  bgTimer = setTimeout(() => {
    bgCurrent = (bgCurrent + 1) % bgArtworks.length;
    gCrossfade(bgArtworks[bgCurrent]);
    gSchedule();
  }, bgIntervalMs);
}

async function gFetch() {
  const c = sessionStorage.getItem(GCACHE);
  if (c) { try { return JSON.parse(c); } catch {} }
  const res = await fetch('/api/art');
  if (!res.ok) return [];
  const data = await res.json();
  const items = (data.data ?? []).filter(d => d.image_id);
  if (items.length) sessionStorage.setItem(GCACHE, JSON.stringify(items));
  return items;
}

async function gInit() {
  try {
    const raw = await gFetch();
    if (!raw.length) return;
    bgArtworks = gShuffle(raw);
    gShowFirst(bgArtworks[0]);
    gSchedule();
  } catch {}
}

gInit();

// ── Spotify player ─────────────────────────────────────────────────────────────
const spPlayerEl    = document.getElementById('spotify-player');
const spArtEl       = document.getElementById('sp-art');
const spTitleEl     = document.getElementById('sp-title');
const spArtistEl    = document.getElementById('sp-artist');
const spFillEl      = document.getElementById('sp-progress-fill');
const spBtnPrev     = document.getElementById('sp-prev');
const spBtnPlay     = document.getElementById('sp-play');
const spBtnNext     = document.getElementById('sp-next');
const spLinkEl      = document.getElementById('sp-link');
const spHintEl      = document.getElementById('sp-hint');
const spDisconnect  = document.getElementById('sp-disconnect');
const bottomBarEl   = document.getElementById('bottom-bar');

let sdkPlayer  = null;
let progressIv = null;
let visitorIv  = null;
let miniTimer  = null;
let lastArtUrl = '';
let spShown    = false;

function hasCookie(name) {
  return document.cookie.split(';').some(c => c.trim().startsWith(name + '='));
}
const spLinked = hasCookie('spotify_linked');

// ── Visibility ────────────────────────────────────────────────────────────────
function showSpotifyPlayer(visitorMode) {
  spPlayerEl.classList.remove('hidden', 'visitor-mode');
  if (visitorMode) spPlayerEl.classList.add('visitor-mode');
  if (!spShown) {
    spShown = true;
    // Two-frame trick: remove hidden first, then add sp-shown for opacity transition
    requestAnimationFrame(() => requestAnimationFrame(() => spPlayerEl.classList.add('sp-shown')));
  }
  if (spHintEl) spHintEl.classList.add('hidden');
}

function hideSpotifyPlayer() {
  spPlayerEl.classList.remove('sp-shown');
  spPlayerEl.classList.add('hidden');
  spShown = false;
  stopProgress();
  clearMiniTimer();
  bottomBarEl.classList.remove('sp-mini');
}

// ── Album art crossfade ───────────────────────────────────────────────────────
function setAlbumArt(url) {
  if (!url || url === lastArtUrl) return;
  lastArtUrl = url;
  spArtEl.style.opacity = '0';
  setTimeout(() => {
    spArtEl.src = url;
    const done = () => {
      spArtEl.style.opacity = '1';
      spArtEl.removeEventListener('load',  done);
      spArtEl.removeEventListener('error', done);
    };
    spArtEl.addEventListener('load',  done);
    spArtEl.addEventListener('error', done);
  }, 300);
}

// ── Track/progress update ─────────────────────────────────────────────────────
function setPlayerTrack(artUrl, title, artist, progress, duration, trackUrl, isPlaying) {
  setAlbumArt(artUrl);
  spTitleEl.textContent  = title  || '';
  spArtistEl.textContent = artist || '';
  const pct = duration > 0 ? Math.min(100, (progress / duration) * 100) : 0;
  spFillEl.style.transition = 'none';
  spFillEl.style.width = pct + '%';
  if (spBtnPlay) spBtnPlay.textContent = isPlaying ? '⏸' : '▶';
  if (trackUrl && spLinkEl) {
    spLinkEl.href = trackUrl.startsWith('spotify:')
      ? `https://open.spotify.com/track/${trackUrl.split(':').pop()}`
      : trackUrl;
  }
}

function stopProgress() {
  if (progressIv) { clearInterval(progressIv); progressIv = null; }
}

// ── Mini / idle state ─────────────────────────────────────────────────────────
const MINI_DELAY = 5 * 60 * 1000;

function scheduleMini() {
  clearMiniTimer();
  if (window.matchMedia('(max-width: 768px)').matches) return; // no mini on mobile
  miniTimer = setTimeout(() => {
    if (!spPlayerEl.classList.contains('hidden')) bottomBarEl.classList.add('sp-mini');
  }, MINI_DELAY);
}

function clearMiniTimer() {
  clearTimeout(miniTimer);
  miniTimer = null;
}

function expandMini() {
  bottomBarEl.classList.remove('sp-mini');
  scheduleMini(); // restart 5-min countdown
}

// Hover on the mini player expands it
spPlayerEl.addEventListener('mouseenter', () => {
  if (bottomBarEl.classList.contains('sp-mini')) expandMini();
});

// ── Disconnect ────────────────────────────────────────────────────────────────
async function doDisconnect() {
  try { await fetch('/api/spotify/disconnect', { method: 'POST', credentials: 'same-origin' }); }
  catch {}
  document.cookie = 'spotify_linked=; Max-Age=0; Path=/; Secure; SameSite=Strict';
  if (sdkPlayer) { sdkPlayer.disconnect(); sdkPlayer = null; }
  stopProgress();
  hideSpotifyPlayer();
  if (spHintEl) spHintEl.classList.remove('hidden');
}

if (spDisconnect) spDisconnect.addEventListener('click', e => { e.stopPropagation(); doDisconnect(); });

// ── Space bar: prevent accidental control via keyboard focus ──────────────────
[spBtnPrev, spBtnPlay, spBtnNext].forEach(btn => {
  if (btn) btn.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); });
});

// ── Owner mode: Web Playback SDK ───────────────────────────────────────────────
if (spLinked) {
  if (spHintEl) spHintEl.classList.add('hidden');

  window.onSpotifyWebPlaybackSDKReady = () => {
    fetch('/api/spotify/token', { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(() => {
        const player = new Spotify.Player({
          name: 'SP1E',
          getOAuthToken: cb => {
            fetch('/api/spotify/token', { credentials: 'same-origin' })
              .then(r => r.ok ? r.json() : Promise.reject())
              .then(d => cb(d.access_token))
              .catch(() => {});
          },
          volume: 0.5,
        });

        player.addListener('ready', ({ device_id }) => {
          console.log('[sp1e] Spotify ready, device:', device_id);
          window.spotifyDeviceId = device_id;
        });

        player.addListener('player_state_changed', state => {
          if (!state) return;
          const t    = state.track_window.current_track;
          const imgs = t.album?.images ?? [];
          setPlayerTrack(
            (imgs[imgs.length - 1] ?? imgs[0])?.url,
            t.name,
            (t.artists ?? []).map(a => a.name).join(', '),
            state.position, state.duration, t.uri, !state.paused,
          );
          showSpotifyPlayer(false);

          stopProgress();
          if (!state.paused) {
            clearMiniTimer();
            bottomBarEl.classList.remove('sp-mini');
            progressIv = setInterval(async () => {
              const s = await player.getCurrentState().catch(() => null);
              if (!s || s.paused) { stopProgress(); return; }
              const p = s.duration > 0 ? Math.min(100, (s.position / s.duration) * 100) : 0;
              spFillEl.style.transition = 'width 1s linear';
              spFillEl.style.width = p + '%';
            }, 1000);
          } else {
            scheduleMini(); // start idle countdown when paused
          }
        });

        player.addListener('initialization_error', () => hideSpotifyPlayer());
        player.addListener('account_error',        () => hideSpotifyPlayer()); // not Premium

        // Revoked access → clean up gracefully
        player.addListener('authentication_error', () => {
          console.warn('[sp1e] Spotify auth error — disconnecting');
          doDisconnect();
        });

        player.connect();
        sdkPlayer = player;
        window.spotifyPlayer = player;
      })
      .catch(() => startVisitorPolling()); // session expired
  };

  const sdkScript  = document.createElement('script');
  sdkScript.src    = 'https://sdk.scdn.co/spotify-player.js';
  sdkScript.onerror = () => startVisitorPolling();
  document.head.appendChild(sdkScript);
}

// ── Visitor mode: poll /api/spotify/now-playing every 30 s ────────────────────
function startVisitorPolling() {
  if (visitorIv) return;
  pollNowPlaying();
  visitorIv = setInterval(pollNowPlaying, 30_000);
}

async function pollNowPlaying() {
  try {
    const res = await fetch('/api/spotify/now-playing');
    if (!res.ok) { hideSpotifyPlayer(); return; }
    const d = await res.json();
    if (!d.is_playing) { hideSpotifyPlayer(); return; }
    setPlayerTrack(d.album_art_url, d.track_name, d.artist_name,
                   d.progress_ms, d.duration_ms, d.track_url, false);
    showSpotifyPlayer(true);
  } catch {}
}

if (!spLinked) startVisitorPolling();

// Controls (only active in owner/SDK mode — space bar blocked above)
spBtnPrev.addEventListener('click', () => { if (sdkPlayer) sdkPlayer.previousTrack(); });
spBtnPlay.addEventListener('click', () => { if (sdkPlayer) sdkPlayer.togglePlay(); });
spBtnNext.addEventListener('click', () => { if (sdkPlayer) sdkPlayer.nextTrack(); });
</script>
