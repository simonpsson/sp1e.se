<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sp1e.se</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Mono&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-in 1.5s ease forwards;
  }

  @keyframes fade-in { to { opacity: 1; } }

  /* ── Background gallery ───────────────────────────── */
  #bg-gallery {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
    pointer-events: none;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;       /* ambient: cropped to fill */
    object-position: center;
    opacity: 0;
    transition: opacity 3s ease;
  }
  /* Immersion: show the complete painting, letterbox with black */
  body.immersive .bg-img { object-fit: contain; }

  #bg-img-a { z-index: 1; }
  #bg-img-b { z-index: 0; }

  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0,0,0,0.62);
    pointer-events: none;
    transition: background 1.5s ease;
  }
  body.immersive #bg-overlay {
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.10) 0%,
      rgba(0,0,0,0.04) 45%,
      rgba(0,0,0,0.22) 78%,
      rgba(0,0,0,0.65) 100%
    );
  }

  /* ── Centre stack ─────────────────────────────────── */
  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    transition: opacity 0.7s ease;
  }
  body.immersive .stage { opacity: 0; pointer-events: none; }

  /* ── SP1E logo ────────────────────────────────────── */
  .sp1e-logo {
    display: block;
    height: 3rem;
    width: auto;
    overflow: visible;
    user-select: none;
  }

  .rule {
    width: 100px;
    height: 1px;
    background: rgba(255,255,255,0.10);
    margin-top: -1rem;
  }

  /* ── Cards ────────────────────────────────────────── */
  .cards { display: flex; gap: 1rem; }

  .hub-card { padding: 0; }
  .hub-symbol {
    width: 64px;
    height: 28px;
    display: block;
  }
  .hub-symbol path,
  .hub-symbol polyline,
  .hub-symbol line {
    fill: none;
    stroke: currentColor;
    stroke-width: 4.5;
    stroke-linecap: square;
    stroke-linejoin: miter;
    vector-effect: non-scaling-stroke;
  }


  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 60px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card:hover, .card:focus-visible {
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.95);
    box-shadow: 0 0 20px rgba(255,255,255,0.04);
    outline: none;
  }


  #cocktail-ad {
    position: fixed;
    top: 50%;
    right: 1.35rem;
    transform: translateY(-50%);
    z-index: 4;
    width: 188px;
    height: min(72vh, 640px);
    display: flex;
    flex-direction: column;
    background: rgba(8,10,14,0.86);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    overflow: hidden;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  #cocktail-ad-header {
    padding: 0.85rem 0.95rem 0.65rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .cocktail-ad-kicker {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.56);
  }
  .cocktail-ad-title {
    display: block;
    margin-top: 0.35rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    color: rgba(255,255,255,0.92);
  }
  #cocktail-ad-viewport {
    position: relative;
    flex: 1;
    overflow: hidden;
    padding: 0.85rem 0.85rem 0.65rem;
  }
  #cocktail-ad-track {
    position: absolute;
    inset: 0 auto auto 0;
    width: 100%;
    will-change: transform;
    padding: 0.85rem 0.85rem 0.65rem;
  }
  .cocktail-ad-item {
    padding: 0.7rem 0.1rem 0.75rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .cocktail-ad-item:last-child { border-bottom: none; }
  .cocktail-ad-item.is-thule .cocktail-ad-name {
    color: rgba(255,237,179,0.96);
  }
  .cocktail-ad-name {
    font-family: 'DM Mono', monospace;
    font-size: 0.92rem;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.92);
  }
  .cocktail-ad-recipe {
    margin-top: 0.35rem;
    font-size: 0.74rem;
    line-height: 1.48;
    color: rgba(255,255,255,0.66);
  }
  #cocktail-ad-footer {
    padding: 0.7rem 0.95rem 0.82rem;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.52);
  }
  body.immersive #cocktail-ad { opacity: 0; pointer-events: none; }

  /* ── Modal ────────────────────────────────────────── */
  #modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  #modal.open { opacity: 1; pointer-events: all; }

  .modal-input {
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.03);
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    border-radius: 0;
    padding: 0.5rem 0.25rem;
    width: 220px;
    color: rgba(255,255,255,0.85);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-align: center;
    outline: none;
    box-shadow: none;
    transition: border-color 0.2s ease;
    caret-color: #fff;
  }
  .modal-input:focus { outline: none; box-shadow: none; border-bottom-color: rgba(255,255,255,0.4); }
  .modal-input.error { border-bottom-color: #f24a4a; transition: border-color 0s; }
  .modal-input::-ms-reveal, .modal-input::-ms-clear { display: none; }
  .modal-input::-webkit-credentials-auto-fill-button,
  .modal-input::-webkit-strong-password-auto-fill-button,
  .modal-input::-webkit-contacts-auto-fill-button { display: none !important; }
  .modal-input:-webkit-autofill,
  .modal-input:-webkit-autofill:hover,
  .modal-input:-webkit-autofill:focus,
  .modal-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 9999px #000 inset !important;
    box-shadow:         0 0 0 9999px #000 inset !important;
    -webkit-text-fill-color: rgba(255,255,255,0.85) !important;
    border-bottom-color: rgba(255,255,255,0.15) !important;
    caret-color: #fff;
  }

  /* ── Bottom bar — stacks spotify player above immersion btn ── */
  #bottom-bar {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    max-width: calc(100vw - 2rem);
  }

  /* ── Spotify player ───────────────────────────────── */
  #spotify-player {
    position: relative;
    max-width: 420px;
    width: 100%;
    background: rgba(0,0,0,0.60);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 16px;
    display: none;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #spotify-player.sp-shown   { display: flex; }
  #spotify-player.sp-visible { opacity: 1; }
  body.immersive #spotify-player { opacity: 0.45; }

  /* Mini state: paused */
  #spotify-player.sp-mini { padding: 7px 12px; }

  #sp-art {
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 4px;
    object-fit: cover;
    background: rgba(255,255,255,0.06);
    transition: opacity 0.3s ease, width 0.3s ease, height 0.3s ease, min-width 0.3s ease;
  }
  #spotify-player.sp-mini #sp-art { width: 32px; height: 32px; min-width: 32px; }

  #sp-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }
  #sp-track {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(255,255,255,0.90);
  }
  #sp-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(255,255,255,0.50);
  }
  #sp-progress-wrap {
    height: 2px;
    background: rgba(255,255,255,0.10);
    border-radius: 1px;
    overflow: hidden;
  }
  #sp-progress-fill {
    height: 100%;
    background: rgba(255,255,255,0.55);
    width: 0%;
    transition: width 1s linear;
  }
  #sp-mini-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.60rem;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.30);
    display: none;
  }
  #spotify-player.sp-mini #sp-mini-label   { display: block; }
  #spotify-player.sp-mini #sp-progress-wrap { display: none; }
  #spotify-player.sp-mini #sp-artist        { display: none; }
  #spotify-player.sp-mini #sp-controls      { display: none; }
  #spotify-player.sp-mini #sp-link          { display: none; }
  #spotify-player.sp-mini #sp-disconnect    { display: none; }

  #sp-controls {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .sp-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.40);
    font-size: 0.85rem;
    padding: 5px 6px;
    line-height: 1;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .sp-btn:hover { color: rgba(255,255,255,0.90); }
  #sp-play { font-size: 1rem; }

  #sp-link {
    display: flex;
    align-items: center;
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    padding: 5px;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  #sp-link:hover { color: rgba(255,255,255,0.65); }

  /* ── Disconnect × (top-right of player, show on hover) ── */
  #sp-disconnect {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 18px;
    height: 18px;
    background: rgba(14,14,20,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
    color: rgba(255,255,255,0.25);
    font-size: 0.6rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #spotify-player:hover #sp-disconnect { opacity: 1; }
  #sp-disconnect:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.25); }

  /* ── ♫ hint (bottom-right, shown when not linked) ─── */
  #sp-hint {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 10;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.18);
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
    cursor: pointer;
    transition: color 0.2s;
  }
  #sp-hint:hover { color: rgba(255,255,255,0.42); }
  #sp-hint.hidden { display: none; }
  body.immersive #sp-hint { opacity: 0; pointer-events: none; }

  /* ── Immersion button ─────────────────────────────── */
  #immersion-btn {
    padding: 0.5rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.50);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease, border-color 0.25s, color 0.25s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #immersion-btn.ready { opacity: 1; pointer-events: all; }
  #immersion-btn:hover { border-color: rgba(255,255,255,0.30); color: rgba(255,255,255,0.80); }
  body.immersive #immersion-btn { opacity: 0; pointer-events: none; }

  /* ── Immersion controls (close, arrows, caption) ─── */
  /* Base: hidden. Shown in immersive mode. Hidden again when idle. */
  #immersion-close,
  .imm-arrow {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, color 0.2s;
  }
  body.immersive #immersion-close,
  body.immersive .imm-arrow {
    opacity: 1;
    pointer-events: all;
  }
  /* Idle: fade out all controls (JS adds .imm-idle to body) */
  body.imm-idle #immersion-close,
  body.imm-idle .imm-arrow { opacity: 0 !important; pointer-events: none !important; }

  #immersion-close {
    position: fixed;
    top: 1.5rem;
    right: 1.75rem;
    z-index: 10;
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    font-size: 1.5rem;
    line-height: 1;
    padding: 0.3rem 0.4rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #immersion-close:hover { color: rgba(255,255,255,0.90); }

  /* Navigation arrows */
  .imm-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.30);
    border: none;
    border-radius: 50%;
    color: rgba(255,255,255,0.40);
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .imm-arrow:hover { color: rgba(255,255,255,0.80); }
  #imm-prev { left: 2rem; }
  #imm-next { right: 2rem; }

  /* ── Immersion caption ────────────────────────────── */
  #immersion-caption {
    position: fixed;
    bottom: 2rem;
    left: 2rem;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  /* Caption also hides when idle */
  body.imm-idle #immersion-caption { opacity: 0 !important; }

  .ic-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.70);
    text-shadow: 0 1px 10px rgba(0,0,0,1), 0 0 24px rgba(0,0,0,0.9);
    margin-bottom: 0.3rem;
  }
  .ic-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.15rem;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 10px rgba(0,0,0,1), 0 0 24px rgba(0,0,0,0.9);
    margin-bottom: 0.2rem;
  }
  .ic-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.40);
    text-shadow: 0 1px 10px rgba(0,0,0,1);
  }

  /* ── Responsive ───────────────────────────────────── */
  @media (max-width: 768px) {
    #cocktail-ad { display: none; }
    #bottom-bar {
      bottom: 0;
      left: 0;
      right: 0;
      transform: none;
      max-width: 100%;
      flex-direction: column-reverse;
      gap: 0;
    }
    #spotify-player {
      max-width: 100%;
      border-radius: 0;
      border-left: none;
      border-right: none;
      border-bottom: none;
      padding: 8px 14px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    }
    #sp-art        { width: 36px !important; height: 36px !important; min-width: 36px !important; }
    #sp-track      { font-size: 0.72rem; }
    #sp-link       { display: none !important; }
    #sp-disconnect { display: none !important; }
    #immersion-btn { margin: 0.4rem 0; }
  }
  @media (max-width: 400px) {
    .cards { flex-direction: column; }
    .card  { width: 160px; }
    #imm-prev { left: 0.75rem; }
    #imm-next { right: 0.75rem; }
  }

  /* ── Personal logo (hub button) ──────────────────── */
  .sp-logo {
    width: 54px;
    height: auto;
    display: block;
    overflow: visible;
  }

  /* ── Cocktail ad banner ───────────────────────────── */
  #ad-banner {
    position: fixed;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    width: 162px;
    height: 56vh;
    min-height: 300px;
    max-height: 540px;
    z-index: 5;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 6px;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    pointer-events: none;
    transition: opacity 0.7s ease;
  }
  body.immersive #ad-banner { opacity: 0; }
  @media (max-width: 960px) { #ad-banner { display: none; } }

  .ad-header {
    padding: 9px 14px 7px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.50);
    border-bottom: 1px solid rgba(255,255,255,0.09);
    text-align: center;
    flex-shrink: 0;
  }

  .ad-scroll-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .ad-scroll-inner {
    display: flex;
    flex-direction: column;
    will-change: transform;
  }

  .ad-item {
    padding: 11px 14px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .ad-item-star .ad-drink-name  { color: #fff; }
  .ad-item-star .ad-drink-recipe { color: rgba(255,255,255,0.68); }

  .ad-drink-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.92);
    margin-bottom: 5px;
  }

  .ad-drink-recipe {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }

  .ad-sponsor {
    padding: 8px 14px 9px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    text-align: center;
    text-transform: uppercase;
    border-top: 1px solid rgba(255,255,255,0.09);
    flex-shrink: 0;
    line-height: 1.65;
  }
</style>
</head>
<body>

<!-- Background painting gallery -->
<div id="bg-gallery" aria-hidden="true">
  <img class="bg-img" id="bg-img-a" src="" alt="">
  <img class="bg-img" id="bg-img-b" src="" alt="">
</div>
<div id="bg-overlay" aria-hidden="true"></div>

<main class="stage">
  <svg class="sp1e-logo" viewBox="0 0 150 52" aria-label="SP1E" role="img" xmlns="http://www.w3.org/2000/svg">
    <text x="75" y="40" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-weight="300" font-size="42" fill="white" letter-spacing="10"
          style="font-variant-numeric:lining-nums;font-feature-settings:'lnum' 1">SP1E</text>
  </svg>
  <div class="rule"></div>
  <nav class="cards">
    <a class="card" id="mosquito-btn" href="/mosquito">Mosquito</a>
    <button class="card" id="hub-btn">

<script>
// ── Spotify OAuth callback ────────────────────────────────────────────────────
// Spotify redirects to https://sp1e.se/?code=...&state=...
// Detect those params, strip them immediately, then exchange via AJAX POST.
// fetch() is same-origin so SameSite=Strict session cookie is sent correctly.
(function () {
  const p = new URLSearchParams(location.search);
  const code = p.get('code'), state = p.get('state');
  if (!code || !state) return;
  history.replaceState({}, '', '/');
  fetch('/api/spotify/exchange', {
    method:      'POST',
    headers:     { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body:        JSON.stringify({ code, state }),
  })
  .then(r => r.json())
  .then(d => { if (d.success) location.reload(); })
  .catch(() => {});
})();

// ── Modal ─────────────────────────────────────────────────────────────────────
const modal  = document.getElementById('modal');
const input  = document.getElementById('pw-input');
const hubBtn = document.getElementById('hub-btn');
const mosquitoBtn = document.getElementById('mosquito-btn');
const stage  = document.querySelector('.stage');

const cocktailViewport = document.getElementById('cocktail-ad-viewport');
const cocktailTrack = document.getElementById('cocktail-ad-track');
const DR_THULE = { name: 'Dr. Thule', recipe: ['Norrlands Guld', 'Amaretto'] };

function buildCocktailPool() {
  const classics = [
    ['Americano',['Campari','Söt vermouth','Sodavatten']],
    ['Aperol Spritz',['Aperol','Prosecco','Soda']],
    ['Bellini',['Prosecco','Persikopuré','Citronzest']],
    ['Bicicletta',['Campari','Torrt vitt vin','Soda']],
    ['Bramble',['Gin','Citron','Crème de mûre']],
    ['Caipirinha',['Cachaça','Lime','Rörsocker']],
    ['Clover Club',['Gin','Hallon','Citron']],
    ['Corpse Reviver',['Gin','Cointreau','Lillet Blanc']],
    ['Daiquiri',['Ljus rom','Lime','Sockerlag']],
    ['Dark & Stormy',['Mörk rom','Ginger beer','Lime']],
    ['Eastside',['Gin','Lime','Gurka']],
    ['French 75',['Gin','Citron','Mousserande']],
    ['Garibaldi',['Campari','Apelsinjuice','Apelsinzest']],
    ['Gin Fizz',['Gin','Citron','Soda']],
    ['Gin Rickey',['Gin','Lime','Soda']],
    ['Hugo',['Fläderlikör','Prosecco','Mynta']],
    ['Jasmine',['Gin','Campari','Cointreau']],
    ['John Collins',['Gin','Citron','Soda']],
    ['Kir Royale',['Crème de cassis','Mousserande','Citronolja']],
    ['Mai Tai',['Mörk rom','Orgeat','Lime']],
    ['Margarita',['Tequila','Lime','Cointreau']],
    ['Mojito',['Vit rom','Mynta','Soda']],
    ['Negroni',['Gin','Campari','Söt vermouth']],
    ['Old Cuban',['Rom','Mynta','Mousserande']],
    ['Paloma',['Tequila','Grapefruit','Soda']],
    ['Paper Plane',['Bourbon','Aperol','Amaro']],
    ['Pisco Sour',['Pisco','Citron','Sockerlag']],
    ["Planter's Punch",['Mörk rom','Lime','Angostura']],
    ['Sidecar',['Cognac','Cointreau','Citron']],
    ['Southside',['Gin','Mynta','Lime']],
    ['Tom Collins',['Gin','Citron','Soda']],
    ["Tommy's Margarita",['Tequila','Lime','Agave']],
    ['Vesper',['Gin','Vodka','Lillet Blanc']],
    ['Whiskey Sour',['Bourbon','Citron','Sockerlag']],
    ['White Lady',['Gin','Cointreau','Citron']],
  ];
  const spritzLiqueurs = ['Aperol','Italiensk bitter','Fläderlikör','Rabarberlikör','Persikolikör'];
  const spritzFruits = ['Blodapelsin','Rabarber','Persika','Hallon','Fläder','Citron'];
  const coolerSpirits = ['Gin','Vodka','Vit rom','Tequila','Pisco'];
  const coolerMixers = ['Tonic','Soda','Ginger beer','Lemonad','Citronläsk'];
  const coolerFruits = ['Gurka','Jordgubb','Björnbär','Passionsfrukt','Vattenmelon','Grapefrukt'];
  const smashHerbs = ['Basilika','Rosmarin','Mynta','Timjan','Salvia'];
  const smashFruits = ['Persika','Nektarin','Hallon','Aprikos','Citron'];
  const highballSpirits = ['Bourbon','Rågwhiskey','Mörk rom','Tequila reposado','Gin'];
  const highballTops = ['Soda','Ginger ale','Ginger beer','Tonic','Äppelmust'];
  const pool = classics.map(([name, recipe])=>({name, recipe}));

  spritzLiqueurs.forEach((liqueur, li) => {
    spritzFruits.forEach((fruit, fi) => {
      pool.push({
        name: `${fruit} ${liqueur} Spritz`,
        recipe: [liqueur, `${fruit} cordial`, fi % 2 === 0 ? 'Prosecco' : 'Crémant']
      });
    });
  });

  coolerSpirits.forEach((spirit, si) => {
    coolerMixers.forEach((mixer, mi) => {
      const fruit = coolerFruits[(si + mi) % coolerFruits.length];
      pool.push({
        name: `${fruit} ${spirit} Cooler`,
        recipe: [spirit, `${fruit} syrup`, mixer]
      });
    });
  });

  smashHerbs.forEach((herb, hi) => {
    smashFruits.forEach((fruit, fi) => {
      pool.push({
        name: `${fruit} & ${herb} Smash`,
        recipe: [fi % 2 === 0 ? 'Gin' : 'Bourbon', fruit, herb]
      });
    });
  });

  highballSpirits.forEach((spirit, hi) => {
    highballTops.forEach((top, ti) => {
      const garnish = ['Citronolja','Lime','Grapefruktzest','Äppelskiva','Mynta'][(hi + ti) % 5];
      pool.push({
        name: `${spirit} Highball ${ti+1}`,
        recipe: [spirit, top, garnish]
      });
    });
  });

  return pool.slice(0,150);
}

const COCKTAIL_POOL = buildCocktailPool();

function cocktailRng(seed) {
  let s = seed >>> 0;
  return function () {
    s ^= s << 13;
    s ^= s >>> 17;
    s ^= s << 5;
    return (s >>> 0) / 4294967295;
  };
}

function todaysCocktails() {
  const day = Math.floor(Date.now() / 86400000);
  const rand = cocktailRng(day ^ 0x5f3759df);
  const pool = [...COCKTAIL_POOL];
  for (let i = pool.length - 1; i > 0; i -= 1) {
    const j = Math.floor(rand() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const picks = pool.slice(0, 9);
  const insertAt = Math.floor(rand() * 10);
  return [...picks.slice(0, insertAt), DR_THULE, ...picks.slice(insertAt)];
}

function renderCocktailItems(items) {
  return items.map(item => {
    const isThule = item.name === DR_THULE.name;
    return `<article class="cocktail-ad-item${isThule ? ' is-thule' : ''}"><div class="cocktail-ad-name">${item.name}</div><div class="cocktail-ad-recipe">${item.recipe.join('<br>')}</div></article>`;
  }).join('');
}

function initCocktailBanner() {
  if (!cocktailViewport || !cocktailTrack) return;
  const items = todaysCocktails();
  const rendered = renderCocktailItems(items);
  cocktailTrack.innerHTML = rendered + rendered;
  const cycleMs = 110000;
  let half = 0;
  let start = 0;
  let raf = 0;

  const measure = () => {
    half = cocktailTrack.scrollHeight / 2;
  };

  const loop = now => {
    if (!start) start = now;
    if (!half) measure();
    if (half) {
      const progress = ((now - start) % cycleMs) / cycleMs;
      cocktailTrack.style.transform = `translateY(${(-half + (half * progress)).toFixed(2)}px)`;
    }
    raf = requestAnimationFrame(loop);
  };

  const kick = () => {
    measure();
    if (raf) cancelAnimationFrame(raf);
    start = 0;
    raf = requestAnimationFrame(loop);
  };

  requestAnimationFrame(() => requestAnimationFrame(kick));
  window.addEventListener('resize', kick, { passive: true });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (raf) cancelAnimationFrame(raf);
      raf = 0;
      return;
    }
    kick();
  });
}

let submitting = false;
let errorTimer = null;
let loginTarget = '/hub';

function sanitizeTarget(target) {
  return target === '/mosquito' ? '/mosquito' : '/hub';
}

function openModal(target = '/hub') {
  loginTarget = sanitizeTarget(target);
  modal.classList.add('open');
  input.value = '';
  input.classList.remove('error');
  requestAnimationFrame(() => setTimeout(() => input.focus(), 40));
}
function closeModal() { modal.classList.remove('open'); }

function flashError() {
  input.value = '';
  input.classList.remove('error');
  void input.offsetWidth;
  input.classList.add('error');
  clearTimeout(errorTimer);
  errorTimer = setTimeout(() => input.classList.remove('error'), 500);
  input.focus();
}

async function attemptLogin() {
  if (submitting) return;
  const password = input.value;
  if (!password) return;
  submitting = true;
  input.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ password }),
    });
    if (res.ok) window.location.href = loginTarget;
    else flashError();
  } catch { flashError(); }
  finally { submitting = false; input.disabled = false; }
}

hubBtn.addEventListener('click', () => openModal('/hub'));
mosquitoBtn.addEventListener('click', e => { e.preventDefault(); openModal('/mosquito'); });
input.addEventListener('keydown', e => {
  if (e.key === 'Enter')  attemptLogin();
  if (e.key === 'Escape') closeModal();
});
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

initCocktailBanner();

(async () => {
  const next = sanitizeTarget(new URLSearchParams(location.search).get('next'));
  if (!location.search.includes('next=')) return;
  try {
    const res = await fetch('/api/auth/check', { credentials: 'same-origin' });
    const data = await res.json();
    if (data.authenticated) location.href = next;
    else openModal(next);
  } catch {
    openModal(next);
  }
})();

// ── Immersion ─────────────────────────────────────────────────────────────────
const immBtn     = document.getElementById('immersion-btn');
const immClose   = document.getElementById('immersion-close');
const immCaption = document.getElementById('immersion-caption');
const immPrev    = document.getElementById('imm-prev');
const immNext    = document.getElementById('imm-next');
const icArtist   = document.getElementById('ic-artist');
const icTitle    = document.getElementById('ic-title');
const icYear     = document.getElementById('ic-year');

let immersive      = false;
let captionVisible = false;   // true once caption has been shown after entering
let stageHideTimer = null;
let idleTimer      = null;

function setCaption(art) {
  icArtist.textContent = (art.artist_title || '').toUpperCase();
  icTitle.textContent  =  art.title        || '';
  icYear.textContent   =  art.date_display || '';
}

function swapCaption(art) {
  // 0.3s fade out, update, fade back in
  immCaption.style.opacity = '0';
  setTimeout(() => {
    setCaption(art);
    if (captionVisible && !document.body.classList.contains('imm-idle')) {
      immCaption.style.opacity = '1';
    }
  }, 300);
}

function showControls() {
  if (!immersive) return;
  document.body.classList.remove('imm-idle');
  if (captionVisible) immCaption.style.opacity = '1';
  resetIdleTimer();
}

function hideControls() {
  document.body.classList.add('imm-idle');
  immCaption.style.opacity = '0';
}

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(hideControls, 3000);
}

function enterImmersion() {
  if (immersive) return;
  immersive = true;
  captionVisible = false;
  document.body.classList.add('immersive');
  document.body.classList.remove('imm-idle');

  clearTimeout(stageHideTimer);
  stageHideTimer = setTimeout(() => { stage.style.display = 'none'; }, 750);

  // Caption appears after overlay has settled
  setTimeout(() => {
    if (!immersive) return;
    const art = bgArtworks[bgCurrent];
    if (art) {
      setCaption(art);
      immCaption.style.opacity = '1';
      captionVisible = true;
      resetIdleTimer();
    }
  }, 1100);

  bgIntervalMs = 20_000;
}

function exitImmersion() {
  if (!immersive) return;
  immersive = false;
  captionVisible = false;
  clearTimeout(stageHideTimer);
  clearTimeout(idleTimer);
  immCaption.style.opacity = '0';
  document.body.classList.remove('imm-idle');
  stage.style.display = '';
  requestAnimationFrame(() => {
    document.body.classList.remove('immersive');
    bgIntervalMs = 28_000;
  });
}

immBtn.addEventListener('click', enterImmersion);
immClose.addEventListener('click', exitImmersion);
immPrev.addEventListener('click', () => { gAdvance(-1); showControls(); });
immNext.addEventListener('click', () => { gAdvance(+1); showControls(); });

document.addEventListener('mousemove', () => { if (immersive) showControls(); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (modal.classList.contains('open')) closeModal();
  else if (immersive) exitImmersion();
});

// ── Background gallery ────────────────────────────────────────────────────────
const GCACHE = 'sp1e-gallery-v5';
const GFADE  = 3000;
const GBASE  = 'https://www.artic.edu/iiif/2';

let bgArtworks   = [];
let bgCurrent    = 0;
let bgFront, bgBack, bgTimer;
let bgIntervalMs = 28_000;

const bgImgA = document.getElementById('bg-img-a');
const bgImgB = document.getElementById('bg-img-b');

function gUrl(art) {
  if (art.image_url) return art.image_url;
  return `${GBASE}/${art.image_id}/full/1600,/0/default.jpg`;
}

function gShuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function gOnChange(art) {
  if (immersive && captionVisible) swapCaption(art);
}

function gShowFirst(art) {
  bgFront = bgImgA; bgBack = bgImgB;
  bgFront.style.zIndex = '1'; bgBack.style.zIndex = '0';
  bgFront.src = gUrl(art);
  bgFront.onload = () => {
    bgFront.onload = null;
    bgFront.style.opacity = '1';
    immBtn.classList.add('ready');
  };
}

function gCrossfade(art) {
  gOnChange(art);
  bgBack.src = gUrl(art);
  bgBack.onload = () => {
    bgBack.onload = null;
    bgBack.style.zIndex = '2';
    bgBack.style.opacity = '1';
    setTimeout(() => {
      bgFront.style.opacity = '0';
      setTimeout(() => {
        bgFront.style.zIndex = '0';
        const tmp = bgFront; bgFront = bgBack; bgBack = tmp;
        bgFront.style.zIndex = '1';
      }, GFADE + 100);
    }, 50);
  };
}

function gAdvance(delta) {
  if (!bgArtworks.length) return;
  bgCurrent = (bgCurrent + delta + bgArtworks.length) % bgArtworks.length;
  gCrossfade(bgArtworks[bgCurrent]);
  // Reset auto-advance timer so it doesn't fire immediately after manual navigation
  gSchedule();
}

function gSchedule() {
  clearTimeout(bgTimer);
  bgTimer = setTimeout(() => {
    bgCurrent = (bgCurrent + 1) % bgArtworks.length;
    gCrossfade(bgArtworks[bgCurrent]);
    gSchedule();
  }, bgIntervalMs);
}

async function gFetch() {
  const c = sessionStorage.getItem(GCACHE);
  if (c) { try { return JSON.parse(c); } catch {} }
  const res = await fetch('/api/art');
  if (!res.ok) return [];
  const data = await res.json();
  const items = (data.data ?? []).filter(d => d.image_id || d.image_url);
  if (items.length) sessionStorage.setItem(GCACHE, JSON.stringify(items));
  return items;
}

async function gInit() {
  try {
    const raw = await gFetch();
    if (!raw.length) return;
    bgArtworks = gShuffle(raw);
    gShowFirst(bgArtworks[0]);
    gSchedule();
  } catch {}
}

gInit();

// ── Spotify player ────────────────────────────────────────────────────────────
const spPlayerEl   = document.getElementById('spotify-player');
const spArtEl      = document.getElementById('sp-art');
const spTrackEl    = document.getElementById('sp-track');
const spArtistEl   = document.getElementById('sp-artist');
const spFillEl     = document.getElementById('sp-progress-fill');
const spBtnPrev    = document.getElementById('sp-prev');
const spBtnPlay    = document.getElementById('sp-play');
const spBtnNext    = document.getElementById('sp-next');
const spLinkEl     = document.getElementById('sp-link');
const spHintEl     = document.getElementById('sp-hint');
const spDisconnect = document.getElementById('sp-disconnect');

let spPollIv  = null;
let spLastArt = '';
let spVisible = false;

function hasCookie(name) {
  return document.cookie.split(';').some(c => c.trim().startsWith(name + '='));
}
const spLinked = hasCookie('spotify_linked');

function spSetArt(url) {
  if (!url || url === spLastArt) return;
  spLastArt = url;
  spArtEl.style.opacity = '0';
  setTimeout(() => {
    spArtEl.src = url;
    const done = () => {
      spArtEl.style.opacity = '1';
      spArtEl.removeEventListener('load',  done);
      spArtEl.removeEventListener('error', done);
    };
    spArtEl.addEventListener('load',  done);
    spArtEl.addEventListener('error', done);
  }, 300);
}

function spShow(isPlaying) {
  spPlayerEl.classList.toggle('sp-mini', !isPlaying);
  if (!spVisible) {
    spPlayerEl.classList.add('sp-shown');
    spVisible = true;
    requestAnimationFrame(() => requestAnimationFrame(() => spPlayerEl.classList.add('sp-visible')));
  }
  if (spHintEl) spHintEl.classList.add('hidden');
}

function spHide() {
  spPlayerEl.classList.remove('sp-shown', 'sp-visible', 'sp-mini');
  spVisible = false;
}

async function spPoll() {
  try {
    const res = await fetch('/api/spotify/now-playing');
    if (!res.ok) return;
    const d = await res.json();
    if (!d.track_name) { if (!spLinked) spHide(); return; }

    spSetArt(d.album_art_url);
    spTrackEl.textContent  = d.track_name  || '';
    spArtistEl.textContent = d.artist_name || '';

    const pct = d.duration_ms > 0 ? Math.min(100, (d.progress_ms / d.duration_ms) * 100) : 0;
    spFillEl.style.transition = 'none';
    spFillEl.style.width = pct + '%';
    if (spBtnPlay) spBtnPlay.textContent = d.is_playing ? '⏸' : '▶';

    if (d.track_url && spLinkEl) {
      spLinkEl.href = d.track_url.startsWith('spotify:')
        ? 'https://open.spotify.com/track/' + d.track_url.split(':').pop()
        : d.track_url;
    }

    if (spLinked) spShow(d.is_playing);
  } catch {}
}

// Start polling
spPoll();
spPollIv = setInterval(spPoll, 10_000);

// Show/hide ♫ hint
if (spLinked) {
  if (spHintEl) spHintEl.classList.add('hidden');
} else {
  if (spHintEl) spHintEl.classList.remove('hidden');
}

// ♫ hint: fetch auth URL then navigate to Spotify (same tab → returns to sp1e.se/)
if (spHintEl) {
  spHintEl.addEventListener('click', async () => {
    try {
      const res = await fetch('/api/spotify/auth-url', { credentials: 'same-origin' });
      if (res.status === 401) { openModal(); return; } // need to log in first
      if (!res.ok) return;
      const { url } = await res.json();
      location.href = url; // navigate to accounts.spotify.com, returns here after auth
    } catch {}
  });
}

// Controls (auth checked server-side via session cookie)
async function spControl(action) {
  try {
    if (action === 'toggle') {
      const playing = spBtnPlay && spBtnPlay.textContent === '⏸';
      await fetch(playing ? '/api/spotify/pause' : '/api/spotify/play',
        { method: 'PUT', credentials: 'same-origin' });
    } else if (action === 'next') {
      await fetch('/api/spotify/next',     { method: 'POST', credentials: 'same-origin' });
    } else if (action === 'previous') {
      await fetch('/api/spotify/previous', { method: 'POST', credentials: 'same-origin' });
    }
    setTimeout(spPoll, 800);
  } catch {}
}

if (spBtnPrev) spBtnPrev.addEventListener('click', () => spControl('previous'));
if (spBtnPlay) spBtnPlay.addEventListener('click', () => spControl('toggle'));
if (spBtnNext) spBtnNext.addEventListener('click', () => spControl('next'));

// Space bar prevention
[spBtnPrev, spBtnPlay, spBtnNext].forEach(btn => {
  if (btn) btn.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); });
});

// Disconnect
async function doDisconnect() {
  try { await fetch('/api/spotify/disconnect', { method: 'POST', credentials: 'same-origin' }); } catch {}
  document.cookie = 'spotify_linked=; Max-Age=0; Path=/; Secure; SameSite=Strict';
  spHide();
  if (spHintEl) spHintEl.classList.remove('hidden');
}

if (spDisconnect) spDisconnect.addEventListener('click', e => { e.stopPropagation(); doDisconnect(); });

  // Xorshift seeded by UTC day — same day gives same 9 picks
  const dayN = Math.floor(Date.now() / 86_400_000);
  let s = (dayN ^ 0x5f3759df) >>> 0;
  function rng() {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 0xffffffff;
  }

  const shuffled = [...POOL].sort(() => rng() - 0.5);
  const picks = shuffled.slice(0, 9);

  // Insert Dr. Thule at a deterministic daily position
  const pos = Math.floor(rng() * 10);
  const all10 = [...picks.slice(0, pos), DR_THULE, ...picks.slice(pos)];

  const inner = document.getElementById('ad-scroll-inner');
  if (!inner) return;

  function renderItems(items) {
    return items.map(d => {
      const star = d === DR_THULE ? ' ad-item-star' : '';
      const lines = d.recipe.split('\n').join('<br>');
      return `<div class="ad-item${star}"><div class="ad-drink-name">${d.name}</div><div class="ad-drink-recipe">${lines}</div></div>`;
    }).join('');
  }

  // Double the list for seamless looping
  inner.innerHTML = renderItems(all10) + renderItems(all10);

  // JS-driven scroll after content insertion.
  // Two nested rAF calls guarantee layout is complete before measuring scrollHeight.
  // phase goes 0→1 per cycle; translateY = halfH*(phase-1) goes -halfH→0.
  // Inner div moves downward → items enter from top, exit at bottom (uppifrån→ned).
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var halfH = inner.scrollHeight / 2;
      if (!halfH) return;
      var CYCLE = 110000;
      var t0 = performance.now();
      (function tick(now) {
        var phase = ((now - t0) % CYCLE) / CYCLE;
        inner.style.transform = 'translateY(' + (halfH * (phase - 1)) + 'px)';
        requestAnimationFrame(tick);
      })(t0);
    });
  });
