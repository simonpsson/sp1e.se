<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sp1e.se</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  .landing-type-lock,
  .landing-type-lock * {
    font-family: 'Cormorant Garamond', serif !important;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fade-in 1.5s ease forwards;
  }

  @keyframes fade-in { to { opacity: 1; } }

  #google-search {
    position: fixed;
    top: 1.15rem;
    left: 50%;
    z-index: 5;
    width: min(520px, calc(100vw - 2rem));
    transform: translateX(-50%);
    display: flex;
    gap: 0.55rem;
    padding: 0.52rem;
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 999px;
    background: rgba(5,7,10,0.56);
    box-shadow: 0 18px 60px rgba(0,0,0,0.28);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    transition: opacity 0.55s ease, border-color 0.25s ease;
  }
  #google-search:focus-within {
    border-color: rgba(255,255,255,0.28);
  }
  #google-search input {
    min-width: 0;
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    color: rgba(255,255,255,0.88);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.02em;
  }
  #google-search input::placeholder { color: rgba(255,255,255,0.36); }
  #google-search button {
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 999px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.72);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.12em;
    padding: 0.45rem 0.75rem;
    text-transform: uppercase;
  }
  #google-search button:hover,
  #google-search button:focus-visible {
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.95);
  }
  body.immersive #google-search { opacity: 0; pointer-events: none; }

  #news-hover-zone {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 5;
    width: 28px;
  }
  #news-panel {
    position: fixed;
    top: 6.05rem;
    left: 1.15rem;
    z-index: 4;
    width: 264px;
    max-height: min(68vh, 640px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 16px;
    background: rgba(6,8,11,0.70);
    box-shadow: 0 20px 70px rgba(0,0,0,0.30);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    opacity: 0;
    pointer-events: none;
    transform: translateX(calc(-100% - 30px)) scale(0.92);
    transform-origin: left center;
    transition:
      transform 420ms cubic-bezier(0.22, 1, 0.36, 1),
      opacity 240ms ease,
      filter 240ms ease;
    filter: blur(1px);
  }
  #news-hover-zone:hover + #news-panel,
  #news-panel:hover,
  #news-panel:focus-within,
  #news-panel.news-open {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0) scale(0.92);
    filter: none;
  }
  #news-panel-header {
    padding: 0.78rem 0.88rem 0.62rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .news-kicker {
    display: block;
    color: rgba(255,255,255,0.46);
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .news-title {
    display: block;
    margin-top: 0.32rem;
    color: rgba(255,255,255,0.88);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.18rem;
  }
  #news-list {
    overflow: auto;
    padding: 0.45rem 0;
    scrollbar-width: thin;
  }
  .news-item {
    display: block;
    padding: 0.68rem 0.88rem 0.72rem;
    border-bottom: 1px solid rgba(255,255,255,0.055);
    color: inherit;
    text-decoration: none;
  }
  .news-item:hover .news-headline,
  .news-item:focus-visible .news-headline {
    color: rgba(255,255,255,0.96);
  }
  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.65rem;
    color: rgba(255,255,255,0.38);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .news-source-logo {
    display: inline-flex;
    align-items: center;
    gap: 0.18rem;
    min-height: 1rem;
    color: rgba(255,255,255,0.72);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    line-height: 1;
  }
  .news-source-bbc span {
    display: inline-flex;
    width: 0.82rem;
    height: 0.82rem;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.50);
    font-size: 0.58rem;
    letter-spacing: 0;
  }
  .news-source-bbc em {
    margin-left: 0.22rem;
    font-size: 0.64rem;
    font-style: normal;
    letter-spacing: 0.10em;
  }
  .news-source-dn {
    font-size: 1.02rem;
    letter-spacing: -0.04em;
  }
  .news-source-aftonbladet {
    font-size: 0.84rem;
    font-style: italic;
    letter-spacing: 0.02em;
  }
  .news-source-aljazeera {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
  }
  .news-source-time {
    color: rgba(255,255,255,0.36);
    font-size: 0.76rem;
    letter-spacing: 0.08em;
  }
  .news-headline {
    margin-top: 0.32rem;
    color: rgba(255,255,255,0.74);
    font-size: 0.82rem;
    line-height: 1.35;
    transition: color 0.2s ease;
  }
  .news-state {
    padding: 1rem;
    color: rgba(255,255,255,0.46);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    line-height: 1.5;
  }
  body.immersive #news-hover-zone,
  body.immersive #news-panel { opacity: 0; pointer-events: none; }

  /* ── Background gallery ───────────────────────────── */
  #bg-gallery {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
    pointer-events: none;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;       /* ambient: cropped to fill */
    object-position: center;
    opacity: 0;
    transition: opacity 3s ease;
  }
  /* Immersion: show the complete painting, letterbox with black */
  body.immersive .bg-img { object-fit: contain; }

  #bg-img-a { z-index: 1; }
  #bg-img-b { z-index: 0; }

  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: rgba(0,0,0,0.62);
    pointer-events: none;
    transition: background 1.5s ease;
  }
  body.immersive #bg-overlay {
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.10) 0%,
      rgba(0,0,0,0.04) 45%,
      rgba(0,0,0,0.22) 78%,
      rgba(0,0,0,0.65) 100%
    );
  }

  /* ── Centre stack ─────────────────────────────────── */
  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    transition: opacity 0.7s ease;
  }
  body.immersive .stage { opacity: 0; pointer-events: none; }

  /* ── SP1E logo ────────────────────────────────────── */
  .sp1e-wordmark {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    width: 156px;
    user-select: none;
    color: rgba(255,255,255,0.92);
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.85rem;
    font-weight: 300;
    line-height: 1;
    letter-spacing: 0;
    text-align: center;
    text-shadow: 0 2px 24px rgba(0,0,0,0.70);
    font-variant-numeric: lining-nums;
    font-feature-settings: 'lnum' 1;
  }
  .sp1e-wordmark span {
    display: block;
    text-align: center;
  }

  .rule {
    width: 100px;
    height: 1px;
    background: rgba(255,255,255,0.10);
    margin-top: -1rem;
  }

  /* ── Cards ────────────────────────────────────────── */
  .cards { display: flex; gap: 1rem; }

  .hub-card { padding: 0; }
  .hub-symbol {
    width: 100px;
    height: 54px;
    display: block;
    overflow: visible;
  }


  .card {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 60px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .card:hover, .card:focus-visible {
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.95);
    box-shadow: 0 0 20px rgba(255,255,255,0.04);
    outline: none;
  }

  /* ── Modal ────────────────────────────────────────── */
  #modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  #modal.open { opacity: 1; pointer-events: all; }

  .modal-input {
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.03);
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    border-radius: 0;
    padding: 0.5rem 0.25rem;
    width: 220px;
    color: rgba(255,255,255,0.85);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-align: center;
    outline: none;
    box-shadow: none;
    transition: border-color 0.2s ease;
    caret-color: #fff;
  }
  .modal-input:focus { outline: none; box-shadow: none; border-bottom-color: rgba(255,255,255,0.4); }
  .modal-input.error { border-bottom-color: #f24a4a; transition: border-color 0s; }
  .modal-input::-ms-reveal, .modal-input::-ms-clear { display: none; }
  .modal-input::-webkit-credentials-auto-fill-button,
  .modal-input::-webkit-strong-password-auto-fill-button,
  .modal-input::-webkit-contacts-auto-fill-button { display: none !important; }
  .modal-input:-webkit-autofill,
  .modal-input:-webkit-autofill:hover,
  .modal-input:-webkit-autofill:focus,
  .modal-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 9999px #000 inset !important;
    box-shadow:         0 0 0 9999px #000 inset !important;
    -webkit-text-fill-color: rgba(255,255,255,0.85) !important;
    border-bottom-color: rgba(255,255,255,0.15) !important;
    caret-color: #fff;
  }

  /* ── Bottom bar — stacks spotify player above immersion btn ── */
  #bottom-bar {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    max-width: calc(100vw - 2rem);
  }

  /* ── Spotify player ───────────────────────────────── */
  #spotify-player {
    position: relative;
    max-width: 420px;
    width: 100%;
    background: rgba(0,0,0,0.60);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 16px;
    display: none;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #spotify-player.sp-shown   { display: flex; }
  #spotify-player.sp-visible { opacity: 1; }
  body.immersive #spotify-player { opacity: 0.45; }

  /* Mini state: paused */
  #spotify-player.sp-mini { padding: 7px 12px; }

  #sp-art {
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: 4px;
    object-fit: cover;
    background: rgba(255,255,255,0.06);
    transition: opacity 0.3s ease, width 0.3s ease, height 0.3s ease, min-width 0.3s ease;
  }
  #spotify-player.sp-mini #sp-art { width: 32px; height: 32px; min-width: 32px; }

  #sp-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }
  #sp-track {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(255,255,255,0.90);
  }
  #sp-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: rgba(255,255,255,0.50);
  }
  #sp-progress-wrap {
    height: 2px;
    background: rgba(255,255,255,0.10);
    border-radius: 1px;
    overflow: hidden;
  }
  #sp-progress-fill {
    height: 100%;
    background: rgba(255,255,255,0.55);
    width: 0%;
    transition: width 1s linear;
  }
  #sp-mini-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.60rem;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.30);
    display: none;
  }
  #spotify-player.sp-mini #sp-mini-label   { display: block; }
  #spotify-player.sp-mini #sp-progress-wrap { display: none; }
  #spotify-player.sp-mini #sp-artist        { display: none; }
  #spotify-player.sp-mini #sp-controls      { display: none; }
  #spotify-player.sp-mini #sp-link          { display: none; }
  #spotify-player.sp-mini #sp-disconnect    { display: none; }

  #sp-controls {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .sp-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.40);
    font-size: 0.85rem;
    padding: 5px 6px;
    line-height: 1;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .sp-btn:hover { color: rgba(255,255,255,0.90); }
  #sp-play { font-size: 1rem; }

  #sp-link {
    display: flex;
    align-items: center;
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    padding: 5px;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  #sp-link:hover { color: rgba(255,255,255,0.65); }

  /* ── Disconnect × (top-right of player, show on hover) ── */
  #sp-disconnect {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 18px;
    height: 18px;
    background: rgba(14,14,20,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
    color: rgba(255,255,255,0.25);
    font-size: 0.6rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #spotify-player:hover #sp-disconnect { opacity: 1; }
  #sp-disconnect:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.25); }

  /* ── ♫ hint (bottom-right, shown when not linked) ─── */
  #sp-hint {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 10;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.18);
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
    cursor: pointer;
    transition: color 0.2s;
  }
  #sp-hint:hover { color: rgba(255,255,255,0.42); }
  #sp-hint.hidden { display: none; }
  body.immersive #sp-hint { opacity: 0; pointer-events: none; }
  #sp-notice {
    position: fixed;
    right: 3.4rem;
    bottom: 1.9rem;
    z-index: 10;
    max-width: 240px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.56);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    text-align: right;
  }
  #sp-notice.show {
    opacity: 1;
    transform: translateY(0);
  }
  #sp-notice.err { color: rgba(255,148,148,0.92); }
  #sp-notice.ok { color: rgba(170,230,190,0.92); }
  body.immersive #sp-notice { opacity: 0; pointer-events: none; }

  /* ── Gallery button ───────────────────────────────── */
  #immersion-btn {
    padding: 0.5rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.50);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    opacity: 0.72;
    pointer-events: all;
    transition: opacity 0.8s ease, border-color 0.25s, color 0.25s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #immersion-btn.loading,
  #immersion-btn:disabled {
    opacity: 0.42;
    pointer-events: none;
    cursor: default;
  }
  #immersion-btn.ready { opacity: 1; pointer-events: all; }
  #immersion-btn:hover { border-color: rgba(255,255,255,0.30); color: rgba(255,255,255,0.80); }
  body.immersive #immersion-btn { opacity: 0; pointer-events: none; }

  #gallery-menu {
    display: none;
    flex-direction: column;
    gap: 0.45rem;
    min-width: 230px;
    padding: 0.65rem;
    margin-bottom: 0.55rem;
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 16px;
    background: rgba(0,0,0,0.58);
    backdrop-filter: blur(18px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
  }
  #gallery-menu.open { display: flex; }
  body.immersive #gallery-menu { display: none !important; }
  .gallery-choice {
    width: 100%;
    padding: 0.55rem 0.75rem;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    background: rgba(255,255,255,0.035);
    color: rgba(255,255,255,0.62);
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-align: left;
    text-transform: uppercase;
  }
  .gallery-choice:hover,
  .gallery-choice.active {
    border-color: rgba(255,255,255,0.24);
    color: rgba(255,255,255,0.88);
    background: rgba(255,255,255,0.075);
  }

  /* ── Immersion controls (close, arrows, caption) ─── */
  /* Base: hidden. Shown in immersive mode. Hidden again when idle. */
  #immersion-close,
  .imm-arrow {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, color 0.2s;
  }
  body.immersive #immersion-close,
  body.immersive .imm-arrow {
    opacity: 1;
    pointer-events: all;
  }
  /* Idle: fade out all controls (JS adds .imm-idle to body) */
  body.imm-idle #immersion-close,
  body.imm-idle .imm-arrow { opacity: 0 !important; pointer-events: none !important; }

  #immersion-close {
    position: fixed;
    top: 1.5rem;
    right: 1.75rem;
    z-index: 10;
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    font-size: 1.5rem;
    line-height: 1;
    padding: 0.3rem 0.4rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #immersion-close:hover { color: rgba(255,255,255,0.90); }

  /* Navigation arrows */
  .imm-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.30);
    border: none;
    border-radius: 50%;
    color: rgba(255,255,255,0.40);
    font-size: 2rem;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .imm-arrow:hover { color: rgba(255,255,255,0.80); }

<script>
// ── Spotify OAuth callback ────────────────────────────────────────────────────
// Spotify redirects to https://sp1e.se/?code=...&state=...
// Detect those params, strip them immediately, then exchange via AJAX POST.
// fetch() is same-origin so SameSite=Strict session cookie is sent correctly.
(function () {
  const p = new URLSearchParams(location.search);
  const code = p.get('code'), state = p.get('state');
  if (!code || !state) return;
  history.replaceState({}, '', '/');
  fetch('/api/spotify/exchange', {
    method:      'POST',
    headers:     { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body:        JSON.stringify({ code, state }),
  })
  .then(r => r.json())
  .then(d => { if (d.success) location.reload(); })
  .catch(() => {});
})();

// ── Modal ─────────────────────────────────────────────────────────────────────
const modal  = document.getElementById('modal');
const input  = document.getElementById('pw-input');
const hubBtn = document.getElementById('hub-btn');
const mosquitoBtn = document.getElementById('mosquito-btn');
const stage  = document.querySelector('.stage');

const newsHoverZone = document.getElementById('news-hover-zone');
const newsPanel = document.getElementById('news-panel');
const newsList = document.getElementById('news-list');

function setNewsPanelOpen(open) {
  if (!newsPanel) return;
  newsPanel.classList.toggle('news-open', open);
  newsPanel.setAttribute('aria-hidden', open ? 'false' : 'true');
  if (open) newsPanel.removeAttribute('inert');
  else newsPanel.setAttribute('inert', '');
}

if (newsHoverZone && newsPanel) {
  const openNewsPanel = () => setNewsPanelOpen(true);
  const closeNewsPanel = (event) => {
    const next = event.relatedTarget;
    if (next instanceof Node && (newsHoverZone.contains(next) || newsPanel.contains(next))) return;
    setNewsPanelOpen(false);
  };
  newsHoverZone.addEventListener('mouseenter', openNewsPanel);
  newsPanel.addEventListener('mouseenter', openNewsPanel);
  newsHoverZone.addEventListener('mouseleave', closeNewsPanel);
  newsPanel.addEventListener('mouseleave', closeNewsPanel);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

function safeHttpUrl(value) {
  try {
    const url = new URL(String(value ?? ''));
    return (url.protocol === 'http:' || url.protocol === 'https:') ? url.href : '#';
  } catch {
    return '#';
  }
}

function newsRelativeTime(value) {
  const ts = Date.parse(value || '');
  if (!Number.isFinite(ts)) return '';
  const seconds = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (seconds < 60) return 'nu';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h`;
  return `${Math.floor(hours / 24)}d`;
}

function renderNewsSourceLogo(source) {
  const name = String(source || '').toLowerCase();
  if (name.includes('bbc')) {
    return '<span class="news-source-logo news-source-bbc" aria-label="BBC World"><span>B</span><span>B</span><span>C</span><em>World</em></span>';
  }
  if (name.includes('dagens') || name === 'dn') {
    return '<span class="news-source-logo news-source-dn" aria-label="Dagens Nyheter">DN</span>';
  }
  if (name.includes('aftonbladet')) {
    return '<span class="news-source-logo news-source-aftonbladet" aria-label="Aftonbladet">Aftonbladet</span>';
  }
  if (name.includes('jazeera')) {
    return '<span class="news-source-logo news-source-aljazeera" aria-label="Al Jazeera">Al Jazeera</span>';
  }
  return `<span class="news-source-logo" aria-label="${escapeHtml(source || 'Källa')}">${escapeHtml(source || 'Källa')}</span>`;
}

function renderNewsItems(items) {
  if (!newsList) return;
  if (!Array.isArray(items) || !items.length) {
    newsList.innerHTML = '<div class="news-state">Inga nyheter kunde hämtas just nu.</div>';
    return;
  }
  newsList.innerHTML = items.map(item => {
    const href = safeHttpUrl(item.link);
    return `<a class="news-item" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">
      <div class="news-meta">${renderNewsSourceLogo(item.source)}<span class="news-source-time">${escapeHtml(newsRelativeTime(item.published_at))}</span></div>
      <div class="news-headline">${escapeHtml(item.title || 'Utan rubrik')}</div>
    </a>`;
  }).join('');
}

async function loadNewsWire() {
  if (!newsList) return;
  try {
    const res = await fetch('/api/news', { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error(`news ${res.status}`);
    const data = await res.json();
    renderNewsItems(data.items);
  } catch {
    newsList.innerHTML = '<div class="news-state">News wire ligger nere. Försök igen senare.</div>';
  }
}

let submitting = false;
let errorTimer = null;
let loginTarget = '/hub';

function sanitizeTarget(target) {
  return target === '/mosquito' ? '/mosquito' : '/hub';
}

function openModal(target = '/hub') {
  loginTarget = sanitizeTarget(target);
  modal.classList.add('open');
  input.value = '';
  input.classList.remove('error');
  requestAnimationFrame(() => setTimeout(() => input.focus(), 40));
}
function closeModal() { modal.classList.remove('open'); }

function flashError() {
  input.value = '';
  input.classList.remove('error');
  void input.offsetWidth;
  input.classList.add('error');
  clearTimeout(errorTimer);
  errorTimer = setTimeout(() => input.classList.remove('error'), 500);
  input.focus();
}

async function attemptLogin() {
  if (submitting) return;
  const password = input.value;
  if (!password) return;
  submitting = true;
  input.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ password }),
    });
    if (res.ok) {
      closeModal();
      if (pendingAfterLogin) {
        const action = pendingAfterLogin;
        pendingAfterLogin = null;
        await action();
      } else {
        window.location.href = loginTarget;
      }
    }
    else flashError();
  } catch { flashError(); }
  finally { submitting = false; input.disabled = false; }
}

hubBtn.addEventListener('click', () => openModal('/hub'));
mosquitoBtn.addEventListener('click', e => { e.preventDefault(); openModal('/mosquito'); });
input.addEventListener('keydown', e => {
  if (e.key === 'Enter')  attemptLogin();
  if (e.key === 'Escape') closeModal();
});
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

loadNewsWire();
setInterval(loadNewsWire, 10 * 60 * 1000);

(async () => {
  const next = sanitizeTarget(new URLSearchParams(location.search).get('next'));
  if (!location.search.includes('next=')) return;
  try {
    const res = await fetch('/api/auth/check', { credentials: 'same-origin' });
    const data = await res.json();
    if (data.authenticated) location.href = next;
    else openModal(next);
  } catch {
    openModal(next);
  }
})();

// ── Immersion ─────────────────────────────────────────────────────────────────
const immBtn     = document.getElementById('immersion-btn');
const immClose   = document.getElementById('immersion-close');
const immCaption = document.getElementById('immersion-caption');
const immPrev    = document.getElementById('imm-prev');
const immNext    = document.getElementById('imm-next');
const galleryMenu = document.getElementById('gallery-menu');
const livingBgToggle = document.getElementById('living-bg-toggle');
const museumBtn = document.getElementById('museum-btn');
const icArtist   = document.getElementById('ic-artist');
const icTitle    = document.getElementById('ic-title');
const icYear     = document.getElementById('ic-year');

let immersive      = false;
let captionVisible = false;   // true once caption has been shown after entering
let stageHideTimer = null;
let idleTimer      = null;
let livingBackgroundEnabled = false;

function setGalleryMenu(open) {
  if (!galleryMenu || !immBtn) return;
  galleryMenu.classList.toggle('open', !!open);
  immBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
}

function toggleGalleryMenu() {
  setGalleryMenu(!galleryMenu.classList.contains('open'));
}

function updateLivingToggle() {
  if (!livingBgToggle) return;
  livingBgToggle.classList.toggle('active', livingBackgroundEnabled);
  livingBgToggle.textContent = livingBackgroundEnabled ? 'Living background: on' : 'Toggle living background';
}

function setCaption(art) {
  icArtist.textContent = (art.artist_title || '').toUpperCase();
  icTitle.textContent  =  art.title        || '';
  icYear.textContent   =  art.date_display || '';
}

function swapCaption(art) {
  // 0.3s fade out, update, fade back in
  immCaption.style.opacity = '0';
  setTimeout(() => {
    setCaption(art);
    if (captionVisible && !document.body.classList.contains('imm-idle')) {
      immCaption.style.opacity = '1';
    }
  }, 300);
}

function showControls() {
  if (!immersive) return;
  document.body.classList.remove('imm-idle');
  if (captionVisible) immCaption.style.opacity = '1';
  resetIdleTimer();
}

function hideControls() {
  document.body.classList.add('imm-idle');
  immCaption.style.opacity = '0';
}

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(hideControls, 3000);
}

function enterImmersion() {
  if (immersive) return;
  setGalleryMenu(false);
  immersive = true;
  captionVisible = false;
  document.body.classList.add('immersive');
  document.body.classList.remove('imm-idle');

  clearTimeout(stageHideTimer);
  stageHideTimer = setTimeout(() => { stage.style.display = 'none'; }, 750);

  // Caption appears after overlay has settled
  setTimeout(() => {
    if (!immersive) return;
    const art = bgArtworks[bgCurrent];
    if (art) {
      setCaption(art);
      immCaption.style.opacity = '1';
      captionVisible = true;
      resetIdleTimer();
    }
  }, 1100);

  bgIntervalMs = 20_000;
}

function exitImmersion() {
  if (!immersive) return;
  immersive = false;
  captionVisible = false;
  clearTimeout(stageHideTimer);
  clearTimeout(idleTimer);
  immCaption.style.opacity = '0';
  document.body.classList.remove('imm-idle');
  stage.style.display = '';
  requestAnimationFrame(() => {
    document.body.classList.remove('immersive');
    bgIntervalMs = 28_000;
  });
}

immBtn.addEventListener('click', toggleGalleryMenu);
museumBtn.addEventListener('click', () => {
  setGalleryMenu(false);
  enterImmersion();
});
immClose.addEventListener('click', exitImmersion);
immPrev.addEventListener('click', () => { gAdvance(-1); showControls(); });
immNext.addEventListener('click', () => { gAdvance(+1); showControls(); });
document.addEventListener('click', e => {
  if (!galleryMenu || !immBtn) return;
  if (!galleryMenu.classList.contains('open')) return;
  if (galleryMenu.contains(e.target) || immBtn.contains(e.target)) return;
  setGalleryMenu(false);
});

document.addEventListener('mousemove', () => { if (immersive) showControls(); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (modal.classList.contains('open')) closeModal();
  else if (immersive) exitImmersion();
});

// ── Background gallery ────────────────────────────────────────────────────────
const GCACHE = 'sp1e-gallery-v6';
const GCACHE_TTL_MS = 12 * 60 * 60 * 1000;
const GFADE  = 3000;
const GBASE  = 'https://www.artic.edu/iiif/2';
const LANDING_STATIC_ART = {
  image_url: '/assets/landing/gallery-wall-wide.png',
  artist_title: 'SP1E',
  title: 'Gallery wall',
  date_display: ''
};

let bgArtworks   = [];
let bgCurrent    = 0;
let bgFront, bgBack, bgTimer;
let bgIntervalMs = 28_000;

const bgImgA = document.getElementById('bg-img-a');
const bgImgB = document.getElementById('bg-img-b');

function gSetImmersionReady(ready) {
  if (!immBtn) return;
  immBtn.disabled = !ready;
  immBtn.classList.toggle('loading', !ready);
  immBtn.classList.toggle('ready', !!ready);
}

gSetImmersionReady(false);

function gUrl(art) {
  if (art.image_url) return art.image_url;
  return `${GBASE}/${art.image_id}/full/1600,/0/default.jpg`;
}

function gShuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function gOnChange(art) {
  if (immersive && captionVisible) swapCaption(art);
}

function gShowFirst(art) {
  bgFront = bgImgA; bgBack = bgImgB;
  bgFront.style.zIndex = '1'; bgBack.style.zIndex = '0';
  bgBack.style.opacity = '0';
  bgBack.removeAttribute('src');
  bgFront.onload = () => {
    bgFront.onload = null;
    bgFront.style.opacity = '1';
    gSetImmersionReady(true);
  };
  bgFront.onerror = () => {
    bgFront.onerror = null;
    if (bgArtworks.length > 1) {
      bgCurrent = (bgCurrent + 1) % bgArtworks.length;
      gShowFirst(bgArtworks[bgCurrent]);
    } else {
      gSetImmersionReady(false);
    }
  };
  bgFront.src = gUrl(art);
  if (bgFront.complete && bgFront.naturalWidth) bgFront.onload();
}

function gShowStaticLanding() {
  clearTimeout(bgTimer);
  livingBackgroundEnabled = false;
  bgArtworks = [LANDING_STATIC_ART];
  bgCurrent = 0;
  updateLivingToggle();
  gShowFirst(LANDING_STATIC_ART);
}

function gCrossfade(art) {
  gOnChange(art);
  bgBack.src = gUrl(art);
  bgBack.onload = () => {
    bgBack.onload = null;
    bgBack.onerror = null;
    bgBack.style.zIndex = '2';
    bgBack.style.opacity = '1';
    setTimeout(() => {
      bgFront.style.opacity = '0';
      setTimeout(() => {
        bgFront.style.zIndex = '0';
        const tmp = bgFront; bgFront = bgBack; bgBack = tmp;
        bgFront.style.zIndex = '1';
      }, GFADE + 100);
    }, 50);
  };
  bgBack.onerror = () => {
    bgBack.onerror = null;
    bgBack.onload = null;
    gAdvance(1);
  };
}

function gAdvance(delta) {
  if (!bgArtworks.length) return;
  bgCurrent = (bgCurrent + delta + bgArtworks.length) % bgArtworks.length;
  gCrossfade(bgArtworks[bgCurrent]);
  // Reset auto-advance timer so it doesn't fire immediately after manual navigation
  gSchedule();
}

function gSchedule() {
  clearTimeout(bgTimer);
  bgTimer = setTimeout(() => {
    bgCurrent = (bgCurrent + 1) % bgArtworks.length;
    gCrossfade(bgArtworks[bgCurrent]);
    gSchedule();
  }, bgIntervalMs);
}

function gReadCache() {
  const now = Date.now();
  try {
    const sessionRaw = sessionStorage.getItem(GCACHE);
    if (sessionRaw) {
      const parsed = JSON.parse(sessionRaw);
      if (Array.isArray(parsed.items) && parsed.items.length && now - Number(parsed.savedAt || 0) < GCACHE_TTL_MS) {
        return parsed.items;
      }
    }
  } catch {}
  try {
    const localRaw = localStorage.getItem(GCACHE);
    if (localRaw) {
      const parsed = JSON.parse(localRaw);
      if (Array.isArray(parsed.items) && parsed.items.length && now - Number(parsed.savedAt || 0) < GCACHE_TTL_MS) {
        return parsed.items;
      }
    }
  } catch {}
  return null;
}

function gWriteCache(items) {
  const payload = JSON.stringify({ savedAt: Date.now(), items });
  try { sessionStorage.setItem(GCACHE, payload); } catch {}
  try { localStorage.setItem(GCACHE, payload); } catch {}
}

async function gFetchFresh() {
  const res = await fetch('/api/art', { cache: 'force-cache' });
  if (!res.ok) return [];
  const data = await res.json();
  const items = (data.data ?? []).filter(d => d.image_id || d.image_url);
  if (items.length) gWriteCache(items);
  return items;
}

async function gFetch() {
  const cached = gReadCache();
  if (cached && cached.length) {
    setTimeout(() => { void gFetchFresh().catch(() => {}); }, 0);
    return cached;
  }
  return gFetchFresh();
}

async function startLivingBackground() {
  try {
    const raw = await gFetch();
    if (!raw.length) {
      gShowStaticLanding();
      return;
    }
    livingBackgroundEnabled = true;
    bgArtworks = gShuffle(raw);
    bgCurrent = 0;
    updateLivingToggle();
    gShowFirst(bgArtworks[0]);
    gSchedule();
  } catch {}
}

function toggleLivingBackground() {
  setGalleryMenu(false);
  if (livingBackgroundEnabled) {
    gShowStaticLanding();
    return;
  }
  void startLivingBackground();
}

function gInit() {
  gShowStaticLanding();
}

gInit();
livingBgToggle.addEventListener('click', toggleLivingBackground);

// ── Spotify player ────────────────────────────────────────────────────────────
const spPlayerEl   = document.getElementById('spotify-player');
const spArtEl      = document.getElementById('sp-art');
const spTrackEl    = document.getElementById('sp-track');
const spArtistEl   = document.getElementById('sp-artist');
const spFillEl     = document.getElementById('sp-progress-fill');
const spBtnPrev    = document.getElementById('sp-prev');
const spBtnPlay    = document.getElementById('sp-play');
const spBtnNext    = document.getElementById('sp-next');
const spLinkEl     = document.getElementById('sp-link');
const spHintEl     = document.getElementById('sp-hint');
const spDisconnect = document.getElementById('sp-disconnect');
const spNoticeEl   = document.getElementById('sp-notice');

let spPollIv  = null;
let spLastArt = '';
let spVisible = false;
let pendingAfterLogin = null;
let spAuthBusy = false;
let spNoticeTimer = null;

function hasCookie(name) {
  return document.cookie.split(';').some(c => c.trim().startsWith(name + '='));
}
const spLinked = hasCookie('spotify_linked');

function spSetArt(url) {
  if (!url || url === spLastArt) return;
  spLastArt = url;
  spArtEl.style.opacity = '0';
  setTimeout(() => {
    spArtEl.src = url;
    const done = () => {
      spArtEl.style.opacity = '1';
      spArtEl.removeEventListener('load',  done);
      spArtEl.removeEventListener('error', done);
    };
    spArtEl.addEventListener('load',  done);
    spArtEl.addEventListener('error', done);
  }, 300);
}

function spShow(isPlaying) {
  spPlayerEl.classList.toggle('sp-mini', !isPlaying);
  if (!spVisible) {
    spPlayerEl.classList.add('sp-shown');
    spVisible = true;
    requestAnimationFrame(() => requestAnimationFrame(() => spPlayerEl.classList.add('sp-visible')));
  }
  if (spHintEl) spHintEl.classList.add('hidden');
}

function spHide() {
  spPlayerEl.classList.remove('sp-shown', 'sp-visible', 'sp-mini');
  spVisible = false;
}

function spNotice(message, type = '') {
  if (!spNoticeEl) return;
  if (spNoticeTimer) clearTimeout(spNoticeTimer);
  spNoticeEl.textContent = message || '';
  spNoticeEl.className = message ? `show${type ? ' ' + type : ''}` : '';
  if (!message) return;
  spNoticeTimer = setTimeout(() => {
    spNoticeEl.textContent = '';
    spNoticeEl.className = '';
  }, type === 'err' ? 5000 : 3200);
}

async function startSpotifyLink(opts = {}) {
  const retryAfterLogin = !!opts.retryAfterLogin;
  if (spAuthBusy) return;
  spAuthBusy = true;
  if (spHintEl) spHintEl.style.pointerEvents = 'none';
  spNotice('Spotify öppnas …');
  try {
    const authCheck = await fetch('/api/auth/check', { credentials: 'same-origin' });
    const authPayload = authCheck.ok ? await authCheck.json().catch(() => null) : null;
    if (!authPayload || !authPayload.authenticated) {
      pendingAfterLogin = () => startSpotifyLink({ retryAfterLogin: true });
      spNotice('Logga in först för att länka Spotify.', 'err');
      openModal();
      return;
    }

    const res = await fetch('/api/spotify/auth-url', { credentials: 'same-origin' });
    let payload = null;
    try { payload = await res.json(); } catch {}
    if (!res.ok || !payload || !payload.url) {
      const msg = payload && payload.error ? payload.error : 'Spotify kunde inte öppnas just nu.';
      spNotice(msg, 'err');
      return;
    }
    pendingAfterLogin = null;
    location.href = payload.url;
  } catch {
    spNotice(
      retryAfterLogin
        ? 'Spotify kunde inte öppnas efter inloggning.'
        : 'Spotify kunde inte öppnas just nu.',
      'err'
    );
  } finally {
    spAuthBusy = false;
    if (spHintEl) spHintEl.style.pointerEvents = '';
  }
}

async function spPoll() {
  try {
    const res = await fetch('/api/spotify/now-playing');
    if (!res.ok) return;
    const d = await res.json();
    if (!d.track_name) { if (!spLinked) spHide(); return; }

    spSetArt(d.album_art_url);
    spTrackEl.textContent  = d.track_name  || '';
    spArtistEl.textContent = d.artist_name || '';

    const pct = d.duration_ms > 0 ? Math.min(100, (d.progress_ms / d.duration_ms) * 100) : 0;
    spFillEl.style.transition = 'none';
    spFillEl.style.width = pct + '%';
    if (spBtnPlay) spBtnPlay.textContent = d.is_playing ? '⏸' : '▶';

    if (d.track_url && spLinkEl) {
      spLinkEl.href = d.track_url.startsWith('spotify:')
        ? 'https://open.spotify.com/track/' + d.track_url.split(':').pop()
        : d.track_url;
    }

    if (spLinked) spShow(d.is_playing);
  } catch {}
}

// Start polling
spPoll();
spPollIv = setInterval(spPoll, 10_000);

// Show/hide ♫ hint
if (spLinked) {
  if (spHintEl) spHintEl.classList.add('hidden');
} else {
  if (spHintEl) spHintEl.classList.remove('hidden');
}

// ♫ hint: fetch auth URL then navigate to Spotify (same tab → returns to sp1e.se/)
if (spHintEl) {
  spHintEl.addEventListener('click', () => { void startSpotifyLink(); });
}

// Controls (auth checked server-side via session cookie)
async function spControl(action) {
  try {
    if (action === 'toggle') {
      const playing = spBtnPlay && spBtnPlay.textContent === '⏸';
      await fetch(playing ? '/api/spotify/pause' : '/api/spotify/play',
        { method: 'PUT', credentials: 'same-origin' });
    } else if (action === 'next') {
      await fetch('/api/spotify/next',     { method: 'POST', credentials: 'same-origin' });
    } else if (action === 'previous') {
      await fetch('/api/spotify/previous', { method: 'POST', credentials: 'same-origin' });
    }
    setTimeout(spPoll, 800);
  } catch {}
}

if (spBtnPrev) spBtnPrev.addEventListener('click', () => spControl('previous'));
if (spBtnPlay) spBtnPlay.addEventListener('click', () => spControl('toggle'));
if (spBtnNext) spBtnNext.addEventListener('click', () => spControl('next'));

// Space bar prevention
[spBtnPrev, spBtnPlay, spBtnNext].forEach(btn => {
  if (btn) btn.addEventListener('keydown', e => { if (e.key === ' ') e.preventDefault(); });
});

// Disconnect
async function doDisconnect() {
  try { await fetch('/api/spotify/disconnect', { method: 'POST', credentials: 'same-origin' }); } catch {}
  document.cookie = 'spotify_linked=; Max-Age=0; Path=/; Secure; SameSite=Strict';
  spHide();
  if (spHintEl) spHintEl.classList.remove('hidden');
}

if (spDisconnect) spDisconnect.addEventListener('click', e => { e.stopPropagation(); doDisconnect(); });
</script>
