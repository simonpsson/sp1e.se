<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taggar — sp1e.se</title>
<meta name="robots" content="noindex">
<script>(function(){var t=localStorage.getItem('sp1e-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --surface2:  #181822;
    --border:    rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.14);
    --accent:    #4af2c8;
    --accent-dim:rgba(74,242,200,0.10);
    --text:      rgba(255,255,255,0.85);
    --muted:     rgba(255,255,255,0.40);
    --dim:       rgba(255,255,255,0.20);
    --topbar-bg:   rgba(10,10,15,0.92);
    --modal-bg:    #14141e;
    --ctx-bg:      #1c1c28;
    --heading:     #ffffff;
    --logo-col:    rgba(255,255,255,0.75);
    --logo-hover:  #ffffff;
    --hover-bg:    rgba(255,255,255,0.04);
  }
  [data-theme="light"] {
    --bg:          #f7f7f3;
    --surface:     #eeeee8;
    --surface2:    #e5e5de;
    --border:      rgba(0,0,0,0.08);
    --border-hi:   rgba(0,0,0,0.18);
    --text:        rgba(0,0,0,0.82);
    --muted:       rgba(0,0,0,0.45);
    --dim:         rgba(0,0,0,0.28);
    --topbar-bg:   rgba(247,247,243,0.92);
    --modal-bg:    #f0f0ea;
    --ctx-bg:      #e8e8e2;
    --heading:     #0a0a0f;
    --logo-col:    rgba(0,0,0,0.60);
    --logo-hover:  #0a0a0f;
    --hover-bg:    rgba(0,0,0,0.04);
    --danger-dim:  rgba(255,85,85,0.12);
  }
  [data-theme="light"] pre[class*="language-"],
  [data-theme="light"] .code-preview { background: #181822 !important; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    opacity: 0; animation: fade-in 0.3s ease forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }

  /* ── Progress bar ──────────────────────────────────── */
  #progress {
    position: fixed; top: 0; left: 0; width: 100%; height: 2px;
    z-index: 200; pointer-events: none;
    background: linear-gradient(90deg, var(--accent) 40%, transparent 100%);
    background-size: 200% 100%; background-position: 100% 0;
    transition: opacity 0.3s;
  }
  #progress.running {
    animation: progress-slide 1.2s linear infinite;
    opacity: 1;
  }
  #progress.idle { opacity: 0; }
  @keyframes progress-slide {
    from { background-position: 100% 0; }
    to   { background-position: -100% 0; }
  }

  /* ── Toast ─────────────────────────────────────────── */
  #toast-area {
    position: fixed; top: 1rem; right: 1rem; z-index: 300;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .toast {
    background: rgba(220,60,60,0.15); border: 1px solid rgba(220,60,60,0.35);
    color: rgba(255,180,180,0.95); border-radius: 6px;
    padding: 0.55rem 1rem; font-size: 0.72rem; letter-spacing: 0.04em;
    opacity: 0; transform: translateY(-6px);
    transition: opacity 0.2s, transform 0.2s;
    max-width: 320px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Top bar ───────────────────────────────────────── */
  .topbar {
    height: 52px; display: flex; align-items: center; gap: 1rem;
    padding: 0 2rem; border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1.2rem; letter-spacing: 0.2em;
    color: var(--logo-col); text-decoration: none; transition: color 0.2s;
  }
  .logo:hover { color: var(--logo-hover); }
  .topbar-sep { color: var(--dim); font-size: 0.7rem; }
  .topbar-title { font-size: 0.75rem; color: var(--dim); }

  /* ── Layout ────────────────────────────────────────── */
  main { max-width: 860px; margin: 0 auto; padding: 3.5rem 2rem 6rem; }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: 3rem; color: var(--heading);
    margin-bottom: 0.4rem; letter-spacing: 0.02em;
  }
  .page-subtitle { font-size: 0.72rem; color: var(--dim); margin-bottom: 2.5rem; }

  /* ── Tag cloud ─────────────────────────────────────── */
  #tag-cloud {
    display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 3rem;
  }
  .tag-pill {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.3rem 0.75rem; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 0.72rem; color: var(--muted);
    cursor: pointer; text-decoration: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    user-select: none;
  }
  .tag-pill:hover { border-color: rgba(74,242,200,0.4); color: var(--accent); }
  .tag-pill.active {
    background: var(--accent-dim); border-color: rgba(74,242,200,0.5); color: var(--accent);
  }
  .tag-cnt { font-size: 0.6rem; color: var(--dim); }

  /* ── Filtered items section ────────────────────────── */
  #items-section { display: none; }
  #items-section.visible { display: block; }

  .section-heading {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1.4rem; color: rgba(255,255,255,0.7);
    margin-bottom: 1.25rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.75rem;
  }
  .section-count { font-size: 0.65rem; color: var(--dim); font-family: 'DM Mono', monospace; margin-left: auto; }

  .item-row {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.7rem 0.75rem; border-radius: 7px;
    text-decoration: none; color: var(--text);
    transition: background 0.15s;
    margin-bottom: 0.25rem;
  }
  .item-row:hover { background: var(--surface); }
  .item-row-icon { font-size: 0.82rem; flex-shrink: 0; }
  .item-row-body { flex: 1; min-width: 0; }
  .item-row-title {
    font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-row-meta { font-size: 0.6rem; color: var(--dim); margin-top: 0.1rem; }
  .lang-badge {
    font-size: 0.55rem; padding: 0.1rem 0.32rem; border-radius: 3px;
    background: var(--accent-dim); border: 1px solid rgba(74,242,200,0.2);
    color: var(--accent); flex-shrink: 0;
  }
  .item-time { font-size: 0.6rem; color: var(--dim); flex-shrink: 0; }

  .empty {
    text-align: center; padding: 4rem 2rem;
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 1.2rem; color: var(--muted);
  }

  footer {
    text-align: center; padding: 1.5rem; font-size: 0.62rem; color: var(--dim);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--dim); text-decoration: none; }
  footer a:hover { color: var(--muted); }

  .topbar-right { display: flex; align-items: center; gap: 0.5rem; }
  .theme-btn {
    background: none; border: none; cursor: pointer;
    font-size: 1rem; padding: 0.15rem 0.4rem;
    border-radius: 6px; line-height: 1; opacity: 0.6;
    transition: opacity 0.2s;
  }
  .theme-btn:hover { opacity: 1; }

  @media (max-width: 640px) {
    main { padding: 2.5rem 1rem 4rem; }
    .topbar { padding: 0 1rem; }
    .page-title { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<div id="progress" class="idle"></div>
<div id="toast-area"></div>

<header class="topbar">
  <a class="logo" href="/">SP1E</a>
  <span class="topbar-sep">/</span>
  <a class="logo" href="/hub" style="font-size:0.9rem;letter-spacing:0.12em">Hub</a>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">Taggar</span>
  <div class="topbar-right" style="margin-left:auto">
    <button class="theme-btn" id="theme-btn" title="Byt tema">☀</button>
  </div>
</header>

<main>
  <h1 class="page-title">Taggar</h1>
  <p class="page-subtitle" id="page-subtitle">Laddar…</p>

  <div id="tag-cloud"></div>

  <section id="items-section">
    <h2 class="section-heading">
      <span id="section-label">Objekt</span>
      <span class="section-count" id="section-count"></span>
    </h2>
    <div id="items-list"></div>
  </section>
</main>

<footer><a href="/hub">← Hub</a></footer>

<script>
const TYPE_ICONS = { note: '📝', snippet: '💻', file: '📁', bookmark: '🔗' };

// ── Progress + Toast ──────────────────────────────────────────────────────────
const progress = document.getElementById('progress');
function startProgress() { progress.className = 'running'; }
function stopProgress()  { progress.className = 'idle'; }

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-area').appendChild(el);
  requestAnimationFrame(() => { el.classList.add('show'); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 3000);
}

// ── State ─────────────────────────────────────────────────────────────────────
let allTags = [];
let activeTags = new Set();

const tagParam = new URLSearchParams(location.search).get('tag');
if (tagParam) activeTags.add(tagParam);

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  startProgress();
  try {
    const res = await fetch('/api/tags', { credentials: 'same-origin' });
    if (!res.ok) throw new Error();
    const data = await res.json();
    allTags = data.tags ?? [];
  } catch {
    showToast('Kunde inte ladda taggar.');
    stopProgress();
    return;
  }
  stopProgress();

  renderTagCloud();

  const subtitle = document.getElementById('page-subtitle');
  subtitle.textContent = allTags.length
    ? `${allTags.length} unika taggar`
    : 'Inga taggar än.';

  if (activeTags.size) await loadItems();
})();

// ── Tag cloud ─────────────────────────────────────────────────────────────────
function renderTagCloud() {
  const cloud = document.getElementById('tag-cloud');
  if (!allTags.length) {
    cloud.innerHTML = '<p class="empty">Inga taggar ännu.</p>';
    return;
  }
  cloud.innerHTML = allTags.map(({ tag, cnt }) => `
    <button class="tag-pill${activeTags.has(tag) ? ' active' : ''}" data-tag="${esc(tag)}">
      ${esc(tag)}<span class="tag-cnt">${cnt}</span>
    </button>
  `).join('');

  cloud.querySelectorAll('.tag-pill').forEach(btn => {
    btn.addEventListener('click', () => toggleTag(btn.dataset.tag));
  });
}

async function toggleTag(tag) {
  if (activeTags.has(tag)) {
    activeTags.delete(tag);
  } else {
    activeTags.add(tag);
  }

  // Update URL param (use first active tag for shareability)
  const params = new URLSearchParams();
  if (activeTags.size === 1) params.set('tag', [...activeTags][0]);
  else if (activeTags.size > 1) params.set('tags', [...activeTags].join(','));
  history.replaceState(null, '', activeTags.size ? `?${params}` : location.pathname);

  renderTagCloud();
  if (activeTags.size) {
    await loadItems();
  } else {
    document.getElementById('items-section').classList.remove('visible');
  }
}

// ── Load filtered items ───────────────────────────────────────────────────────
async function loadItems() {
  if (!activeTags.size) return;
  startProgress();
  const tagsStr = [...activeTags].join(',');

  let items = [];
  try {
    const res = await fetch(`/api/items?tags=${encodeURIComponent(tagsStr)}`, { credentials: 'same-origin' });
    if (!res.ok) throw new Error();
    const data = await res.json();
    items = data.items ?? [];
  } catch {
    showToast('Kunde inte ladda objekt.');
    stopProgress();
    return;
  }
  stopProgress();

  const section = document.getElementById('items-section');
  const list    = document.getElementById('items-list');
  const label   = document.getElementById('section-label');
  const count   = document.getElementById('section-count');

  label.textContent = [...activeTags].map(t => `#${t}`).join(' + ');
  count.textContent = `${items.length} objekt`;
  section.classList.add('visible');

  if (!items.length) {
    list.innerHTML = '<p class="empty">Inga objekt med dessa taggar.</p>';
    return;
  }

  list.innerHTML = items.map(item => {
    const icon   = TYPE_ICONS[item.type] ?? '📄';
    const href   = itemHref(item);
    const isExt  = item.type === 'bookmark' || item.type === 'file';
    const target = isExt ? ' target="_blank" rel="noopener"' : '';
    const meta   = item.subcategory_name ? esc(item.subcategory_name) : (item.category_name ? esc(item.category_name) : '');
    const extra  = item.type === 'snippet' && item.language
      ? `<span class="lang-badge">${esc(item.language)}</span>` : '';
    return `
      <a class="item-row" href="${esc(href)}"${target}>
        <span class="item-row-icon">${icon}</span>
        <div class="item-row-body">
          <div class="item-row-title">${esc(item.title ?? '(namnlös)')}</div>
          ${meta ? `<div class="item-row-meta">${meta}</div>` : ''}
        </div>
        ${extra}
        <span class="item-time">${relTime(item.created_at)}</span>
      </a>`;
  }).join('');
}

function itemHref(item) {
  if (item.type === 'note')     return `/hub/note/${item.id}`;
  if (item.type === 'snippet')  return `/hub/snippet/${item.id}`;
  if (item.type === 'bookmark') return item.url ?? '#';
  if (item.type === 'file')     return `/api/files/${item.id}/download`;
  return '#';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(iso) {
  if (!iso) return '';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d < 1) return 'idag';
  if (d < 7) return `${d}d`;
  return new Date(iso).toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
}

  // Theme toggle
  (function initTheme() {
    const btn = document.getElementById('theme-btn');
    function syncIcon() {
      const light = document.documentElement.getAttribute('data-theme') === 'light';
      if (btn) btn.textContent = light ? '🌙' : '☀';
      if (btn) btn.title = light ? 'Mörkt tema' : 'Ljust tema';
    }
    syncIcon();
    btn?.addEventListener('click', () => {
      const light = document.documentElement.getAttribute('data-theme') === 'light';
      document.documentElement.setAttribute('data-theme', light ? 'dark' : 'light');
      localStorage.setItem('sp1e-theme', light ? 'dark' : 'light');
      syncIcon();
    });
  })();
</script>
</body>
</html>
