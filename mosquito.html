<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosquito — sp1e.se</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26' fill='%234af2c8'>Σ</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    background: #0a0a0f;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
  }

  body {
    opacity: 0;
    animation: fade-in 0.8s ease forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }

  /* ── Topbar ───────────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    background: rgba(10,10,15,0.90);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .sp1e-logo {
    display: block;
    height: 1.05rem;
    width: auto;
    overflow: visible;
    opacity: 0.7;
    transition: opacity 0.2s;
    user-select: none;
  }
  .logo-link:hover .sp1e-logo { opacity: 1; }
  .logo-link { text-decoration: none; }

  .back-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.45);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.2s;
    padding: 0.25rem 0;
  }
  .back-btn:hover { color: rgba(255,255,255,0.85); }

  /* ── Hero ─────────────────────────────────────────── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 5rem 2rem 3rem;
    gap: 0.75rem;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 8vw, 5.5rem);
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.92);
    line-height: 1;
  }

  .hero-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 0.25rem;
  }

  /* ── Game grid ────────────────────────────────────── */
  .grid-section {
    max-width: 900px;
    margin: 2rem auto 6rem;
    padding: 0 2rem;
  }

  .grid-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 1.5rem;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
  }

  .empty-state {
    grid-column: 1 / -1;
    padding: 4rem 2rem;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.20);
    border: 1px dashed rgba(255,255,255,0.07);
    border-radius: 12px;
  }

  /*
   * ── Game card template (ready for future use) ──────
   *
   * .game-card {
   *   display: flex;
   *   flex-direction: column;
   *   gap: 0.75rem;

   *   background: #12121a;
   *   border: 1px solid rgba(255,255,255,0.07);
   *   border-radius: 12px;
   *   cursor: pointer;
   *   text-decoration: none;
   *   transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
   * }

   *   border-color: rgba(255,255,255,0.18);
   *   box-shadow: 0 4px 24px rgba(0,0,0,0.4);
   *   transform: translateY(-2px);
   * }

   *   font-size: 2rem;
   *   line-height: 1;
   * }
   * .game-card-title {
   *   font-family: 'Space Grotesk', sans-serif;
   *   font-weight: 400;
   *   font-size: 1rem;
   *   color: rgba(255,255,255,0.90);
   *   letter-spacing: 0.02em;
   * }
   * .game-card-desc {
   *   font-family: 'DM Mono', monospace;
   *   font-size: 0.65rem;
   *   letter-spacing: 0.04em;
   *   color: rgba(255,255,255,0.38);
   *   line-height: 1.6;
   * }
   *
   * Example card markup:
   * <a class="game-card" href="/mosquito/game-name">
   *   <div class="game-card-icon">🎮</div>

   *   <div class="game-card-desc">Short description of the game.</div>
   * </a>
   */
</style>
</head>
<body>

<header class="topbar">
  <a class="logo-link" href="/" aria-label="SP1E — startsida">
    <svg class="sp1e-logo" viewBox="0 0 150 52" role="img" xmlns="http://www.w3.org/2000/svg">
      <text x="2" y="40" font-family="'Cormorant Garamond', serif" font-weight="300" font-size="42" fill="currentColor" letter-spacing="10">SP1E</text>
    </svg>
  </a>
  <a class="back-btn" href="/">← Tillbaka</a>
</header>

<section class="hero">
  <h1 class="hero-title">Mosquito</h1>
  <p class="hero-sub">Spel &amp; experiment</p>
</section>

<section class="grid-section">
  <p class="grid-label">Spel</p>
  <div class="game-grid">
    <div class="empty-state">Kommer snart...</div>
  </div>
</section>

</body>
</html>
